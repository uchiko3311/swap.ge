<!-- განცხადების დამატების სექცია -->
<section id="add-post-section" class="max-w-2xl mx-auto p-4 bg-white shadow-xl rounded-3xl my-10">
    <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
        <i class="fa fa-plus-circle text-orange-500"></i> განცხადების დამატება
    </h2>

    <form id="listingForm" class="space-y-6">
        <!-- 1. კატეგორიის არჩევა -->
        <div>
            <label class="block text-sm font-bold mb-2">აირჩიეთ კატეგორია</label>
            <select id="categorySelect" onchange="updateFields()" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:border-blue-500">
                <option value="none">-- აირჩიეთ --</option>
                <option value="real-estate">🏠 უძრავი ქონება</option>
                <option value="cars">🚗 ავტომობილები</option>
                <option value="tech">📱 ტექნიკა</option>
                <option value="other">📦 სხვადასხვა</option>
            </select>
        </div>

        <!-- 2. დინამიური ველები (აქ ჩაიწერება კოდი JS-ით) -->
        <div id="dynamicFields" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- ველები შეივსება არჩევანის მიხედვით -->
        </div>

        <!-- 3. გაცვლის პირობა -->
        <div class="bg-orange-50 p-4 rounded-2xl border border-orange-100">
            <label class="block text-sm font-bold mb-2 text-orange-700">რაში ცვლით? (Barter)</label>
            <textarea placeholder="აღწერეთ, რა ნივთს ისურვებდით სანაცვლოდ..." class="w-full p-3 rounded-xl border-none outline-none resize-none" rows="3"></textarea>
        </div>

        <!-- 4. სურათების ატვირთვა -->
        <div>
            <label class="block text-sm font-bold mb-2">ფოტოების დამატება</label>
            <div class="flex items-center justify-center w-full">
                <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed rounded-2xl cursor-pointer bg-gray-50 hover:bg-gray-100">
                    <i class="fa fa-camera text-2xl text-gray-400"></i>
                    <span class="text-sm text-gray-500">ატვირთე ფოტო</span>
                    <input type="file" class="hidden" multiple />
                </label>
            </div>
        </div>

        <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-blue-700 transition">
            განცხადების გამოქვეყნება
        </button>
    </form>
</section>

<script>
function updateFields() {
    const category = document.getElementById('categorySelect').value;
    const fields = document.getElementById('dynamicFields');
    fields.innerHTML = ''; // გასუფთავება

    if (category === 'real-estate') {
        fields.innerHTML = `
            <input type="number" placeholder="ფართობი (მ²)" class="p-4 bg-gray-50 border rounded-xl">
            <input type="number" placeholder="ოთახების რაოდენობა" class="p-4 bg-gray-50 border rounded-xl">
            <select class="p-4 bg-gray-50 border rounded-xl"><option>გარემონტებული</option><option>თეთრი კარკასი</option></select>
        `;
    } else if (category === 'cars') {
        fields.innerHTML = `
            <input type="text" placeholder="მარკა/მოდელი" class="p-4 bg-gray-50 border rounded-xl">
            <input type="number" placeholder="წელი" class="p-4 bg-gray-50 border rounded-xl">
            <input type="number" placeholder="გარბენი (კმ)" class="p-4 bg-gray-50 border rounded-xl">
        `;
    } else if (category === 'tech') {
        fields.innerHTML = `
            <select class="p-4 bg-gray-50 border rounded-xl"><option>ახალი</option><option>მეორადი</option></select>
            <input type="text" placeholder="მოდელი/ბრენდი" class="p-4 bg-gray-50 border rounded-xl">
        `;
    }
}
</script>
