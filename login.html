<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>შესვლა - Swap.ge</title>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-indigo-600 mb-2">SWAP.GE</h1>
            <p class="text-gray-500">შედი ან დარეგისტრირდი სისტემაში</p>
        </div>

        <!-- Google Login Button -->
        <button id="google-login" class="w-full flex items-center justify-center gap-3 border-2 border-gray-100 py-3 rounded-xl hover:bg-gray-50 transition mb-6">
            <img src="https://gstatic.com" width="20">
            <span class="font-bold text-gray-700">შესვლა Google-ით</span>
        </button>

        <div class="relative mb-6">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200"></div></div>
            <div class="relative flex justify-center text-sm"><span class="bg-white px-2 text-gray-400 font-medium">ან მეილით</span></div>
        </div>

        <!-- Email/Pass Form -->
        <form id="login-form" class="space-y-4">
            <input type="email" id="email" placeholder="ელ-ფოსტა" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-indigo-500" required>
            <input type="password" id="password" placeholder="პაროლი" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-indigo-500" required>
            
            <div class="flex gap-2">
                <button type="submit" id="btn-login" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 transition">შესვლა</button>
                <button type="button" id="btn-signup" class="flex-1 border-2 border-indigo-600 text-indigo-600 py-3 rounded-xl font-bold hover:bg-indigo-50 transition">რეგისტრაცია</button>
            </div>
        </form>

        <p id="error-msg" class="mt-4 text-red-500 text-sm text-center hidden"></p>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
