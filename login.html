<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>შესვლა - VIP EXCHANGE</title>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded shadow-md w-96">
        <div class="flex justify-center mb-4">🤝</div>
        <h2 class="text-xl font-bold text-center mb-6">სისტემაში შესვლა</h2>
        <input type="email" id="email" placeholder="ელ-ფოსტა" class="w-full p-2 border mb-4 rounded">
        <input type="password" id="pass" placeholder="პაროლი" class="w-full p-2 border mb-6 rounded">
        <button onclick="login()" class="w-full bg-blue-600 text-white py-2 rounded">შესვლა</button>
        <p id="msg" class="text-red-500 text-sm mt-2 text-center"></p>
    </div>

    <script>
        function login() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            if(e === "admin@gmail.com" && p === "Admin2026$") {
                localStorage.setItem("user", "admin");
                window.location.href = "profile.html";
            } else {
                document.getElementById('msg').innerText = "არასწორი მონაცემები!";
            }
        }
    </script>
</body>
</html>
