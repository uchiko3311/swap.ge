<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>წარმატება! - Swap.ge</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --orange-deep: #d35400; --dark: #2c3e50; --vip-gold: #f1c40f; --bg: #fdf2e9; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        
        .success-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 400px; width: 90%; border-top: 5px solid #27ae60; }
        .icon-box { font-size: 60px; color: #27ae60; margin-bottom: 20px; animation: scaleUp 0.5s ease-out; }
        
        h1 { color: var(--dark); margin-bottom: 10px; }
        p { color: #666; line-height: 1.6; }
        
        .info-box { background: #f9f9f9; padding: 15px; border-radius: 10px; margin: 20px 0; font-size: 14px; border-left: 4px solid var(--vip-gold); text-align: left; }
        
        .btn-home { background: var(--orange-deep); color: white; padding: 12px 25px; border-radius: 8px; text-decoration: none; font-weight: bold; display: inline-block; transition: 0.3s; margin-top: 10px; }
        .btn-home:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(211, 84, 0, 0.3); }

        @keyframes scaleUp {
            0% { transform: scale(0); }
            80% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body onload="activatePremium()">

    <div class="success-card">
        <div class="icon-box">
            <i class="fas fa-check-circle"></i>
        </div>
        <h1>წარმატება!</h1>
        <p>თქვენი მოთხოვნა წარმატებით შესრულდა.</p>

        <div class="info-box" id="premiumInfo">
            <i class="fas fa-info-circle"></i> განცხადება გამოქვეყნებულია 30 დღით.
        </div>

        <a href="index.html" class="btn-home">მთავარ გვერდზე დაბრუნება</a>
    </div>

    <script>
        function activatePremium() {
            // ვამოწმებთ, პრემიუმის გვერდიდან მოვიდა თუ უბრალოდ განცხადება დადო
            // (თუ URL-ში არის ?type=premium ან მსგავსი, შეგვიძლია გავარჩიოთ)
            const urlParams = new URLSearchParams(window.location.search);
            const isBuyingPremium = document.referrer.includes('premium.html');

            if (isBuyingPremium) {
                const now = Date.now();
                const thirtyDaysInMs = 30 * 24 * 60 * 60 * 1000;
                const expiryDate = now + thirtyDaysInMs;

                // ვინახავთ მონაცემებს ბრაუზერში
                localStorage.setItem('is_premium', 'true');
                localStorage.setItem('premium_expiry', expiryDate);

                const dateObj = new Date(expiryDate);
                const dateString = dateObj.toLocaleDateString('ka-GE');

                document.getElementById('premiumInfo').innerHTML = `
                    <i class="fas fa-crown" style="color: #f1c40f;"></i> 
                    <strong>VIP სტატუსი გააქტიურებულია!</strong><br>
                    მოქმედების ვადა: ${dateString}-მდე.
                `;
            }
        }
    </script>
</body>
</html>
