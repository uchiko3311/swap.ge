<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP აქტიურია - Swap.com.ge</title>
    <style>
        :root { --orange-deep: #d35400; --dark: #2c3e50; --vip-gold: #f1c40f; }
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #fdf2e9; }
        .success-card { background: white; padding: 50px; border-radius: 20px; box-shadow: 0 15px 35px rgba(211, 84, 0, 0.15); text-align: center; max-width: 450px; border-top: 8px solid var(--orange-deep); }
        .icon { font-size: 80px; margin-bottom: 20px; display: block; }
        h1 { color: var(--orange-deep); margin-bottom: 15px; font-size: 30px; }
        p { color: var(--dark); line-height: 1.6; font-size: 18px; font-weight: 500; }
        .btn-home { display: inline-block; margin-top: 30px; background: var(--dark); color: var(--vip-gold); text-decoration: none; padding: 15px 35px; border-radius: 8px; font-weight: 900; transition: 0.3s; border: 1px solid var(--vip-gold); }
        .btn-home:hover { background: #1a252f; transform: translateY(-3px); }
    </style>
</head>
<body>

<div class="success-card">
    <span class="icon">🤝</span>
    <h1>გარიგება შედგა!</h1>
    <p>თქვენი <b>VIP სტატუსი</b> წარმატებით გააქტიურდა. <br> გმადლობთ ნდობისთვის!</p>
    <a href="index.html" class="btn-home">მთავარ გვერდზე დაბრუნება</a>
</div>

</body>
</html>
