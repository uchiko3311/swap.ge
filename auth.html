<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ავტორიზაცია - Swap.ge</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --orange: #e67e22; --orange-deep: #d35400; --dark: #2c3e50; --bg: #fdf2e9; --google: #db4437; --fb: #4267B2; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        
        .auth-card { background: white; padding: 35px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; border-top: 6px solid var(--orange); }
        .auth-card h2 { text-align: center; color: var(--dark); margin-bottom: 20px; }
        
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; margin-bottom: 10px; outline: none; }
        
        .btn-box { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        .btn-login { background: var(--orange); color: white; }
        .btn-reg { background: white; color: var(--dark); border: 2px solid var(--dark); }
        
        /* სოციალური ღილაკები */
        .separator { text-align: center; margin: 20px 0; position: relative; color: #7f8c8d; font-size: 13px; }
        .separator::before, .separator::after { content: ""; position: absolute; top: 50%; width: 40%; height: 1px; background: #ddd; }
        .separator::before { left: 0; } .separator::after { right: 0; }

        .btn-google { background: white; color: #555; border: 1px solid #ddd; }
        .btn-google i { color: var(--google); }
        .btn-fb { background: var(--fb); color: white; }

        .forgot-link { text-align: center; margin-top: 15px; }
        .forgot-link a { color: #7f8c8d; text-decoration: none; font-size: 13px; }
    </style>
</head>
<body>

<div class="auth-card">
    <h2>შესვლა</h2>
    
    <input type="email" id="email" placeholder="ელ-ფოსტა" required>
    <input type="password" id="password" placeholder="პაროლი" required>

    <div class="btn-box">
        <button class="btn-login" onclick="handleAuth('login')">შესვლა</button>
        <button class="btn-reg" onclick="handleAuth('register')">რეგისტრაცია</button>
    </div>

    <div class="separator">ან გამოიყენეთ</div>

    <div class="btn-box">
        <button class="btn-google" onclick="socialLogin('google')">
            <i class="fab fa-google"></i> Google-ით შესვლა
        </button>
        <button class="btn-fb" onclick="socialLogin('fb')">
            <i class="fab fa-facebook-f"></i> Facebook-ით შესვლა
        </button>
    </div>

    <div class="forgot-link">
        <a href="#" onclick="forgotPassword()">დაგავიწყდათ პაროლი?</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://gstatic.com";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, GoogleAuthProvider, FacebookAuthProvider, signInWithPopup } from "https://gstatic.com";

    const firebaseConfig = {
        apiKey: "AIzaSyCuFjbwcI3up46IoNEJfayWyGnXvABsOfM",
        authDomain: "://firebaseapp.com",
        projectId: "swap-5d311",
        storageBucket: "swap-5d311.firebasestorage.app",
        messagingSenderId: "444445838698",
        appId: "1:444445838698:web:18ab8580aa018d0236a913"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // ელ-ფოსტით ავტორიზაცია
    window.handleAuth = async (type) => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        if(!email || !password) return alert("შეავსეთ ველები");

        try {
            if(type === 'login') await signInWithEmailAndPassword(auth, email, password);
            else await createUserWithEmailAndPassword(auth, email, password);
            window.location.href = "index.html";
        } catch (err) { alert(err.message); }
    };

    // სოციალური ქსელებით შესვლა
    window.socialLogin = async (providerType) => {
        const provider = providerType === 'google' ? new GoogleAuthProvider() : new FacebookAuthProvider();
        try {
            await signInWithPopup(auth, provider);
            window.location.href = "index.html";
        } catch (err) {
            alert("ავტორიზაცია ვერ მოხერხდა: " + err.message);
        }
    };

    // პაროლის აღდგენა
    window.forgotPassword = async () => {
        const email = document.getElementById('email').value;
        if(!email) return alert("ჩაწერეთ მეილი");
        try {
            await sendPasswordResetEmail(auth, email);
            alert("ბმული გამოგზავნილია!");
        } catch (err) { alert(err.message); }
    };
</script>

</body>
</html>
