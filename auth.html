<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ავტორიზაცია - Swap.com.ge</title>
    <style>
        :root { --orange: #e67e22; --dark: #2c3e50; --bg: #fdf2e9; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: var(--orange); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .toggle-link { margin-top: 15px; display: block; color: var(--dark); text-decoration: none; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>

<div class="auth-card">
    <h2 id="authTitle">👋 შესვლა</h2>
    <form id="authForm">
        <input type="email" id="email" placeholder="ელ-ფოსტა" required>
        <input type="password" id="password" placeholder="პაროლი" required>
        <button type="submit" id="authBtn" class="btn">შესვლა</button>
    </form>
    <a class="toggle-link" id="toggleAuth">არ გაქვს ანგარიში? დარეგისტრირდი</a>
    <br>
    <a href="index.html" style="color: #888; font-size: 12px; text-decoration: none;">🏠 მთავარზე დაბრუნება</a>
</div>

<script type="module">
    import { initializeApp } from "https://gstatic.com";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://gstatic.com";

    const firebaseConfig = {
        apiKey: "AIzaSyCuFjbwcI3up46IoNEJfayWyGnXvABsOfM",
        authDomain: "://firebaseapp.com",
        projectId: "swap-5d311",
        storageBucket: "swap-5d311.firebasestorage.app",
        messagingSenderId: "444445838698",
        appId: "1:444445838698:web:18ab8580aa018d0236a913"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    let isLogin = true;

    // გადართვა რეგისტრაციასა და შესვლას შორის
    document.getElementById('toggleAuth').onclick = () => {
        isLogin = !isLogin;
        document.getElementById('authTitle').innerText = isLogin ? "👋 შესვლა" : "📝 რეგისტრაცია";
        document.getElementById('authBtn').innerText = isLogin ? "შესვლა" : "რეგისტრაცია";
        document.getElementById('toggleAuth').innerText = isLogin ? "არ გაქვს ანგარიში? დარეგისტრირდი" : "უკვე გაქვს ანგარიში? შედი";
    };

    document.getElementById('authForm').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('authBtn');

        btn.disabled = true;
        btn.innerText = "გთხოვთ დაელოდოთ...";

        try {
            if (isLogin) {
                // შესვლა
                await signInWithEmailAndPassword(auth, email, password);
            } else {
                // რეგისტრაცია
                await createUserWithEmailAndPassword(auth, email, password);
                alert("რეგისტრაცია წარმატებულია!");
            }
            window.location.href = "index.html";
        } catch (error) {
            console.error(error);
            alert("შეცდომა: " + error.message);
            btn.disabled = false;
            btn.innerText = isLogin ? "შესვლა" : "რეგისტრაცია";
        }
    };
</script>
</body>
</html>
