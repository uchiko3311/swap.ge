<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ავტორიზაცია - Swap.ge</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --orange: #e67e22; --dark: #2c3e50; --bg: #fdf2e9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        
        .auth-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; border-top: 5px solid var(--orange); }
        .logo { font-size: 24px; font-weight: bold; color: var(--orange); margin-bottom: 20px; display: block; text-decoration: none; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        .btn-auth { width: 100%; padding: 14px; background: var(--orange); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 16px; transition: 0.3s; }
        .btn-auth:hover { background: #d35400; }
        
        .toggle-text { margin-top: 20px; font-size: 14px; color: #666; }
        .toggle-link { color: var(--dark); font-weight: bold; cursor: pointer; text-decoration: underline; }
        .back-home { margin-top: 20px; display: inline-block; color: #999; text-decoration: none; font-size: 13px; }
    </style>
</head>
<body>

<div class="auth-card">
    <a href="index.html" class="logo">🤝 SWAP.GE</a>
    <h2 id="authTitle">შესვლა</h2>
    
    <form id="authForm">
        <input type="email" id="email" placeholder="ელ-ფოსტა" required>
        <input type="password" id="password" placeholder="პაროლი (მინ. 6 სიმბოლო)" required>
        <button type="submit" class="btn-auth" id="authBtn">შესვლა</button>
    </form>
    
    <div class="toggle-text">
        <span id="toggleMsg">არ გაქვს ექაუნთი?</span> 
        <span class="toggle-link" onclick="toggleMode()" id="toggleLink">დარეგისტრირდი</span>
    </div>
    
    <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> მთავარზე დაბრუნება</a>
</div>

<script type="module">
    import { initializeApp } from "https://gstatic.com";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://gstatic.com";

    // შენი Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyCuFjbwcI3up46IoNEJfayWyGnXvABsOfM",
        authDomain: "swap-5d311.firebaseapp.com",
        databaseURL: "https://swap-5d311-default-rtdb.firebaseio.com",
        projectId: "swap-5d311",
        storageBucket: "swap-5d311.firebasestorage.app",
        messagingSenderId: "444445838698",
        appId: "1:444445838698:web:18ab8580aa018d0236a913",
        measurementId: "G-HS88H5PQ9P"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    let isLogin = true;

    window.toggleMode = () => {
        isLogin = !isLogin;
        document.getElementById('authTitle').innerText = isLogin ? 'შესვლა' : 'რეგისტრაცია';
        document.getElementById('authBtn').innerText = isLogin ? 'შესვლა' : 'რეგისტრაცია';
        document.getElementById('toggleMsg').innerText = isLogin ? 'არ გაქვს ექაუნთი?' : 'უკვე გაქვს ექაუნთი?';
        document.getElementById('toggleLink').innerText = isLogin ? 'დარეგისტრირდი' : 'შესვლა';
    };

    document.getElementById('authForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('authBtn');

        btn.disabled = true;
        btn.innerText = "მიმდინარეობს...";

        try {
            if (isLogin) {
                await signInWithEmailAndPassword(auth, email, password);
            } else {
                await createUserWithEmailAndPassword(auth, email, password);
            }
            window.location.href = "index.html";
        } catch (error) {
            alert("შეცდომა: " + error.message);
            btn.disabled = false;
            btn.innerText = isLogin ? 'შესვლა' : 'რეგისტრაცია';
        }
    });
</script>

</body>
</html>
