<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>განცხადების დამატება - SWAP.GE</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Inter', sans-serif; background-color: #FFF5F0; }
    </style>
</head>
<body class="pb-10">

    <nav class="bg-[#E65100] p-4 text-white shadow-md mb-8">
        <div class="container mx-auto flex items-center gap-4">
            <a href="index.html" class="text-xl font-bold">← უკან</a>
            <h1 class="text-xl font-black italic">🤝 SWAP.GE</h1>
        </div>
    </nav>

    <main class="container mx-auto px-4 max-w-2xl">
        <div class="bg-white p-8 rounded-3xl shadow-xl">
            <h2 class="text-2xl font-black mb-6 text-gray-800">ახალი განცხადება</h2>
            
            <form id="add-item-form" class="space-y-6">
                <!-- 12. კატეგორიები -->
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-2">კატეგორია</label>
                    <select id="category" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-orange-500" required>
                        <option value="tech">💻 ტექნიკა</option>
                        <option value="home">🏠 სახლი</option>
                        <option value="car">🚗 ავტომობილი</option>
                        <option value="other">➕ სხვა</option>
                    </select>
                </div>

                <input type="text" id="title" placeholder="ნივთის დასახელება" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-orange-500" required>
                <textarea id="description" placeholder="რაში ცვლით? (აღწერეთ ნივთი და თქვენი მოთხოვნა)" rows="4" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-orange-500" required></textarea>

                <!-- 9. ფოტოების ატვირთვა -->
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-2">ფოტოები (მაქს. <span id="photo-limit">7</span> ფოტო)</label>
                    <input type="file" id="photo-input" multiple accept="image/*" class="w-full p-3 border-2 border-dashed rounded-2xl text-gray-400">
                    <p class="text-xs text-orange-500 mt-2 font-medium" id="vip-status-msg">უფასო პაკეტი: ლიმიტი 7 ფოტო</p>
                </div>

                <button type="submit" id="submit-btn" class="w-full bg-[#E65100] text-white py-4 rounded-2xl font-black text-lg hover:bg-orange-700 transition shadow-lg">გამოქვეყნება</button>
            </form>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getAuth, onAuthStateChanged } from "https://gstatic.com";
        import { getFirestore, doc, getDoc, collection, addDoc, query, where, getDocs, serverTimestamp } from "https://gstatic.com";

        const firebaseConfig = {
            apiKey: "AIzaSyAEUjh_mVRLTzUecRJbeG_K6gTp__FVft0",
            authDomain: "://firebaseapp.com",
            projectId: "swap-39e13",
            storageBucket: "swap-39e13.firebasestorage.app",
            messagingSenderId: "107187341554",
            appId: "1:107187341554:web:75533a380b58a7a141286b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let isVIP = false;

        // 3 & 9. ავტორიზაციის და ლიმიტების შემოწმება
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                alert("განცხადების დასამატებლად გაიარეთ ავტორიზაცია!");
                window.location.href = "login.html";
                return;
            }

            const userSnap = await getDoc(doc(db, "users", user.uid));
            isVIP = userSnap.data()?.isVIP || false;

            if (isVIP) {
                document.getElementById('photo-limit').innerText = "14";
                document.getElementById('vip-status-msg').innerText = "👑 VIP პაკეტი: ლიმიტი 14 ფოტო და 5 განცხადება";
            }
        });

        document.getElementById('add-item-form').onsubmit = async (e) => {
            e.preventDefault();
            const user = auth.currentUser;
            const photos = document.getElementById('photo-input').files;

            // 9. ლიმიტების გადამოწმება
            const userItemsQuery = query(collection(db, "items"), where("ownerId", "==", user.uid));
            const userItemsSnap = await getDocs(userItemsQuery);
            const activePostsCount = userItemsSnap.size;

            const postLimit = isVIP ? 5 : 1;
            const photoLimit = isVIP ? 14 : 7;

            if (activePostsCount >= postLimit) {
                alert(`თქვენ ამოწურეთ განცხადებების ლიმიტი (${postLimit}).`);
                return;
            }

            if (photos.length > photoLimit) {
                alert(`მაქსიმუმ შეგიძლიათ ატვირთოთ ${photoLimit} ფოტო.`);
                return;
            }

            // მონაცემების შენახვა
            try {
                await addDoc(collection(db, "items"), {
                    title: document.getElementById('title').value,
                    description: document.getElementById('description').value,
                    category: document.getElementById('category').value,
                    ownerId: user.uid,
                    isVIP: isVIP,
                    createdAt: serverTimestamp(),
                    // 9. ვადა: 30 დღე (ავტომატური წაშლისთვის)
                    expiresAt: Date.now() + (30 * 24 * 60 * 60 * 1000) 
                });
                alert("განცხადება წარმატებით დაემატა!");
                window.location.href = "index.html";
            } catch (err) {
                alert("შეცდომა: " + err.message);
            }
        };
    </script>
</body>
</html>
