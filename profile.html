<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>პირადი კაბინეტი - VIP EXCHANGE</title>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4">

    <div class="max-w-2xl mx-auto space-y-6">
        <!-- პროფილის ბარათი -->
        <div class="bg-white p-6 rounded-2xl shadow-lg border-b-4 border-blue-600">
            <div class="flex items-center justify-between">
                <div>
                    <h1 id="userEmail" class="font-bold text-lg text-gray-800">იტვირთება...</h1>
                    <p id="vipStatus" class="text-sm text-gray-500 italic">ჩვეულებრივი წევრი</p>
                </div>
                <button onclick="logout()" class="text-red-500 text-sm font-bold">გამოსვლა</button>
            </div>
        </div>

        <!-- VIP შეთავაზება -->
        <div id="vipPromo" class="bg-orange-500 p-6 rounded-2xl text-white shadow-xl flex flex-col items-center text-center">
            <h2 class="text-xl font-black">გახდი VIP წევრი! 👑</h2>
            <p class="text-sm my-2">5 განცხადება, 14 ფოტო თითოზე, 30 დღე - მხოლოდ 2 ლარად!</p>
            <a href="vip.html" class="mt-4 bg-white text-orange-600 px-8 py-2 rounded-full font-bold shadow-md active:scale-95">აქტივაცია - 2₾</a>
        </div>

        <!-- მომხმარებლის განცხადებები -->
        <div>
            <h3 class="font-bold text-gray-700 mb-4 flex justify-between items-center">
                ჩემი განცხადებები 
                <a href="add-item.html" class="text-blue-600 text-sm">+ დამატება</a>
            </h3>
            <div id="myItems" class="grid grid-cols-1 gap-4">
                <!-- აქ გამოჩნდება პოსტები -->
                <p class="text-gray-400 text-sm text-center py-10">თქვენ ჯერ არ გაქვთ განცხადებები</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './js/firebase-config.js';
        import { onAuthStateChanged, signOut } from "https://gstatic.com";
        import { doc, getDoc, collection, query, where, getDocs } from "https://gstatic.com";

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "login.html"; // თუ არ არის შესული, გადააგდოს ლოგინზე
                return;
            }

            // მომხმარებლის მონაცემების წამოღება
            document.getElementById('userEmail').innerText = user.email;
            const userDoc = await getDoc(doc(db, "users", user.uid));
            
            if (userDoc.exists()) {
                const data = userDoc.data();
                if (data.isVip) {
                    document.getElementById('vipStatus').innerText = "👑 VIP წევრი (აქტიურია 30 დღე)";
                    document.getElementById('vipPromo').classList.add('hidden');
                }
            }

            // მომხმარებლის პოსტების წამოღება
            loadMyItems(user.uid);
        });

        async function loadMyItems(uid) {
            const q = query(collection(db, "items"), where("ownerId", "==", uid));
            const snap = await getDocs(q);
            const container = document.getElementById('myItems');
            
            if (!snap.empty) {
                container.innerHTML = "";
                snap.forEach(doc => {
                    const item = doc.data();
                    container.innerHTML += `
                        <div class="bg-white p-3 rounded-xl shadow flex gap-4 items-center">
                            <img src="${item.images || 'assets/img/default.jpg'}" class="w-20 h-20 object-cover rounded-lg">
                            <div class="flex-grow">
                                <h4 class="font-bold text-sm truncate">${item.title}</h4>
                                <p class="text-xs text-gray-400">ვადა: 30 დღე</p>
                            </div>
                            <button class="text-red-400">🗑️</button>
                        </div>
                    `;
                });
            }
        }

        window.logout = () => {
            signOut(auth).then(() => window.location.href = "index.html");
        };
    </script>
</body>
</html>
