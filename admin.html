<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ადმინ პანელი - Swap.ge</title>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex">

    <!-- Sidebar -->
    <aside class="w-64 bg-indigo-900 text-white hidden md:flex flex-col sticky top-0 h-screen">
        <div class="p-6">
            <h2 class="text-2xl font-black tracking-tighter">SWAP ADMIN</h2>
        </div>
        <nav class="flex-1 px-4 space-y-2">
            <button onclick="showSection('add-item')" class="w-full text-left py-3 px-4 rounded-lg bg-indigo-800 font-bold">➕ განცხადების დამატება</button>
            <button onclick="showSection('users-list')" class="w-full text-left py-3 px-4 rounded-lg hover:bg-indigo-800 transition">👥 VIP მომხმარებლები</button>
            <a href="index.html" class="block py-3 px-4 rounded-lg hover:bg-indigo-800 transition">🌐 საიტზე დაბრუნება</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-8">
        <!-- განცხადების დამატების სექცია -->
        <section id="add-item" class="max-w-3xl mx-auto bg-white rounded-2xl shadow-sm p-8">
            <h3 class="text-2xl font-bold mb-6 text-gray-800">ახალი განცხადების გამოქვეყნება</h3>
            <form id="admin-form" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="title" placeholder="დასახელება" class="p-3 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" required>
                    <input type="number" id="price" placeholder="ფასი (₾)" class="p-3 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" required>
                </div>
                <textarea id="description" placeholder="აღწერა..." rows="4" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" required></textarea>
                <input type="url" id="imageUrl" placeholder="სურათის ლინკი (URL)" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" required>
                <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold hover:bg-indigo-700 transition">გამოქვეყნება</button>
            </form>
        </section>

        <!-- VIP მომხმარებლების სექცია (დროებით დამალული) -->
        <section id="users-list" class="hidden max-w-4xl mx-auto bg-white rounded-2xl shadow-sm p-8 text-center text-gray-400">
            აქ გამოჩნდება VIP მომხმარებლების სია...
        </section>
    </main>

    <script type="module" src="js/admin.js"></script>
    <script>
        function showSection(id) {
            document.getElementById('add-item').classList.add('hidden');
            document.getElementById('users-list').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }
    </script>
</body>
</html>
