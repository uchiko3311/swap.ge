<!-- BOG Payment Button Section -->
<div class="payment-container p-6 bg-white shadow-xl rounded-2xl border-2 border-orange-400">
    <h2 class="text-xl font-bold text-center mb-4">VIP აქტივაცია - 2 ₾</h2>
    <p class="text-sm text-gray-600 text-center mb-6">
        გადახდის შემდეგ თქვენი პროფილი ავტომატურად გახდება VIP 30 დღით.
    </p>
    
    <button id="checkout-button" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-lg transition shadow-lg">
        გადახდა (Bank of Georgia)
    </button>
</div>

<script type="module">
    import { auth, db } from './js/firebase-config.js';
    import { doc, updateDoc } from "https://gstatic.com";

    document.getElementById('checkout-button').onclick = async () => {
        const user = auth.currentUser;
        if (!user) {
            alert("გთხოვთ, ჯერ გაიაროთ ავტორიზაცია!");
            window.location.href = "login.html";
            return;
        }

        // აქ უნდა იყოს ბანკის Checkout ბმული
        // დროებით გამოვიყენოთ სიმულაცია, სანამ ბანკი მოგცემს რეალურ Merchant ID-ს
        const confirmPayment = confirm("გსურთ 2 ლარის გადახდა VIP სტატუსისთვის?");
        
        if (confirmPayment) {
            try {
                const userRef = doc(db, "users", user.uid);
                await updateDoc(userRef, {
                    isVip: true,
                    postLimit: 5,
                    vipExpiry: new Date(Date.now() + 30 * 24 * 60 * 60 * 1000) // 30 დღე
                });
                alert("გილოცავთ! თქვენ გააქტიურეთ VIP სტატუსი.");
                window.location.href = "profile.html";
            } catch (error) {
                console.error("შეცდომა:", error);
            }
        }
    };
</script>
