<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კონტაქტი - Swap.ge</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --orange: #e67e22; --orange-deep: #d35400; --dark: #2c3e50; --bg: #fdf2e9; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #333; }
        
        header { background: var(--orange-deep); padding: 15px 0; border-bottom: 3px solid var(--dark); text-align: center; }
        .logo { color: white; text-decoration: none; font-weight: bold; font-size: 24px; }

        .container { max-width: 900px; margin: 40px auto; padding: 20px; }
        .contact-card { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-wrap: wrap; }
        
        .contact-info { padding: 40px; flex: 1; min-width: 300px; background: var(--dark); color: white; }
        .contact-info h2 { color: var(--orange); margin-top: 0; }
        .info-item { display: flex; align-items: center; margin-bottom: 20px; gap: 15px; }
        .info-item i { font-size: 20px; color: var(--orange); width: 25px; }
        .info-item a { color: white; text-decoration: none; transition: 0.3s; }
        .info-item a:hover { color: var(--orange); }

        .contact-form { padding: 40px; flex: 1.5; min-width: 300px; }
        .contact-form h2 { margin-top: 0; color: var(--dark); }
        .form-group { margin-bottom: 15px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-family: inherit; }
        button { background: var(--orange); color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        button:hover { background: var(--orange-deep); }

        footer { text-align: center; padding: 20px; margin-top: 40px; color: #7f8c8d; font-size: 14px; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">🤝 SWAP.GE</a>
</header>

<div class="container">
    <div class="contact-card">
        <!-- საკონტაქტო ინფორმაცია -->
        <div class="contact-info">
            <h2>საკონტაქტო ინფორმაცია</h2>
            <p>გაქვთ კითხვები? მოგვწერეთ ან დაგვიკავშირდით ნებისმიერ დროს.</p>
            
            <div class="info-item">
                <i class="fas fa-envelope"></i>
                <a href="mailto:suportswap@gmail.com">suportswap@gmail.com</a>
            </div>
            
            <div class="info-item">
                <i class="fas fa-phone"></i>
                <a href="tel:+995511520532">+995 511 52 05 32</a>
            </div>
            
            <div class="info-item">
                <i class="fas fa-map-marker-alt"></i>
                <span>საქართველო, თბილისი</span>
            </div>

            <div style="margin-top: 30px; border-top: 1px solid #455a64; padding-top: 20px;">
                <p>სამუშაო საათები:<br>ორშაბათი - კვირა: 24/7</p>
            </div>
        </div>

        <!-- საკონტაქტო ფორმა -->
        <div class="contact-form">
            <h2>მოგვწერეთ</h2>
            <form action="#">
                <div class="form-group">
                    <input type="text" placeholder="თქვენი სახელი" required>
                </div>
                <div class="form-group">
                    <input type="email" placeholder="თქვენი ელ-ფოსტა" required>
                </div>
                <div class="form-group">
                    <textarea placeholder="თქვენი შეტყობინება..." rows="5" required></textarea>
                </div>
                <button type="submit">გაგზავნა</button>
            </form>
        </div>
    </div>
</div>

<footer>
    <p>&copy; 2026 Swap.com.ge - ყველა უფლება დაცულია</p>
</footer>

</body>
</html>
