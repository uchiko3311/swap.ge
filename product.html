<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>განცხადების დეტალები - Swap.ge</title>
    <script async src="https://googlesyndication.com" crossorigin="anonymous"></script>
    <script src="https://tailwindcss.com"></script>
    <link href="https://cloudflare.com" rel="stylesheet">
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Noto Sans Georgian', sans-serif; }
        .gallery-track { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; }
        .gallery-item { min-width: 100%; scroll-snap-align: start; height: 400px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50">
    <nav class="bg-white/80 backdrop-blur-md p-4 sticky top-0 z-50 border-b border-gray-100">
        <div class="max-w-2xl mx-auto flex items-center justify-between">
            <a href="index.html" class="w-10 h-10 flex items-center justify-center bg-gray-100 rounded-full text-gray-600 active:scale-90 transition"><i class="fas fa-arrow-left"></i></a>
            <h1 id="topTitle" class="font-black text-[10px] uppercase tracking-tighter truncate max-w-[200px] text-gray-400 italic">განცხადება</h1>
            <button onclick="shareLink()" class="w-10 h-10 flex items-center justify-center bg-gray-100 rounded-full text-gray-600"><i class="fas fa-share-alt"></i></button>
        </div>
    </nav>
    <div class="max-w-2xl mx-auto">
        <div class="relative bg-black group">
            <div id="gallery" class="gallery-track no-scrollbar"></div>
            <div id="photoCounter" class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-black/50 backdrop-blur-md text-white text-[10px] px-4 py-1.5 rounded-full font-black tracking-widest uppercase">1 / 1</div>
        </div>
        <div class="bg-white rounded-t-[40px] -mt-10 relative z-10 p-8 shadow-2xl min-h-[500px]">
            <div id="vipBadge" class="hidden mb-4 inline-flex items-center bg-amber-400 text-white text-[9px] px-3 py-1 rounded-full font-black uppercase tracking-widest"><i class="fas fa-crown mr-1.5"></i> VIP განცხადება</div>
            <h2 id="itemTitle" class="text-2xl font-black text-gray-900 leading-tight mb-4 italic italic">იტვირთება...</h2>
            <div class="flex items-center gap-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-8 pb-8 border-b border-gray-50">
                <span class="flex items-center"><i class="far fa-calendar-alt mr-2 text-blue-500"></i> <span id="itemDate">--/--/--</span></span>
                <span class="flex items-center"><i class="far fa-eye mr-2 text-blue-500"></i> ნახვა: <span id="viewCount">0</span></span>
            </div>
            <div class="mb-10"><h4 class="text-[10px] font-black text-blue-600 uppercase tracking-[0.2em] mb-4 flex items-center"><span class="w-2 h-2 bg-blue-600 rounded-full mr-2"></span> აღწერა</h4><p id="itemDescription" class="text-gray-600 leading-relaxed text-sm whitespace-pre-wrap italic"></p></div>
            <div class="sticky bottom-6 mt-10"><a id="contactBtn" href="https://m.me" target="_blank" class="flex items-center justify-center gap-3 w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-sm uppercase tracking-widest shadow-xl shadow-blue-200 active:scale-95 transition"><i class="fab fa-facebook-messenger text-xl"></i> მფლობელთან დაკავშირება</a></div>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getFirestore, doc, getDoc, updateDoc, increment } from "https://gstatic.com";
        const firebaseConfig = { apiKey: "AIzaSyAEUjh_mVRLTzUecRJbeG_K6gTp__FVft0", authDomain: "://firebaseapp.com", projectId: "swap-39e13", storageBucket: "swap-39e13.firebasestorage.app", messagingSenderId: "107187341554", appId: "1:107187341554:web:75533a380b58a7a141286b" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        const urlParams = new URLSearchParams(window.location.search); const itemId = urlParams.get('id');
        async function init() {
            if (!itemId) { window.location.href = 'index.html'; return; }
            try {
                const docRef = doc(db, "ads", itemId); const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    const d = docSnap.data(); await updateDoc(docRef, { views: increment(1) });
                    document.getElementById('itemTitle').innerText = d.title; document.getElementById('topTitle').innerText = d.title;
                    document.getElementById('itemDescription').innerText = d.description; document.getElementById('itemDate').innerText = new Date(d.createdAt?.toDate()).toLocaleDateString('ka-GE');
                    document.getElementById('viewCount').innerText = (d.views || 0) + 1;
                    if(d.isVIP) document.getElementById('vipBadge').classList.remove('hidden');
                    const gallery = document.getElementById('gallery'); gallery.innerHTML = '';
                    const imgs = Array.isArray(d.images) ? d.images : [d.images];
                    imgs.forEach((img) => { gallery.innerHTML += `<div class="gallery-item flex items-center justify-center"><img src="${img}" class="w-full h-full object-cover"></div>`; });
                    document.getElementById('photoCounter').innerText = `1 / ${imgs.length}`;
                    gallery.addEventListener('scroll', () => { const idx = Math.round(gallery.scrollLeft / gallery.offsetWidth) + 1; document.getElementById('photoCounter').innerText = `${idx} / ${imgs.length}`; });
                }
            } catch (e) { console.error(e); }
        }
        window.shareLink = () => { if (navigator.share) { navigator.share({ title: document.getElementById('itemTitle').innerText, url: window.location.href }); } };
        init();
    </script>
</body>
</html>
