<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>სიცილის ოთახი 🍊😂</title>

<style>
body { margin:0; overflow:hidden; font-family: Arial; background:#FFAA55; }

#overlay{
    position:absolute; top:10px; left:10px; z-index:10; color:white;
}

button{
    padding:10px 20px; margin:5px; border:none; border-radius:8px;
    cursor:pointer; background:#FF5722; color:white; font-weight:bold;
}

#jokeBox{
    position:absolute; bottom:50px; left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.6);
    color:white; padding:15px 25px;
    border-radius:15px;
    font-size:20px;
    max-width:90%;
    text-align:center;
}

.like{ cursor:pointer; font-size:22px; margin-left:10px;}
.count{ font-size:16px; margin-left:5px;}

#goalText{
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:36px;
    font-weight:bold;
    text-shadow:2px 2px 15px #000;
}
</style>
</head>

<body>

<div id="overlay">
    <button id="musicBtn">▶ მუსიკა</button>
    <button onclick="nextJoke()">შემდეგი 😂</button>
    <span class="like" onclick="likeJoke()">❤️</span>
    <span class="count" id="likeCount">0</span>
</div>

<div id="goalText">100000 ❤️ ავიყვანოთ!</div>

<div id="jokeBox">დააჭირე "შემდეგი 😂" 😄</div>

<audio id="bgMusic" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/OrbitControls.js"></script>

<script>
// 👇 100 ხუმრობა (პირველი შენი)
const jokes=[
"ცოტნე და შორენა ბიბის ასეირნებენ რატო? იმიტო🤣",
"რატომ არ მუშაობს კომპიუტერი? – Wi-Fi დაიძინა!",
"რატომ არ დადის ქათამი ფიტნესზე? – კვერცხებს უფრთხილდება!",
"რატომ არ იცინის პროგრამისტი? – error!",
"რატომ არ მიდის სტუდენტი ლექციაზე? – Zoom-შია!",
"რატომ არ ჭამს კატა? – boss-ია!",
"რატომ არ მუშაობს აპი? – bug!",
"რატომ არ წერს ფანქარი? – გატეხილია!",
"რატომ არ მიდის დრო? – მიდის 😄",
"რატომ არ უყვარს პროგრამისტს მზე? – dark mode!"
];

// ფოტოები
const images=[
"https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e",
"https://images.unsplash.com/photo-1502685104226-ee32379fefbe",
"https://images.unsplash.com/photo-1517841905240-472988babdf9",
"https://images.unsplash.com/photo-1544005313-94ddf0286df2"
];

let currentIndex=0;
let likes=JSON.parse(localStorage.getItem("likes"))||{};

const jokeBox=document.getElementById("jokeBox");
const likeCount=document.getElementById("likeCount");

const music=document.getElementById("bgMusic");
const musicBtn=document.getElementById("musicBtn");

musicBtn.onclick=()=>{
    if(music.paused){
        music.play();
        musicBtn.textContent="⏸ მუსიკა";
    }else{
        music.pause();
        musicBtn.textContent="▶ მუსიკა";
    }
};

function nextJoke(){
    currentIndex=Math.floor(Math.random()*jokes.length);
    jokeBox.textContent=jokes[currentIndex];
    setRandomPhoto();
    updateLikes();
}

function likeJoke(){
    if(!likes[currentIndex]) likes[currentIndex]=0;
    likes[currentIndex]++;
    localStorage.setItem("likes",JSON.stringify(likes));
    updateLikes();
    fireworks();
}

function updateLikes(){
    likeCount.textContent=likes[currentIndex]||0;
}

// 🎆 fireworks
function fireworks(){
    for(let i=0;i<10;i++){
        const f=document.createElement("div");
        f.style.position="absolute";
        f.style.width="5px"; f.style.height="5px";
        f.style.borderRadius="50%";
        f.style.background=`hsl(${Math.random()*360},100%,50%)`;
        f.style.left=(window.innerWidth/2+Math.random()*100-50)+"px";
        f.style.top=(window.innerHeight/2+Math.random()*50-25)+"px";
        document.body.appendChild(f);
        setTimeout(()=>f.remove(),800);
    }
}

// THREE SCENE
const scene=new THREE.Scene();
scene.background=new THREE.Color(0xFFAA55);

const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,1.5,5);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

const controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;

// light
const light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,5);
scene.add(light);
scene.add(new THREE.AmbientLight(0xffffff,0.3));

// ground
const ground=new THREE.Mesh(
new THREE.PlaneGeometry(50,50),
new THREE.MeshLambertMaterial({color:0x228B22})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

// card
const cardMat=new THREE.MeshBasicMaterial({color:0xffffff});
const card=new THREE.Mesh(
new THREE.BoxGeometry(1.5,2,0.1),
cardMat
);
card.position.set(0,1,0);
scene.add(card);

const loader=new THREE.TextureLoader();
function setRandomPhoto(){
loader.load(images[Math.floor(Math.random()*images.length)],tex=>{
cardMat.map=tex;
cardMat.needsUpdate=true;
});
}
setRandomPhoto();

// simple waterfall
const count=50;
const geo=new THREE.BufferGeometry();
const pos=new Float32Array(count*3);

for(let i=0;i<count;i++){
pos[i*3]=0;
pos[i*3+1]=Math.random()*3+1;
pos[i*3+2]=0;
}

geo.setAttribute('position',new THREE.BufferAttribute(pos,3));

const water=new THREE.Points(
geo,
new THREE.PointsMaterial({color:0x3399ff,size:0.1})
);

scene.add(water);

// animate
let mx=0,my=0;
document.addEventListener("mousemove",e=>{
mx=(e.clientX/innerWidth-0.5)*Math.PI;
my=(e.clientY/innerHeight-0.5)*Math.PI;
});

function animate(){
requestAnimationFrame(animate);

card.rotation.y=mx;
card.rotation.x=my;

// waterfall
const arr=geo.attributes.position.array;
for(let i=0;i<count;i++){
arr[i*3+1]-=0.05;
if(arr[i*3+1]<0) arr[i*3+1]=Math.random()*3+1;
}
geo.attributes.position.needsUpdate=true;

controls.update();
renderer.render(scene,camera);
}
animate();

onresize=()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
};
</script>

</body>
</html>
