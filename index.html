<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>swap.ge - VIP EXCHANGE</title>
    <!-- Tailwind CSS (აუცილებელია დიზაინისთვის) -->
    <script src="https://tailwindcss.com"></script>
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Fira GO', sans-serif; }
        
        /* ბანერების სლაიდერის სტილი */
        .banner-container { display: flex; transition: transform 0.7s ease-in-out; width: 500%; height: 100%; }
        .banner-slide { width: 20%; height: 100%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 20px; }
        
        /* VIP ბარათის ეფექტი */
        .vip-card { border: 2px solid #f59e0b; box-shadow: 0 10px 15px -3px rgba(245, 158, 11, 0.2); }
    </style>
</head>
<body class="bg-gray-100">

    <!-- HEADER -->
    <header class="bg-white shadow-md sticky top-0 z-50 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 text-2xl font-black text-blue-700">
                <span>🤝</span> swap<span class="text-orange-500">.ge</span>
            </a>
            <div id="auth-nav">
                <a href="login.html" class="bg-blue-600 text-white px-5 py-2 rounded-full font-bold text-sm shadow-md">შესვლა</a>
            </div>
        </div>
        <!-- AdSense Slot Top -->
        <div class="mt-3 w-full h-12 bg-gray-50 border border-dashed border-gray-300 flex items-center justify-center text-[10px] text-gray-400">
            GOOGLE ADSENSE TOP BANNER
        </div>
    </header>

    <!-- SLIDER -->
    <section class="relative w-full h-48 md:h-64 overflow-hidden bg-gray-300">
        <div class="banner-container" id="slider">
            <div class="banner-slide bg-blue-800">ბანერი 1</div>
            <div class="banner-slide bg-orange-600">ბანერი 2</div>
            <div class="banner-slide bg-green-700">ბანერი 3</div>
            <div class="banner-slide bg-purple-700">ბანერი 4</div>
            <div class="banner-slide bg-red-700">ბანერი 5</div>
        </div>
    </section>

    <!-- CONTENT -->
    <main class="container mx-auto p-4 flex flex-col gap-6">
        
        <div class="flex justify-between items-center">
            <h2 class="text-xl font-bold border-l-4 border-blue-600 pl-3">ბოლო განცხადებები</h2>
            <a href="add-item.html" class="text-blue-600 font-bold text-sm">+ დამატება</a>
        </div>

        <div id="items-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <!-- პოსტები აქ გამოჩნდება -->
            <p class="text-gray-400 text-xs col-span-2 text-center py-10">ჩატვირთვა...</p>
        </div>

        <!-- VIP PROMO -->
        <div class="bg-gradient-to-r from-orange-400 to-orange-600 p-6 rounded-2xl text-white shadow-lg">
            <h3 class="text-lg font-black italic">VIP პაკეტი 👑</h3>
            <p class="text-sm mt-1">5 პოსტი • 14 ფოტო • 30 დღე</p>
            <div class="mt-4 flex justify-between items-center">
                <span class="text-2xl font-bold text-white">2 ₾</span>
                <a href="vip.html" class="bg-white text-orange-600 px-6 py-2 rounded-xl font-bold shadow-md">ყიდვა</a>
            </div>
        </div>

        <!-- AdSense Sidebar Slot -->
        <div class="w-full h-64 bg-gray-50 border border-dashed border-gray-300 flex items-center justify-center text-[10px] text-gray-400">
            ADSENSE SIDEBAR
        </div>
    </main>

    <footer class="p-8 text-center text-gray-400 text-xs mt-10">
        <p>© 2026 swap.ge - ყველა უფლება დაცულია</p>
    </footer>

    <!-- LOGIC -->
    <script type="module">
        import { db, auth } from './js/firebase-config.js';
        import { collection, getDocs, query, orderBy, limit } from "https://gstatic.com";

        // სლაიდერის მუშაობა
        let currentSlide = 0;
        const slider = document.getElementById('slider');
        setInterval(() => {
            currentSlide = (currentSlide + 1) % 5;
            slider.style.transform = `translateX(-${currentSlide * 20}%)`;
        }, 5000);

        // პოსტების წამოღება
        async function getPosts() {
            const grid = document.getElementById('items-grid');
            try {
                const snap = await getDocs(query(collection(db, "items"), orderBy("createdAt", "desc"), limit(12)));
                grid.innerHTML = "";
                snap.forEach(doc => {
                    const post = doc.data();
                    grid.innerHTML += `
                        <div class="bg-white rounded-xl shadow p-2">
                            <img src="${post.images || 'https://placeholder.com'}" class="w-full h-32 object-cover rounded-lg">
                            <h4 class="font-bold text-xs mt-2 truncate">${post.title}</h4>
                            <p class="text-blue-600 font-bold text-sm mt-1">${post.price ? post.price + '₾' : 'გაცვლა'}</p>
                        </div>
                    `;
                });
            } catch (e) {
                grid.innerHTML = "<p class='text-gray-400 text-xs col-span-2 text-center'>განცხადებები ჯერ არ არის.</p>";
            }
        }
        getPosts();
    </script>
</body>
</html>
