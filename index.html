<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ჩემი კაბინეტი - Swap.ge</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --orange: #e67e22; --orange-deep: #d35400; --dark: #2c3e50; --bg: #fdf2e9; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #333; }
        header { background: var(--orange-deep); padding: 15px 0; border-bottom: 3px solid var(--dark); text-align: center; }
        .logo { color: white; text-decoration: none; font-weight: bold; font-size: 22px; }
        .container { max-width: 1000px; margin: 40px auto; padding: 20px; }
        .user-header { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .item { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; }
        .item img { width: 100%; height: 180px; object-fit: cover; }
        .item-info { padding: 15px; }
        .btn-delete { background: #e74c3c; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; }
        .btn-delete:hover { background: #c0392b; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">🤝 SWAP.GE</a>
</header>

<div class="container">
    <div class="user-header">
        <h2 id="userName">იტვირთება...</h2>
        <p id="userEmail"></p>
        <a href="index.html" style="color: var(--orange); text-decoration: none; font-weight: bold;">🏠 მთავარზე დაბრუნება</a>
    </div>

    <h3>📦 ჩემი განცხადებები</h3>
    <div class="grid" id="myListings">
        <!-- აქ გამოჩნდება მხოლოდ ამ მომხმარებლის პოსტები -->
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://gstatic.com";
    import { getAuth, onAuthStateChanged } from "https://gstatic.com";
    import { getFirestore, collection, query, where, getDocs, deleteDoc, doc } from "https://gstatic.com";

    const firebaseConfig = {
        apiKey: "AIzaSyCuFjbwcI3up46IoNEJfayWyGnXvABsOfM",
        authDomain: "://firebaseapp.com",
        projectId: "swap-5d311",
        storageBucket: "swap-5d311.firebasestorage.app",
        messagingSenderId: "444445838698",
        appId: "1:444445838698:web:18ab8580aa018d0236a913"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('userName').innerText = "მოგესალმებით, " + user.email.split('@')[0];
            document.getElementById('userEmail').innerText = user.email;
            loadMyListings(user.uid);
        } else {
            window.location.href = "auth.html"; // თუ არ არის შესული, გადააგდოს ავტორიზაციაზე
        }
    });

    async function loadMyListings(userId) {
        const q = query(collection(db, "listings"), where("userId", "==", userId));
        const snap = await getDocs(q);
        const grid = document.getElementById('myListings');
        grid.innerHTML = '';

        if(snap.empty) {
            grid.innerHTML = "<p>თქვენ ჯერ არ გაქვთ განცხადებები.</p>";
            return;
        }

        snap.forEach(listing => {
            const d = listing.data();
            grid.innerHTML += `
                <div class="item" id="item-${listing.id}">
                    <img src="${d.image}">
                    <div class="item-info">
                        <div style="font-weight:bold;">${d.title}</div>
                        <button class="btn-delete" onclick="deleteItem('${listing.id}')">❌ წაშლა</button>
                    </div>
                </div>`;
        });
    }

    window.deleteItem = async (id) => {
        if(confirm("დარწმუნებული ხართ, რომ გსურთ წაშლა?")) {
            await deleteDoc(doc(db, "listings", id));
            document.getElementById('item-' + id).remove();
        }
    }
</script>
</body>
</html>
