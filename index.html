<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWAP.GE | Mymarket Style</title>
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Fira GO', sans-serif; background-color: #f8f9fa; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .bottom-nav { border-top: 1px solid #eee; padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="pb-24">

    <!-- Header & Logo -->
    <header class="bg-white p-4 flex justify-between items-center shadow-sm">
        <div class="bg-[#ffcc00] px-4 py-1 rounded-full flex items-center">
            <span class="font-black text-xl italic tracking-tighter">swap<span class="text-white">.ge</span></span>
        </div>
        <i class="fas fa-bars text-2xl text-gray-400"></i>
    </header>

    <!-- Search Bar -->
    <div class="p-4">
        <div class="relative">
            <input type="text" placeholder="ჩაწერე საძიებო სიტყვა" class="w-full p-4 pl-12 bg-white border border-yellow-400 rounded-2xl outline-none text-sm shadow-sm">
            <i class="fas fa-search absolute left-4 top-4.5 text-gray-300 text-lg"></i>
        </div>
    </div>

    <!-- Promo Banners -->
    <div class="px-4 grid grid-cols-2 gap-3 mb-6">
        <div class="bg-[#1a1a1a] p-4 rounded-3xl text-white h-32 flex flex-col justify-between">
            <i class="fas fa-bars text-xl"></i>
            <span class="font-bold text-sm">ყველა კატეგორია</span>
        </div>
        <div class="bg-blue-500 p-4 rounded-3xl text-white h-32 relative overflow-hidden">
            <span class="font-bold text-xs relative z-10 leading-tight block">მეორადი<br>განვადებით</span>
            <img src="https://media-amazon.com" class="absolute right-0 bottom-0 w-20 opacity-50">
        </div>
    </div>

    <!-- Category Small Banners -->
    <div class="px-4 grid grid-cols-2 gap-3 mb-8">
        <div class="bg-[#fff9e6] p-4 rounded-3xl h-24 flex items-center justify-between">
            <span class="text-xs font-bold">მობილური<br>ტელეფონი</span>
            <img src="https://cdn-apple.com" class="w-12">
        </div>
        <div class="bg-[#fff3f3] p-4 rounded-3xl h-24 flex items-center justify-between overflow-hidden relative">
            <span class="text-xs font-bold">ფასდაკლებული</span>
            <div class="bg-red-500 text-white p-2 rounded-xl text-xl absolute -right-2 -bottom-2">%</div>
        </div>
    </div>

    <!-- Round Categories (Brands) -->
    <div class="px-4 mb-8 flex justify-between text-center">
        <div class="flex flex-col items-center gap-2">
            <div onclick="openPostModal()" class="w-16 h-16 border-2 border-dashed border-yellow-400 rounded-full flex items-center justify-center text-yellow-500 text-2xl cursor-pointer">
                <i class="fas fa-plus-circle"></i>
            </div>
            <span class="text-[10px] font-bold">დამატება</span>
        </div>
        <div class="flex flex-col items-center gap-2">
            <div class="w-16 h-16 bg-white shadow-sm rounded-full flex items-center justify-center">
                <i class="fab fa-apple text-2xl"></i>
            </div>
            <span class="text-[10px] font-bold uppercase">Apple</span>
        </div>
        <div class="flex flex-col items-center gap-2">
            <div class="w-16 h-16 bg-white shadow-sm rounded-full flex items-center justify-center p-4">
                <img src="https://wikimedia.org">
            </div>
            <span class="text-[10px] font-bold uppercase">Xiaomi</span>
        </div>
        <div class="flex flex-col items-center gap-2">
            <div class="w-16 h-16 bg-white shadow-sm rounded-full flex items-center justify-center text-[8px] font-black text-blue-800">SAMSUNG</div>
            <span class="text-[10px] font-bold uppercase">Samsung</span>
        </div>
    </div>

    <!-- Super VIP Section -->
    <div class="px-4 flex justify-between items-center mb-4">
        <div class="flex items-center gap-2">
            <div class="bg-orange-600 p-2 rounded-lg text-white"><i class="fas fa-rocket"></i></div>
            <span class="font-bold">Super Vip</span>
        </div>
        <span class="text-xs text-gray-500 font-bold">ყველას ნახვა</span>
    </div>

    <!-- Listings -->
    <div class="px-4 grid grid-cols-2 gap-4" id="listing-grid">
        <!-- დინამიურად ჩაიტვირთება -->
    </div>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 w-full bg-white flex justify-around p-3 bottom-nav z-50">
        <div class="flex flex-col items-center gap-1 text-indigo-600">
            <i class="fas fa-home text-xl"></i>
            <span class="text-[10px] font-bold">მთავარი</span>
        </div>
        <div class="flex flex-col items-center gap-1 text-gray-400">
            <i class="fas fa-th-large text-xl"></i>
            <span class="text-[10px] font-bold">კატეგორია</span>
        </div>
        <div onclick="openPostModal()" class="flex flex-col items-center gap-1 text-gray-400 cursor-pointer">
            <i class="fas fa-plus-circle text-xl"></i>
            <span class="text-[10px] font-bold">დამატება</span>
        </div>
        <div class="flex flex-col items-center gap-1 text-gray-400">
            <i class="fas fa-heart text-xl"></i>
            <span class="text-[10px] font-bold">ფავორიტები</span>
        </div>
        <div class="flex flex-col items-center gap-1 text-gray-400">
            <div class="w-6 h-6 bg-indigo-100 rounded-full overflow-hidden">
                <img src="https://w3schools.com">
            </div>
            <span class="text-[10px] font-bold">პროფილი</span>
        </div>
    </nav>

    <!-- Firebase Logic (იგივე რაც წინა პასუხებში) -->
    <script type="module">
        // აქ ჩასვი შენი Firebase Config
        // და პოსტების წამოღების ლოგიკა
    </script>
</body>
</html>
