<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>swap.ge - VIP EXCHANGE</title>
    <!-- Tailwind CSS დიზაინისთვის -->
    <script src="https://tailwindcss.com"></script>
    <!-- Google AdSense -->
    <script async src="https://googlesyndication.com" crossorigin="anonymous"></script>
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Fira GO', sans-serif; }
        .banner-slide { min-width: 100%; transition: transform 0.8s ease-in-out; }
    </style>
</head>
<body class="bg-gray-100">

    <!-- HEADER -->
    <header class="bg-white shadow-sm sticky top-0 z-50 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <!-- Logo -->
            <a href="index.html" class="flex items-center gap-2 text-2xl font-black text-blue-700">
                <span class="text-3xl">🤝</span>
                <span>swap<span class="text-orange-500">.ge</span></span>
            </a>
            
            <!-- Auth Button -->
            <div id="authSection">
                <a href="login.html" class="bg-blue-600 text-white px-5 py-2 rounded-full font-bold text-sm shadow-md hover:bg-blue-700 transition">შესვლა</a>
            </div>
        </div>
    </header>

    <!-- ADSENSE TOP -->
    <div class="container mx-auto px-4 mt-4">
        <div class="w-full h-20 bg-gray-50 border border-dashed border-gray-300 flex items-center justify-center text-[10px] text-gray-400 uppercase">
            Google AdSense Banner
        </div>
    </div>

    <!-- 5 AUTOMATIC BANNER SLIDER -->
    <section class="relative w-full h-48 md:h-72 bg-gray-200 mt-4 overflow-hidden">
        <div id="bannerWrapper" class="flex h-full transition-transform duration-700">
            <!-- ბანერები ჩაიტვირთება Firebase-დან -->
            <div class="banner-slide bg-blue-800 flex items-center justify-center text-white font-bold">ბანერი 1</div>
            <div class="banner-slide bg-orange-600 flex items-center justify-center text-white font-bold">ბანერი 2</div>
            <div class="banner-slide bg-green-700 flex items-center justify-center text-white font-bold">ბანერი 3</div>
            <div class="banner-slide bg-purple-700 flex items-center justify-center text-white font-bold">ბანერი 4</div>
            <div class="banner-slide bg-red-700 flex items-center justify-center text-white font-bold">ბანერი 5</div>
        </div>
    </section>

    <!-- MAIN CONTENT -->
    <main class="container mx-auto p-4 flex flex-col md:flex-row gap-6">
        
        <!-- FEED -->
        <div class="flex-grow">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold border-l-4 border-blue-600 pl-3">ბოლო განცხადებები</h2>
                <a href="add-item.html" class="bg-green-500 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-md">+ დამატება</a>
            </div>

            <div id="itemsGrid" class="grid grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- პოსტები აქ გამოჩნდება -->
                <p class="text-gray-400 text-xs text-center py-20 col-span-2">ჩატვირთვა...</p>
            </div>
        </div>

        <!-- SIDEBAR -->
        <aside class="w-full md:w-80 space-y-6">
            <!-- VIP BOX -->
            <div class="bg-gradient-to-br from-orange-400 to-orange-600 p-6 rounded-2xl text-white shadow-xl">
                <h3 class="font-black text-lg italic uppercase">VIP პაკეტი 👑</h3>
                <p class="text-xs mt-1 opacity-90">5 განცხადება • 14 ფოტო • 30 დღე</p>
                <div class="mt-6 flex items-center justify-between">
                    <span class="text-3xl font-bold italic">2 ₾</span>
                    <a href="vip.html" class="bg-white text-orange-600 px-6 py-2 rounded-xl font-black text-sm uppercase shadow-lg">ყიდვა</a>
                </div>
            </div>

            <!-- AdSense Sidebar -->
            <div class="w-full h-80 bg-gray-50 border border-dashed border-gray-300 flex items-center justify-center text-[10px] text-gray-400 uppercase">
                AdSense Sidebar
            </div>
        </aside>
    </main>

    <footer class="bg-white border-t mt-20 py-10 text-center text-gray-400 text-xs">
        <p>© 2026 swap.ge - ყველა უფლება დაცულია</p>
    </footer>

    <!-- JS LOGIC -->
    <script type="module">
        import { db, auth } from './js/firebase-config.js';
        import { collection, getDocs, query, orderBy, limit } from "https://gstatic.com";
        import { onAuthStateChanged } from "https://gstatic.com";

        // 1. სლაიდერის მუშაობა
        let index = 0;
        const wrapper = document.getElementById('bannerWrapper');
        setInterval(() => {
            index = (index + 1) % 5;
            wrapper.style.transform = `translateX(-${index * 100}%)`;
        }, 5000);

        // 2. განცხადებების წამოღება
        async function loadItems() {
            const grid = document.getElementById('itemsGrid');
            try {
                const q = query(collection(db, "items"), orderBy("createdAt", "desc"), limit(12));
                const snap = await getDocs(q);
                grid.innerHTML = "";
                
                if (snap.empty) {
                    grid.innerHTML = "<p class='text-gray-400 text-xs text-center col-span-2'>განცხადებები ჯერ არ არის.</p>";
                    return;
                }

                snap.forEach(doc => {
                    const item = doc.data();
                    grid.innerHTML += `
                        <div class="bg-white rounded-2xl shadow-sm overflow-hidden hover:shadow-lg transition cursor-pointer">
                            <img src="${item.images || 'https://placeholder.com'}" class="w-full h-32 md:h-44 object-cover">
                            <div class="p-3">
                                <h4 class="font-bold text-sm truncate">${item.title}</h4>
                                <div class="flex justify-between items-center mt-2">
                                    <span class="text-blue-700 font-black text-sm">${item.price ? item.price + '₾' : 'გაცვლა'}</span>
                                    <span class="text-[10px] text-gray-400">📅 30დ</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                console.error(e);
            }
        }

        // 3. ავტორიზაციის შემოწმება
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('authSection').innerHTML = `
                    <a href="profile.html" class="font-bold text-blue-600 text-sm">👤 კაბინეტი</a>
                `;
            }
        });

        loadItems();
    </script>
</body>
</html>
