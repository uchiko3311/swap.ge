<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swap.ge</title>

<link rel="stylesheet" href="style.css">

<!-- Google AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"></script>
</head>

<body>

<header>
  <div class="logo">Swap.ge</div>

  <div class="nav">
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
    <button onclick="buyVIP()">VIP 2₾</button>
  </div>
</header>

<!-- 🔥 TOP ADS -->
<div class="ad">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-2383560102833914"
       data-ad-slot="1234567890"
       data-ad-format="auto"></ins>
</div>

<!-- 🎯 BANNER SLIDER -->
<div class="banner-container">
  <div id="bannerTrack" class="banner-track"></div>
</div>

<!-- POST FORM -->
<div class="form">
  <input id="title" placeholder="სათაური">
  <textarea id="desc" placeholder="აღწერა"></textarea>
  <input type="file" id="file">
  <button id="postBtn">დამატება</button>
</div>

<!-- POSTS -->
<div id="posts"></div>

<!-- 🔥 BOTTOM ADS -->
<div class="ad">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-2383560102833914"
       data-ad-slot="1234567890"
       data-ad-format="auto"></ins>
</div>

<script type="module" src="app.js"></script>

</body>
</html>
