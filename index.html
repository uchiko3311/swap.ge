<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swap.ge - გაცვალე ჭკვიანურად</title>
    <script src="https://tailwindcss.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <!-- Font Awesome ლოგოებისთვის -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .vip-gold { border: 2px solid #ffd700; box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); }
        .banner-slide { display: none; }
        .active-slide { display: block; animation: fade 0.5s ease-in-out; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50">

    <!-- 1 & 2. ნავიგაცია და ლოგო -->
    <nav class="bg-white border-b sticky top-0 z-50 shadow-sm">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 text-2xl font-black text-indigo-600">
                <i class="fas fa-handshake"></i> SWAP.GE
            </a>
            
            <!-- 7. საძიებო ველი -->
            <div class="hidden md:block flex-1 max-w-md mx-8">
                <div class="relative">
                    <input type="text" id="main-search" placeholder="რას ეძებ დღეს?" class="w-full bg-gray-100 border-none rounded-full py-2 px-10 focus:ring-2 focus:ring-indigo-500">
                    <i class="fas fa-search absolute left-4 top-3 text-gray-400"></i>
                </div>
            </div>

            <!-- 3, 5, 6. ავტორიზაცია და პირადი კაბინეტი -->
            <div id="auth-ui" class="flex items-center gap-4">
                <a href="login.html" class="bg-indigo-600 text-white px-6 py-2 rounded-full font-bold text-sm">შესვლა</a>
            </div>
        </div>
    </nav>

    <!-- 8. ადმინის 5 მოძრავი ბანერი -->
    <div class="container mx-auto px-4 mt-6">
        <div id="banner-slider" class="relative h-48 md:h-64 bg-gray-200 rounded-3xl overflow-hidden shadow-inner">
            <!-- ბანერები ჩაიტვირთება Firestore-დან (მხოლოდ ადმინის დამატებული) -->
            <div class="banner-slide active-slide h-full flex items-center justify-center bg-indigo-500 text-white italic text-xl font-bold">
                განათავსეთ თქვენი რეკლამა აქ
            </div>
        </div>
    </div>

    <main class="container mx-auto px-4 py-10">
        
        <!-- 12. კატეგორიები -->
        <div class="flex gap-4 mb-10 overflow-x-auto pb-4 no-scrollbar">
            <button class="flex items-center gap-2 bg-white px-6 py-3 rounded-2xl shadow-sm border hover:border-indigo-500 transition whitespace-nowrap"><i class="fas fa-laptop text-indigo-500"></i> ტექნიკა</button>
            <button class="flex items-center gap-2 bg-white px-6 py-3 rounded-2xl shadow-sm border hover:border-indigo-500 transition whitespace-nowrap"><i class="fas fa-home text-indigo-500"></i> სახლი</button>
            <button class="flex items-center gap-2 bg-white px-6 py-3 rounded-2xl shadow-sm border hover:border-indigo-500 transition whitespace-nowrap"><i class="fas fa-car text-indigo-500"></i> ავტომობილი</button>
            <button class="flex items-center gap-2 bg-white px-6 py-3 rounded-2xl shadow-sm border hover:border-indigo-500 transition whitespace-nowrap"><i class="fas fa-ellipsis-h text-indigo-500"></i> სხვა</button>
        </div>

        <!-- 4 & 10. VIP განცხადებების სექცია -->
        <div id="vip-section" class="hidden mb-12">
            <h3 class="text-xl font-black mb-6 flex items-center gap-2 text-amber-600">
                <i class="fas fa-crown"></i> VIP განცხადებები
            </h3>
            <div id="vip-container" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <!-- მხოლოდ VIP მომხმარებლებისთვის ჩანს -->
            </div>
        </div>

        <!-- ჩვეულებრივი განცხადებები -->
        <h3 class="text-xl font-black mb-6">ბოლო განცხადებები</h3>
        <div id="items-container" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- 11. Google AdSense ბანერები ჩაჯდება განცხადებებს შორის JS-ით -->
        </div>
    </main>

    <!-- 9. განცხადების დამატების მცურავი ღილაკი -->
    <a href="add-item.html" class="fixed bottom-8 right-8 bg-indigo-600 text-white w-16 h-16 rounded-full flex items-center justify-center shadow-2xl hover:scale-110 transition z-50">
        <i class="fas fa-plus text-xl"></i>
    </a>

    <!-- Firebase და მთავარი ლოგიკა -->
    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getAuth, onAuthStateChanged } from "https://gstatic.com";
        import { getFirestore, doc, getDoc } from "https://gstatic.com";

        const firebaseConfig = {
            apiKey: "AIzaSyAEUjh_mVRLTzUecRJbeG_K6gTp__FVft0",
            authDomain: "://firebaseapp.com",
            projectId: "swap-39e13",
            storageBucket: "swap-39e13.firebasestorage.app",
            messagingSenderId: "107187341554",
            appId: "1:107187341554:web:75533a380b58a7a141286b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            const authUi = document.getElementById('auth-ui');
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                const userData = userDoc.data();
                
                // 4. VIP წვდომის შემოწმება
                if (userData?.isVIP) {
                    document.getElementById('vip-section').classList.remove('hidden');
                }

                // 5 & 6. პირადი კაბინეტი და სეთინგები
                authUi.innerHTML = `
                    <div class="flex items-center gap-3">
                        <a href="profile.html" class="flex items-center gap-2 bg-gray-100 px-4 py-2 rounded-full hover:bg-gray-200 transition">
                            <i class="fas fa-user-circle text-indigo-600"></i>
                            <span class="text-sm font-bold">კაბინეტი</span>
                        </a>
                        <a href="settings.html" class="text-gray-400 hover:text-indigo-600 transition">
                            <i class="fas fa-cog"></i>
                        </a>
                    </div>
                `;
            }
        });

        // 8. სლაიდერის ლოგიკა
        let currentSlide = 0;
        const slides = document.getElementsByClassName('banner-slide');
        setInterval(() => {
            if(slides.length < 2) return;
            slides[currentSlide].classList.remove('active-slide');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active-slide');
        }, 5000);
    </script>

    <script type="module" src="js/main.js"></script>
</body>
</html>
