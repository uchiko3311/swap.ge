<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>😂 3D სიცილის ოთახი</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle, #fff3e0, #ffcc80);
    font-family: Arial;
    text-align: center;
    overflow: hidden;
}

h1 {
    margin-top: 30px;
    color: #ff6f00;
}

button {
    padding: 15px 40px;
    font-size: 20px;
    border: none;
    border-radius: 15px;
    background: orange;
    cursor: pointer;
    transition: 0.3s;
}
button:hover {
    transform: scale(1.1);
}

#card {
    width: 300px;
    height: 300px;
    margin: 50px auto;
    perspective: 1000px;
}

.inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 1s;
}

.flip {
    transform: rotateY(180deg);
}

.front, .back {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 20px;
    backface-visibility: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.front {
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
}

.front img {
    width: 90%;
    border-radius: 15px;
}

.back {
    background: #fff8e1;
    transform: rotateY(180deg);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    font-size: 18px;
}

/* Confetti */
.confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    background: red;
    animation: fall 2s linear infinite;
}

@keyframes fall {
    0% { transform: translateY(-100px); }
    100% { transform: translateY(600px); }
}
</style>

</head>
<body>

<h1>😂 3D სიცილის ოთახი 😂</h1>
<button onclick="nextJoke()">დააჭირე 😂</button>

<div id="card">
    <div class="inner" id="inner">
        <div class="front">
            <img id="img" src="https://i.imgur.com/8Km9tLL.jpg">
        </div>
        <div class="back" id="joke">დააჭირე ღილაკს 😄</div>
    </div>
</div>

<script>
let jokes = [];

fetch('jokes.json')
.then(res => res.json())
.then(data => jokes = data.jokes);

const images = [
    "https://i.imgur.com/8Km9tLL.jpg",
    "https://i.imgur.com/1J8r7nC.jpg",
    "https://i.imgur.com/4AiXzf8.jpg",
    "https://i.imgur.com/2XqQf4t.jpg"
];

function nextJoke() {
    const card = document.getElementById("inner");
    const jokeDiv = document.getElementById("joke");
    const img = document.getElementById("img");

    const j = jokes[Math.floor(Math.random() * jokes.length)];
    const i = images[Math.floor(Math.random() * images.length)];

    jokeDiv.textContent = j;
    img.src = i;

    card.classList.toggle("flip");

    createConfetti();
}

function createConfetti() {
    for(let i=0;i<20;i++){
        let c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random()*100+"%";
        c.style.background = `hsl(${Math.random()*360},100%,50%)`;
        document.body.appendChild(c);

        setTimeout(()=>c.remove(),2000);
    }
}
</script>

</body>
</html>
