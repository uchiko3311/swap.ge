<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>😂 სიცილის ოთახი 😂</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(120deg, #fff8e1, #ffe082);
            text-align: center;
            padding: 50px;
        }
        h1 {
            color: #ff6f00;
            font-size: 3em;
            margin-bottom: 30px;
        }
        button {
            background-color: #ffca28;
            border: none;
            padding: 15px 40px;
            font-size: 1.3em;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s, background-color 0.3s;
        }
        button:hover {
            transform: scale(1.1);
            background-color: #ffc107;
        }
        #joke {
            margin-top: 40px;
            font-size: 1.5em;
            color: #6d4c41;
            min-height: 60px;
            opacity: 0;
            transition: opacity 0.6s, transform 0.6s;
        }
        img {
            margin-top: 20px;
            max-width: 300px;
            border-radius: 15px;
            display: none;
            transition: transform 0.6s, opacity 0.6s;
        }
        .show {
            opacity: 1 !important;
            transform: scale(1.05);
        }
        /* Flash animation for fun */
        @keyframes flash {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.2) rotate(5deg); filter: brightness(1.5); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        .flash {
            animation: flash 0.6s ease-in-out;
        }
    </style>
</head>
<body>

    <h1>😂 სიცილის ოთახი 😂</h1>
    <button onclick="showJoke()">გაგვეცინეთ!</button>
    <div id="joke"></div>
    <img id="jokeImg" src="" alt="Funny Image">

    <script>
        const jokes = [
            "რატომ არ შეუძლია მამალ ილანას კარაქის სროლა? – იმიტომ, რომ ის უკვე შიგნითაა!",
            "როცა კომპიუტერი სიცილით კვდება – ეძახიან ‘byte’!",
            "რატომ იყენებს ვირთხა Google Translate-ს? – რომ ხუმრობა მოხვდეს ყველგან!",
            "მამალი და ძაღლი სალონში – ჩათვლიან, რომ კომედია ხდება!"
        ];

        const images = [
            "https://i.imgur.com/8Km9tLL.jpg",
            "https://i.imgur.com/1J8r7nC.jpg",
            "https://i.imgur.com/4AiXzf8.jpg",
            "https://i.imgur.com/2XqQf4t.jpg"
        ];

        function showJoke() {
            // შემთხვევითი ხუმრობა და სურათი
            const jokeIndex = Math.floor(Math.random() * jokes.length);
            const imageIndex = Math.floor(Math.random() * images.length);
            
            const jokeDiv = document.getElementById('joke');
            const img = document.getElementById('jokeImg');

            // ხუმრობის ჩასმა და ანიმაცია
            jokeDiv.textContent = jokes[jokeIndex];
            jokeDiv.style.opacity = 0;
            jokeDiv.style.transform = 'scale(0.8)';
            setTimeout(() => {
                jokeDiv.style.opacity = 1;
                jokeDiv.style.transform = 'scale(1)';
            }, 50);

            // სურათის განახლება და ანიმაცია
            img.src = images[imageIndex];
            img.style.display = 'block';
            img.classList.remove('flash'); // წინა ანიმაციის გასუფთავება
            void img.offsetWidth; // Reflow
            img.classList.add('flash');
        }
    </script>

</body>
</html>
