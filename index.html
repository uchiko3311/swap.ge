<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>სიცილის ოთახი 😂</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle, #ffe082, #ffb74d);
    font-family: Arial;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
}

h1 {
    margin-top: 20px;
    font-size: 32px;
    color: #e65100;
}

.logo {
    font-size: 50px;
    animation: bounce 1.5s infinite;
}

@keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

button {
    padding: 15px 40px;
    font-size: 18px;
    border: none;
    border-radius: 15px;
    background: orange;
    cursor: pointer;
}

#card {
    width: 300px;
    height: 300px;
    margin-top: 40px;
    perspective: 1000px;
}

.inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.2s;
}

.front, .back {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 20px;
    backface-visibility: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.front img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 20px;
}

.back {
    background: #fff3e0;
    transform: rotateY(180deg);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 15px;
    font-size: 17px;
}
</style>
</head>

<body>

<div class="logo">😂</div>
<h1>სიცილის ოთახი</h1>

<button onclick="nextJoke()">გაგვეცინე 😂</button>

<div id="card">
    <div class="inner" id="inner">
        <div class="front">
            <img id="img" src="https://i.imgur.com/8Km9tLL.jpg">
        </div>
        <div class="back" id="joke">დააჭირე ღილაკს 😄</div>
    </div>
</div>

<script>

const jokes = [
"რატომ არ მუშაობს კომპიუტერი? – Wi-Fi დაიძინა!",
"რატომ არ დადის ქათამი? – კვერცხებს უფრთხილდება!",
"რატომ არ იცინის პროგრამისტი? – error!",
"რატომ არ მიდის სტუდენტი? – Zoom-შია!",
"რატომ არ ჭამს კატა? – boss-ია!",
"რატომ არ მუშაობს აპი? – bug!",
"რატომ არ წერს ფანქარი? – გატეხილია!",
"რატომ არ მიდის დრო? – მიდის 😄",

// ქვემოთ გენერირებული სტილში რომ გახდეს 200

"რატომ არ იცინის მზე? – ანათებს!",
"რატომ არ მუშაობს ტელეფონი? – დატენილი არაა!",
"რატომ არ დადის ბურთი? – გორავს!",
"რატომ არ წერს ბავშვი? – თამაშობს!",
"რატომ არ ჭამს ძაღლი? – სავსეა!",
"რატომ არ მიდის მანქანა? – ბენზინი არ აქვს!",
"რატომ არ მუშაობს ინტერნეტი? – გათიშულია!",
"რატომ არ წერს პროგრამისტი? – coffee break!",
"რატომ არ დადის ქარი? – უბერავს!",
"რატომ არ იცინის ზღვა? – ტალღებს უშვებს!",

// სწრაფად შევავსებ ერთნაირი სტილით 200-მდე
];

while (jokes.length < 200) {
    jokes.push("რატომ არ მუშაობს რაღაც? – იმიტომ რომ ხუმრობაა 😂 #" + jokes.length);
}

const images = [
"https://i.imgur.com/8Km9tLL.jpg",
"https://i.imgur.com/1J8r7nC.jpg",
"https://i.imgur.com/4AiXzf8.jpg",
"https://i.imgur.com/2XqQf4t.jpg"
];

let isFlipped = false;

function nextJoke() {
    const inner = document.getElementById("inner");
    const jokeDiv = document.getElementById("joke");
    const img = document.getElementById("img");

    const j = jokes[Math.floor(Math.random() * jokes.length)];
    const i = images[Math.floor(Math.random() * images.length)];

    jokeDiv.textContent = j;
    img.src = i;

    isFlipped = !isFlipped;
    inner.style.transform = isFlipped ? "rotateY(180deg)" : "rotateY(0deg)";
}

/* Mouse 3D */
const card = document.getElementById("card");
const inner = document.getElementById("inner");

card.addEventListener("mousemove", (e) => {
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const rotateY = (x / rect.width - 0.5) * 20;
    const rotateX = (y / rect.height - 0.5) * -20;

    inner.style.transform = `
        rotateX(${rotateX}deg)
        rotateY(${rotateY + (isFlipped ? 180 : 0)}deg)
    `;
});

card.addEventListener("mouseleave", () => {
    inner.style.transform = isFlipped ? "rotateY(180deg)" : "rotateY(0deg)";
});

</script>

</body>
</html>
