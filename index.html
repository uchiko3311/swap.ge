<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketplace PRO</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;

/* ✅ BACKGROUND IMAGE */
background-image:url("./bg.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;
}

/* 🔥 dark overlay */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
z-index:-1;
}

header{
background:#ff6a00;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.container{
padding:10px;
}

.card{
background:rgba(20,10,5,0.75);
backdrop-filter:blur(8px);
padding:10px;
margin-bottom:10px;
border-radius:12px;
border:1px solid #ff6a00;
}

input, button{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:none;
}

button{
background:#ff6a00;
color:white;
cursor:pointer;
font-weight:bold;
}

img{
width:100%;
border-radius:10px;
margin-top:8px;
}

.hidden{display:none;}
</style>

</head>

<body>

<header>🔥 Marketplace PRO GE</header>

<div class="container">

<!-- AUTH -->
<div id="authBox" class="card">
<h3>შესვლა / რეგისტრაცია</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="პაროლი">

<div class="row">
<button onclick="register()">რეგისტრაცია</button>
<button onclick="login()">შესვლა</button>
</div>
</div>

<!-- POST -->
<div id="postBox" class="card hidden">
<h3>განცხადების დამატება</h3>

<input id="title" placeholder="სათაური">
<input id="price" placeholder="ფასი">
<input type="file" id="file">

<button onclick="addPost()">დამატება</button>
</div>

<!-- POSTS -->
<div id="posts"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
getStorage,
ref,
uploadBytes,
getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";


// 🔥 Firebase config (შენი ჩასვი)
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_AUTH_DOMAIN",
projectId: "YOUR_PROJECT_ID",
storageBucket: "YOUR_BUCKET",
messagingSenderId: "XXXX",
appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);


// ================= AUTH =================
window.register = async () => {
let email = document.getElementById("email").value;
let pass = document.getElementById("password").value;

await createUserWithEmailAndPassword(auth,email,pass);
alert("რეგისტრაცია OK");
};

window.login = async () => {
let email = document.getElementById("email").value;
let pass = document.getElementById("password").value;

await signInWithEmailAndPassword(auth,email,pass);
};

window.logout = () => signOut(auth);


// ================= ADD POST =================
window.addPost = async () => {
let title = document.getElementById("title").value;
let price = document.getElementById("price").value;
let file = document.getElementById("file").files[0];

let imgRef = ref(storage,"images/"+file.name);
await uploadBytes(imgRef,file);
let url = await getDownloadURL(imgRef);

await addDoc(collection(db,"posts"),{
title,
price,
image:url,
time:Date.now()
});

loadPosts();
};


// ================= LOAD POSTS =================
async function loadPosts(){
let q = query(collection(db,"posts"),orderBy("time","desc"));
let snap = await getDocs(q);

let html="";

snap.forEach(doc=>{
let d = doc.data();

html+=`
<div class="card">
<h3>${d.title}</h3>
<strong>${d.price} ₾</strong>
<img src="${d.image}">
</div>
`;
});

document.getElementById("posts").innerHTML = html;
}


// ================= AUTH STATE =================
onAuthStateChanged(auth,(user)=>{
if(user){
document.getElementById("authBox").classList.add("hidden");
document.getElementById("postBox").classList.remove("hidden");
loadPosts();
}else{
document.getElementById("authBox").classList.remove("hidden");
document.getElementById("postBox").classList.add("hidden");
}
});

</script>

</body>
</html>
