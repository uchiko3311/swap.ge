<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Marketplace PRO</title>

<style>
body{
margin:0;
font-family:Arial;
background:#120806;
color:white;
}

header{
background:#ff6a00;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.container{padding:10px;}

.card{
background:#1e0f09;
padding:10px;
margin-bottom:10px;
border-radius:12px;
border:1px solid #ff6a00;
}

input, button{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:none;
}

button{
background:#ff6a00;
color:white;
cursor:pointer;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

img{
width:100%;
border-radius:10px;
margin-top:5px;
}

.hidden{display:none;}
</style>

</head>
<body>

<header>🔥 Marketplace PRO (REAL SYSTEM)</header>

<div class="container">

<!-- LOGIN -->
<div id="authBox" class="card">
<h3>შესვლა / რეგისტრაცია</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="პაროლი">

<div class="row">
<button onclick="register()">რეგისტრაცია</button>
<button onclick="login()">შესვლა</button>
</div>
</div>

<!-- CREATE POST -->
<div id="postBox" class="card hidden">
<h3>განცხადების დამატება</h3>

<input id="title" placeholder="სათაური">
<input id="price" placeholder="ფასი">

<input type="file" id="file">

<button onclick="addPost()">დამატება</button>
<button onclick="logout()">გასვლა</button>
</div>

<!-- POSTS -->
<div id="posts"></div>

</div>
