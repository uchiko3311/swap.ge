<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWAP.GE - გაცვალე ყველაფერი</title>
    <script src="https://tailwindcss.com"></script>
    <!-- Google AdSense -->
    <script async src="https://googlesyndication.com" crossorigin="anonymous"></script>
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Inter', sans-serif; background-color: #FFF5F0; }
        .banner-slide { display: none; height: 200px; }
        .active-slide { display: flex; animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <!-- 1 & 2. ნავიგაცია: ნარინჯისფერი ფონი და ხელის ჩამორთმევის ლოგო -->
    <nav class="bg-[#E65100] p-4 sticky top-0 z-50 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="text-white text-2xl font-black flex items-center gap-2 tracking-tighter">
                🤝 SWAP.GE
            </a>
            <div id="auth-ui">
                <!-- 3 & 5. ავტორიზაცია / პირადი კაბინეტი -->
                <a href="login.html" class="bg-[#1A237E] text-white px-5 py-2 rounded-lg font-bold flex items-center gap-2 text-sm shadow-lg">
                    👤 შესვლა
                </a>
            </div>
        </div>
    </nav>

    <!-- 8. ადმინის 5 მოძრავი ბანერი -->
    <div class="container mx-auto px-4 mt-4">
        <div id="banner-container" class="relative bg-gray-300 rounded-3xl overflow-hidden shadow-inner flex items-center justify-center text-gray-500 italic">
            <div class="banner-slide active-slide items-center justify-center w-full bg-gray-200">რეკლამა 1</div>
            <div class="banner-slide items-center justify-center w-full bg-gray-300">რეკლამა 2</div>
            <!-- დამატებითი ბანერები ჩაიტვირთება ადმინის მიერ -->
        </div>
    </div>

    <main class="container mx-auto px-4 py-8">
        
        <!-- 7. საძიებო ველი -->
        <div class="mb-8">
            <input type="text" id="search-input" placeholder="🔍 რას ეძებ?" class="w-full p-4 rounded-2xl border-none shadow-sm focus:ring-2 focus:ring-orange-500 outline-none">
        </div>

        <!-- 12. კატეგორიები -->
        <div class="flex gap-3 overflow-x-auto pb-4 mb-8 no-scrollbar">
            <button class="bg-white px-5 py-2 rounded-full shadow-sm text-sm font-bold border hover:border-orange-500">💻 ტექნიკა</button>
            <button class="bg-white px-5 py-2 rounded-full shadow-sm text-sm font-bold border hover:border-orange-500">🏠 სახლი</button>
            <button class="bg-white px-5 py-2 rounded-full shadow-sm text-sm font-bold border hover:border-orange-500">🚗 ავტომობილი</button>
            <button class="bg-white px-5 py-2 rounded-full shadow-sm text-sm font-bold border hover:border-orange-500">➕ სხვა</button>
        </div>

        <!-- 4 & 10. VIP განცხადებები -->
        <section id="vip-section" class="mb-10 hidden">
            <h3 class="text-xl font-black mb-4 flex items-center gap-2">👑 VIP განცხადებები</h3>
            <div id="vip-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <!-- მხოლოდ VIP მომხმარებლებისთვის -->
            </div>
            <hr class="mt-8 border-orange-100">
        </section>

        <!-- ბოლო განცხადებები -->
        <section>
            <h3 class="text-xl font-black mb-4 flex items-center gap-2">🔍 ბოლო განცხადებები</h3>
            <div id="items-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <!-- 11. აქ ჩაჯდება AdSense რეკლამები განცხადებებს შორის -->
                <div class="col-span-full text-center py-10 text-gray-400">იტვირთება...</div>
            </div>
        </section>
    </main>

    <!-- 9. განცხადების დამატება (მხოლოდ რეგისტრაციის მერე) -->
    <a href="add-item.html" class="fixed bottom-6 right-6 bg-[#E65100] text-white w-14 h-14 rounded-full flex items-center justify-center shadow-2xl hover:scale-110 transition z-50">
        <span class="text-2xl font-bold">+</span>
    </a>

    <!-- Firebase და ლოგიკა -->
    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getAuth, onAuthStateChanged } from "https://gstatic.com";
        import { getFirestore, doc, getDoc } from "https://gstatic.com";

        const firebaseConfig = {
            apiKey: "AIzaSyAEUjh_mVRLTzUecRJbeG_K6gTp__FVft0",
            authDomain: "://firebaseapp.com",
            projectId: "swap-39e13",
            storageBucket: "swap-39e13.firebasestorage.app",
            messagingSenderId: "107187341554",
            appId: "1:107187341554:web:75533a380b58a7a141286b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ავტორიზაციის და VIP-ის შემოწმება
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userSnap = await getDoc(doc(db, "users", user.uid));
                const userData = userSnap.data();
                
                // VIP წვდომა
                if (userData?.isVIP) {
                    document.getElementById('vip-section').classList.remove('hidden');
                }

                document.getElementById('auth-ui').innerHTML = `
                    <div class="flex items-center gap-3">
                        <a href="profile.html" class="text-white font-bold text-sm">კაბინეტი</a>
                        <a href="settings.html" class="text-orange-200">⚙️</a>
                    </div>
                `;
            }
        });

        // 8. ბანერის სლაიდერი
        let slideIndex = 0;
        const slides = document.getElementsByClassName("banner-slide");
        setInterval(() => {
            if(slides.length < 2) return;
            slides[slideIndex].classList.remove("active-slide");
            slideIndex = (slideIndex + 1) % slides.length;
            slides[slideIndex].classList.add("active-slide");
        }, 4000);
    </script>
</body>
</html>
