<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWAP.GE - Final Version</title>
    
    <link rel="stylesheet" href="https://cloudflare.com">
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        :root { --main: #27ae60; --dark: #2c3e50; --vip: #f1c40f; --bg: #f8fafc; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; flex-direction: column; min-height: 100vh; }

        header { background: #fff; padding: 10px 5%; box-shadow: 0 2px 15px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; }
        .nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .logo { font-size: 22px; font-weight: 900; color: var(--main); text-decoration: none; }
        
        .search-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .search-bar { flex: 1; position: relative; }
        .search-bar input { width: 100%; padding: 10px 15px; border-radius: 10px; border: 1px solid #eee; outline: none; box-sizing: border-box; }
        
        .btn { border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 5px; transition: 0.3s; }
        .btn-lang { background: var(--dark); color: white; width: 45px; }
        .btn-auth { background: #f1f5f9; color: var(--dark); border: 1px solid #ddd !important; }
        .btn-add { background: var(--main); color: white; flex: 1; }

        .cat-nav { display: flex; gap: 8px; overflow-x: auto; padding: 10px 5%; background: #fff; border-bottom: 1px solid #eee; scrollbar-width: none; }
        .cat-item { padding: 6px 15px; background: #f1f5f9; border-radius: 20px; white-space: nowrap; cursor: pointer; font-size: 13px; font-weight: 600; border: 1px solid transparent; }
        .cat-item.active { background: var(--main); color: white; }

        .container { padding: 20px 5%; display: grid; grid-template-columns: 1fr 300px; gap: 20px; flex: 1; }
        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.04); position: relative; border: 1px solid #eee; }
        .vip-tag { position: absolute; top: 8px; right: 8px; background: var(--vip); padding: 3px 8px; border-radius: 5px; font-weight: 900; font-size: 10px; z-index: 10; }
        .card img { width: 100%; height: 150px; object-fit: cover; }
        .card-body { padding: 12px; position: relative; }
        .card-price { color: var(--main); font-weight: bold; font-size: 1.1rem; }
        .del-ico { position: absolute; bottom: 12px; right: 12px; color: var(--danger); cursor: pointer; opacity: 0.4; }
        .del-ico:hover { opacity: 1; }

        .sidebar-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); position: sticky; top: 130px; }
        .vip-btn { width: 100%; background: var(--vip); padding: 12px; border-radius: 10px; border: none; font-weight: 900; margin-top: 10px; cursor: pointer; }

        footer { background: var(--dark); color: white; padding: 30px 5%; text-align: center; margin-top: auto; }

        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:2000; align-items:center; justify-content:center; }
        .modal-content { background:white; padding:25px; border-radius:15px; width:90%; max-width:380px; }
        input, select, textarea { width:100%; padding:10px; margin:8px 0; border:1px solid #ddd; border-radius:8px; box-sizing:border-box; }
    </style>
</head>
<body>

<header>
    <div class="nav-top">
        <a href="#" class="logo">SWAP.GE</a>
        <div style="display:flex; gap:8px;">
            <button class="btn btn-lang" onclick="toggleLang()" id="lBtn">KA</button>
            <button class="btn btn-auth" onclick="toggleModal('authM')"><i class="fas fa-user"></i></button>
        </div>
    </div>
    <div class="search-row">
        <div class="search-bar">
            <input type="text" id="sInp" placeholder="ძებნა..." onkeyup="search()">
        </div>
        <button class="btn btn-add" onclick="toggleModal('addM')"><i class="fas fa-plus"></i> განცხადება</button>
    </div>
</header>

<div class="cat-nav" id="cN">
    <div class="cat-item active" onclick="fCat('all')">ყველა</div>
    <div class="cat-item" onclick="fCat('ავტო')">ავტო</div>
    <div class="cat-item" onclick="fCat('ბინები')">ბინები</div>
    <div class="cat-item" onclick="fCat('ტექნიკა')">ტექნიკა</div>
</div>

<div class="container">
    <main>
        <div id="g" class="grid">იტვირთება...</div>
    </main>
    <aside>
        <div class="sidebar-card">
            <h4>ფილტრაცია</h4>
            <button class="btn" style="width:100%; margin-bottom:8px;" onclick="fVip(true)">მხოლოდ VIP</button>
            <button class="btn" style="width:100%; background:#eee" onclick="fVip(false)">ყველა</button>
            <button class="vip-btn" onclick="actVip()">VIP სტატუსი (2₾)</button>
        </div>
    </aside>
</div>

<footer>
    <p>&copy; 2024 SWAP.GE - ყველა უფლება დაცულია</p>
    <div style="gap:15px; display:flex; justify-content:center; font-size:20px;">
        <i class="fab fa-facebook"></i> <i class="fab fa-instagram"></i>
    </div>
</footer>

<!-- Modals -->
<div id="addM" class="modal"><div class="modal-content">
    <h3>დამატება</h3>
    <select id="iCat"><option value="ავტო">ავტო</option><option value="ბინები">ბინები</option><option value="ტექნიკა">ტექნიკა</option></select>
    <input type="text" id="iT" placeholder="სათაური">
    <input type="text" id="iP" placeholder="ფასი">
    <input type="text" id="iI" placeholder="სურათის URL">
    <button class="btn btn-add" style="width:100%" onclick="save()">გამოქვეყნება</button>
    <button onclick="toggleModal('addM')" style="width:100%; background:none; margin-top:10px;">დახურვა</button>
</div></div>

<script>
    // Firebase Config (Already Updated by User)
    const firebaseConfig = { apiKey: "AIzaSyAEUjh_mVRLTzUecRJbeG_K6gTp__FVft0", authDomain: "://firebaseapp.com", databaseURL: "https://firebaseio.com", projectId: "swap-39e13", storageBucket: "swap-39e13.firebasestorage.app", messagingSenderId: "107187341554", appId: "1:107187341554:web:75533a380b58a7a141286b" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let ads = [];

    function toggleModal(id) {
        const m = document.getElementById(id);
        m.style.display = (m.style.display==='flex') ? 'none' : 'flex';
    }

    function save() {
        const t=document.getElementById('iT').value, p=document.getElementById('iP').value, i=document.getElementById('iI').value, c=document.getElementById('iCat').value;
        if(!t || !p) return;
        db.ref('items/').push({ title:t, price:p, img:i, category:c, isVIP: localStorage.getItem('isVIP')==='true' });
        toggleModal('addM');
    }

    function load() {
        db.ref('items/').on('value', snap => {
            ads = [];
            snap.forEach(c => { ads.push({ ...c.val(), id:c.key }); });
            render(ads);
        });
    }

    function render(data) {
        const g = document.getElementById('g');
        g.innerHTML = data.slice().reverse().map(i => `
            <div class="card">
                ${i.isVIP ? '<div class="vip-tag">VIP</div>' : ''}
                <img src="${i.img || 'https://placeholder.com'}" onerror="this.src='https://placeholder.com'">
                <div class="card-body">
                    <h4>${i.title}</h4>
                    <div class="card-price">${i.price}</div>
                    <i class="fas fa-trash-alt del-ico" onclick="del('${i.id}')"></i>
                </div>
            </div>
        `).join('');
    }

    function del(id) { if(confirm("წავშალოთ?")) db.ref('items/'+id).remove(); }
    function search() { render(ads.filter(a => a.title.toLowerCase().includes(document.getElementById('sInp').value.toLowerCase()))); }
    function fCat(c) { render(c==='all' ? ads : ads.filter(a => a.category === c)); }
    function fVip(v) { render(v ? ads.filter(a => a.isVIP) : ads); }
    function actVip() { localStorage.setItem('isVIP', 'true'); location.reload(); }

    window.onload = () => load();
</script>
</body>
</html>
