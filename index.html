<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swap.com.ge - მთავარი</title>
    <script async src="https://googlesyndication.com" crossorigin="anonymous"></script>
    <script src="https://tailwindcss.com"></script>
    <link href="https://cloudflare.com" rel="stylesheet">
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Noto Sans Georgian', sans-serif; }
        .banner-track { display: flex; transition: transform 0.5s ease-in-out; }
        .banner-step { min-width: 100%; }
    </style>
</head>
<body class="bg-gray-100">

    <!-- ადმინ შესვლა (პატარა ღილაკი ქვევით) -->
    <div class="fixed bottom-2 right-2 z-50">
        <button onclick="showAdminLogin()" class="opacity-20 hover:opacity-100 text-[10px]">Admin</button>
    </div>

    <!-- ნავიგაცია -->
    <nav class="bg-white shadow-sm p-4 sticky top-0 z-50">
        <div class="flex justify-between items-center max-w-2xl mx-auto">
            <h1 class="text-xl font-bold text-blue-600">SWAP.GE</h1>
            <button onclick="toggleForm()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-xs font-bold shadow-lg">დამატება</button>
        </div>
    </nav>

    <div class="max-w-2xl mx-auto p-4">
        
        <!-- 🚀 ბანერების სლაიდერი (5 ცალი) -->
        <div class="relative overflow-hidden rounded-2xl mb-6 shadow-md bg-white">
            <div id="bannerTrack" class="banner-track">
                <!-- ბანერები ჩაიტვირთება დინამიურად -->
                <div class="banner-step h-40 bg-blue-100 flex items-center justify-center text-blue-300">იტვირთება...</div>
            </div>
            <!-- სლაიდერის წერტილები -->
            <div id="dots" class="absolute bottom-2 left-1/2 -translate-x-1/2 flex gap-1"></div>
        </div>

        <!-- დამატების ფორმა -->
        <div id="uploadSection" class="hidden bg-white rounded-2xl p-6 mb-8 shadow-xl border-t-4 border-blue-600">
            <h2 class="text-lg font-bold mb-4">ახალი განცხადება</h2>
            <form id="uploadForm" class="space-y-4">
                <input type="text" id="itemName" required class="w-full border p-3 rounded-xl outline-none" placeholder="რა ნივთია?">
                <textarea id="itemDesc" rows="3" required class="w-full border p-3 rounded-xl outline-none" placeholder="აღწერა..."></textarea>
                <input type="file" id="itemImages" multiple accept="image/*" class="w-full text-xs">
                <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold uppercase tracking-widest">განთავსება</button>
            </form>
        </div>

        <!-- პოსტების ფიდი -->
        <div id="postsContainer" class="space-y-6">
            <div id="loader" class="text-center py-10"><i class="fas fa-spinner fa-spin"></i></div>
        </div>
    </div>

    <!-- ადმინ პანელის მოდალი (დამალულია) -->
    <div id="adminModal" class="fixed inset-0 bg-black/80 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-2xl p-6">
            <h3 class="font-bold mb-4">ადმინ პანელი</h3>
            <div id="adminLoginForm">
                <input type="email" id="adminEmail" class="w-full border p-2 mb-2 rounded" placeholder="admin@gmail.com">
                <input type="password" id="adminPass" class="w-full border p-2 mb-4 rounded" placeholder="პაროლი">
                <button onclick="loginAdmin()" class="w-full bg-black text-white py-2 rounded font-bold">შესვლა</button>
            </div>
            <div id="adminControls" class="hidden">
                <p class="text-xs text-green-600 mb-4 font-bold">გამარჯობა ადმინ!</p>
                <label class="block text-xs mb-1">ახალი ბანერის ლინკი</label>
                <input type="text" id="bannerUrl" class="w-full border p-2 mb-2 rounded text-xs">
                <button onclick="uploadBanner()" class="w-full bg-blue-600 text-white py-2 rounded text-xs font-bold">ბანერის დამატება</button>
                <button onclick="closeAdmin()" class="w-full mt-4 text-gray-400 text-xs">დახურვა</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script>
        function toggleForm() { document.getElementById('uploadSection').classList.toggle('hidden'); }
        function showAdminLogin() { document.getElementById('adminModal').classList.remove('hidden'); }
        function closeAdmin() { document.getElementById('adminModal').classList.add('hidden'); }
    </script>
</body>
</html>
