<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swap.com.ge - გაცვლის პლატფორმა</title>

    <!-- Google AdSense -->
    <script async src="https://googlesyndication.com" crossorigin="anonymous"></script>

    <!-- Tailwind CSS & Icons -->
    <script src="https://tailwindcss.com"></script>
    <link href="https://cloudflare.com" rel="stylesheet">
    
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Noto Sans Georgian', sans-serif; -webkit-tap-highlight-color: transparent; }
        .banner-track { display: flex; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .banner-step { min-width: 100%; height: 180px; }
        .vip-card { border: 2px solid #fbbf24; box-shadow: 0 4px 20px rgba(251, 191, 36, 0.2); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <!-- ნავიგაცია -->
    <nav class="bg-white/90 backdrop-blur-md shadow-sm p-4 sticky top-0 z-50 border-b border-gray-100">
        <div class="flex justify-between items-center max-w-2xl mx-auto">
            <h1 class="text-2xl font-black text-blue-600 tracking-tighter italic uppercase">Swap.ge</h1>
            <button onclick="toggleForm()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-full text-xs font-black shadow-lg shadow-blue-100 transition active:scale-95">
                <i class="fas fa-plus mr-1"></i> დამატება
            </button>
        </div>
    </nav>

    <div class="max-w-2xl mx-auto p-4">
        
        <!-- 🚀 ბანერების სლაიდერი -->
        <div class="relative overflow-hidden rounded-[32px] mb-8 bg-white shadow-sm border border-gray-100 group">
            <div id="bannerTrack" class="banner-track">
                <div class="banner-step bg-gray-50 flex items-center justify-center text-gray-300 uppercase font-black text-[10px] tracking-widest italic">
                    <i class="fas fa-ad mr-2"></i> რეკლამა
                </div>
            </div>
            <div id="dots" class="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-2"></div>
        </div>

        <!-- განცხადების დამატების ფორმა -->
        <div id="uploadSection" class="hidden bg-white rounded-[32px] shadow-2xl p-8 mb-10 border border-blue-50 animate-in slide-in-from-top duration-500">
            <div class="flex justify-between items-center mb-8">
                <h2 class="font-black text-xl italic uppercase tracking-tighter text-gray-800">ახალი პოსტი</h2>
                <button onclick="toggleForm()" class="text-gray-300 hover:text-red-400 transition"><i class="fas fa-times-circle text-2xl"></i></button>
            </div>
            
            <form id="uploadForm" class="space-y-5">
                <div class="space-y-1">
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] ml-2">დასახელება</label>
                    <input type="text" id="itemName" required class="w-full border-gray-100 border-2 p-4 rounded-2xl outline-none focus:border-blue-400 bg-gray-50 font-bold transition" placeholder="მაგ: iPhone 13 Pro">
                </div>

                <div class="space-y-1">
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] ml-2">აღწერა და პირობები</label>
                    <textarea id="itemDesc" rows="4" required class="w-full border-gray-100 border-2 p-4 rounded-2xl outline-none focus:border-blue-400 bg-gray-50 font-medium transition" placeholder="რაში გაცვლით?"></textarea>
                </div>

                <div class="bg-blue-50 p-8 rounded-[24px] border-2 border-dashed border-blue-100 text-center group active:bg-blue-100 transition">
                    <input type="file" id="itemImages" multiple accept="image/*" class="hidden">
                    <button type="button" onclick="document.getElementById('itemImages').click()" class="text-blue-600 font-black text-xs uppercase tracking-widest italic">
                        <i class="fas fa-camera-retro text-3xl mb-3 block"></i>
                        ფოტოების არჩევა
                    </button>
                    <div class="flex justify-center gap-5 mt-4 text-[9px] font-black uppercase tracking-widest">
                        <span id="fileCount" class="text-gray-400">არჩეულია: 0</span>
                        <span id="limitNote" class="text-blue-500 underline decoration-2">ლიმიტი: 7 ფოტო</span>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-sm uppercase tracking-widest shadow-xl shadow-blue-100 active:scale-95 transition-all disabled:bg-gray-200">
                    გამოქვეყნება
                </button>
            </form>
        </div>

        <!-- VIP პრომო ბლოკი -->
        <div class="bg-gradient-to-br from-amber-400 via-orange-500 to-red-500 rounded-[32px] p-7 mb-10 text-white shadow-xl relative overflow-hidden flex justify-between items-center">
            <div class="relative z-10">
                <h3 class="font-black text-xl italic uppercase tracking-tighter mb-1">VIP სტატუსი 👑</h3>
                <p class="text-[10px] font-bold opacity-90 uppercase tracking-widest">14 ფოტო • 5 განცხადება • 30 დღე</p>
            </div>
            <button id="payBtn" class="relative z-10 bg-white text-orange-600 px-6 py-3 rounded-2xl font-black text-sm shadow-xl active:scale-95 transition-all">
                2.00 ₾
            </button>
            <i class="fas fa-bolt absolute -bottom-6 -right-6 text-white/20 text-9xl"></i>
        </div>

        <!-- პოსტების ფიდი -->
        <div class="flex items-center justify-between mb-8 px-2">
            <h3 class="font-black text-gray-800 uppercase text-[11px] tracking-[0.3em] flex items-center">
                <span class="w-10 h-[2px] bg-blue-600 mr-3 rounded-full"></span> ბოლო პოსტები
            </h3>
        </div>

        <div id="postsContainer" class="grid grid-cols-1 gap-8 min-h-[400px]">
            <!-- პოსტები ჩაიტვირთება app.js-დან -->
            <div id="loader" class="text-center py-24">
                <div class="inline-block w-10 h-10 border-[5px] border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                <p class="text-[10px] font-black text-gray-300 mt-6 uppercase tracking-[0.3em]">იტვირთება...</p>
            </div>
        </div>

        <!-- AdSense ქვედა რეკლამა -->
        <div class="mt-16 pt-10 border-t border-gray-100">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-format="autorelaxed"
                 data-ad-client="ca-pub-2383560102633914"
                 data-ad-slot="YOUR_AD_SLOT_ID"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>

    </div>

    <!-- 🔒 ადმინ მოდალი -->
    <div id="adminModal" class="fixed inset-0 bg-black/95 backdrop-blur-md z-[100] hidden flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[40px] p-10 shadow-2xl relative overflow-hidden">
            <div id="adminLoginForm">
                <h3 class="font-black uppercase italic mb-8 text-gray-800 tracking-widest text-xl">Admin Login</h3>
                <input type="email" id="adminEmail" class="w-full border-gray-100 border-2 p-5 rounded-2xl mb-4 outline-none focus:border-blue-400 bg-gray-50 font-bold transition" placeholder="Email">
                <input type="password" id="adminPass" class="w-full border-gray-100 border-2 p-5 rounded-2xl mb-8 outline-none focus:border-blue-400 bg-gray-50 font-bold transition" placeholder="Password">
                <button onclick="loginAdmin()" class="w-full bg-black text-white py-5 rounded-2xl font-black uppercase tracking-widest shadow-xl active:scale-95 transition-all">შესვლა</button>
            </div>
            <div id="adminControls" class="hidden text-center">
                <div class="w-20 h-20 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6">
                    <i class="fas fa-user-shield text-3xl"></i>
                </div>
                <h3 class="font-black uppercase italic mb-8 text-blue-600 tracking-widest">Admin Panel</h3>
                <input type="file" id="adminBannerFile" accept="image/*" class="mb-6 text-[10px] font-bold text-gray-400 uppercase tracking-widest block w-full">
                <button onclick="uploadBanner()" id="bannerUploadBtn" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black uppercase text-xs mb-4 shadow-xl shadow-blue-100 active:scale-95 transition-all">ბანერის ატვირთვა</button>
                <button onclick="closeAdmin()" class="w-full py-4 text-gray-300 font-black text-[10px] uppercase tracking-widest hover:text-red-400 transition">დახურვა</button>
            </div>
        </div>
    </div>

    <!-- ადმინ ღილაკი -->
    <button onclick="showAdminLogin()" class="fixed bottom-6 right-6 opacity-5 hover:opacity-100 text-[9px] font-black uppercase tracking-[0.3em] text-gray-400 z-40 transition-all">Admin Access</button>

    <script>
        function toggleForm() {
            const section = document.getElementById('uploadSection');
            section.classList.toggle('hidden');
            if(!section.classList.contains('hidden')) {
                section.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }
        function showAdminLogin() { document.getElementById('adminModal').classList.remove('hidden'); }
        function closeAdmin() { document.getElementById('adminModal').classList.add('hidden'); }
    </script>
    <script type="module" src="app.js"></script>

</body>
</html>
