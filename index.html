    align-items: center;

h1 {
    margin-top: 10px;
    color: #e65100;
}

.logo {
    font-size: 50px;
    animation: bounce 1.5s infinite;
}

}

button {

    font-size: 16px;

}

}

.front, .back {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 20px;
    backface-visibility: hidden;

}

.front img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 20px;
}

.back {

    justify-content: center;
    align-items: center;
    padding: 15px;

}

/* LIKE */

.count {

"https://i.imgur.com/4AiXzf8.jpg",
"https://i.imgur.com/2XqQf4t.jpg"
];

let currentIndex = 0;
let isFlipped = false;

let likes = JSON.parse(localStorage.getItem("likes")) || {};

function nextJoke() {
    const inner = document.getElementById("inner");

    isFlipped = !isFlipped;
    inner.style.transform = isFlipped ? "rotateY(180deg)" : "rotateY(0deg)";

    setTimeout(() => {
        currentIndex = Math.floor(Math.random() * jokes.length);

        document.getElementById("joke").textContent = jokes[currentIndex];
        document.getElementById("img").src = images[Math.floor(Math.random()*images.length)];

        updateLikes();
    }, 400);
}

function likeJoke() {
    if (!likes[currentIndex]) {
        likes[currentIndex] = 0;
    }
    likes[currentIndex]++;
    localStorage.setItem("likes", JSON.stringify(likes));
    updateLikes();
}

function updateLikes() {
    document.getElementById("likeCount").textContent =
        "Likes: " + (likes[currentIndex] || 0);
}

/* Mouse 3D */
const card = document.getElementById("card");
const inner = document.getElementById("inner");

card.addEventListener("mousemove", (e) => {
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const rotateY = (x / rect.width - 0.5) * 20;
    const rotateX = (y / rect.height - 0.5) * -20;

    inner.style.transform = `
        rotateX(${rotateX}deg)
        rotateY(${rotateY + (isFlipped ? 180 : 0)}deg)
    `;
});

card.addEventListener("mouseleave", () => {
    inner.style.transform = isFlipped ? "rotateY(180deg)" : "rotateY(0deg)";
});
