<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swap.com.ge - გაცვლა</title>
    <script src="https://tailwindcss.com"></script>
    <link href="https://cloudflare.com" rel="stylesheet">
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Noto Sans Georgian', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">

    <nav class="bg-white shadow-sm p-4 sticky top-0 z-50">
        <div class="flex justify-between items-center max-w-xl mx-auto">
            <h1 class="text-xl font-bold text-blue-600 tracking-tighter">SWAP.COM.GE</h1>
            <div id="statusBadge" class="text-[10px] bg-gray-200 px-2 py-1 rounded-full font-bold uppercase">უფასო</div>
        </div>
    </nav>

    <div class="max-w-xl mx-auto p-4">
        <!-- VIP ყიდვის სექცია -->
        <div class="bg-gradient-to-br from-indigo-600 to-blue-700 rounded-2xl p-5 mb-6 text-white shadow-xl relative overflow-hidden">
            <div class="relative z-10">
                <h3 class="font-bold text-lg mb-1"><i class="fas fa-crown text-yellow-400 mr-2"></i>VIP სტატუსი</h3>
                <p class="text-xs opacity-80 mb-4">5 განცხადება და 14 ფოტო 30 დღით</p>
                <button id="payBtn" class="w-full bg-white text-blue-700 py-3 rounded-xl font-bold text-sm shadow-md active:scale-95 transition">
                    გააქტიურება - 2.00 ₾
                </button>
            </div>
            <i class="fas fa-bolt absolute -bottom-4 -right-4 text-white/10 text-8xl"></i>
        </div>

        <!-- ფორმა -->
        <div class="bg-white rounded-2xl shadow-sm p-6 border border-gray-100">
            <form id="uploadForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1 ml-1">დასახელება</label>
                    <input type="text" id="itemName" required class="w-full border-gray-200 border p-3 rounded-xl focus:border-blue-500 outline-none transition" placeholder="მაგ: iPhone 13 Pro">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1 ml-1">აღწერა</label>
                    <textarea id="itemDesc" rows="3" required class="w-full border-gray-200 border p-3 rounded-xl focus:border-blue-500 outline-none transition" placeholder="მდგომარეობა, რაში ცვლით..."></textarea>
                </div>

                <div class="bg-gray-50 p-4 rounded-xl border-2 border-dashed border-gray-200 text-center">
                    <input type="file" id="itemImages" multiple accept="image/*" class="hidden">
                    <button type="button" onclick="document.getElementById('itemImages').click()" class="text-blue-600 font-bold text-sm">
                        <i class="fas fa-images mr-2 text-lg"></i> ფოტოების დამატება
                    </button>
                    <div class="flex justify-center gap-4 mt-2 text-[10px] font-bold text-gray-400 uppercase">
                        <span id="fileCount">არჩეულია: 0</span>
                        <span id="limitNote" class="text-orange-500 underline">ლიმიტი: 7</span>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-gray-900 text-white py-4 rounded-xl font-bold shadow-lg active:scale-95 disabled:bg-gray-300 transition-all">
                    განთავსება
                </button>
            </form>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
