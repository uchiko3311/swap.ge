<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>სიცილის ოთახი 🌿💦</title>
<style>
body { margin:0; overflow:hidden; font-family: Arial; background:#88cc88; }
#overlay{
    position:absolute; top:10px; left:10px; z-index:10; color:white;
}
button{
    padding:10px 20px; margin:5px; border:none; border-radius:8px; cursor:pointer;
    background:orange; color:white; font-weight:bold;
}
#jokeBox{
    position:absolute; bottom:50px; left:50%; transform:translateX(-50%);
    background:rgba(0,0,0,0.5); color:white; padding:15px 25px;
    border-radius:15px; font-size:20px; max-width:90%; text-align:center;
}
.like{ cursor:pointer; font-size:20px; display:inline-block; margin-left:10px;}
.count{ font-size:16px; display:inline-block; margin-left:5px;}
</style>
</head>
<body>

<div id="overlay">
    <button id="musicBtn">▶ მუსიკა</button>
    <button onclick="nextJoke()">შემდეგი 😂</button>
    <span class="like" onclick="likeJoke()">❤️</span>
    <span class="count" id="likeCount">0</span>
</div>

<div id="jokeBox">დააჭირე "შემდეგი 😂" ხუმრობისთვის 😄</div>

<audio id="bgMusic" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/OrbitControls.js"></script>

<script>
// 100 ხუმრობა
const jokes = [
"რატომ არ მუშაობს კომპიუტერი? – Wi-Fi დაიძინა!",
"რატომ არ დადის ქათამი ფიტნესზე? – კვერცხებს უფრთხილდება!",
"რატომ არ იცინის პროგრამისტი? – error!",
"რატომ არ მიდის სტუდენტი ლექციაზე? – Zoom-შია!",
"რატომ არ ჭამს კატა? – boss-ია!",
"რატომ არ მუშაობს აპი? – bug!",
"რატომ არ წერს ფანქარი? – გატეხილია!",
"რატომ არ მიდის დრო? – მიდის 😄",
"რატომ არ უყვარს პროგრამისტს მზე? – dark mode!",

"რატომ არ მუშაობს ინტერნეტი? – გათიშულია!",
"რატომ არ წერს სტუდენტი? – გამოცდაა!",
"რატომ არ დადის ქარი? – უბერავს!",
"რატომ არ იცინის ზღვა? – ტალღებს უშვებს!",
"რატომ არ ჭამს ძაღლი? – სავსეა!",
"რატომ არ მიდის მანქანა? – ბენზინი არ აქვს!",
"რატომ არ მუშაობს ტელევიზორი? – დენი არ არის!",
"რატომ არ წერს პროგრამისტი? – coffee break!",
"რატომ არ დადის ბურთი? – გორავს!",
"რატომ არ იცინის მზე? – ანათებს!",
"რატომ არ მიდის მატარებელი? – გაჩერებულია!",
"რატომ არ წერს წიგნი? – დასრულებულია!",
"რატომ არ ჭამს ლომი სალათს? – მეფეა!",
"რატომ არ მუშაობს საათი? – დრო დაიკარგა!",
"რატომ არ დადის მთვარე? – ბრუნავს!",
"რატომ არ წერს ფოსტა? – დაგვიანებულია!",
"რატომ არ ჭამს ბავშვი? – ტკბილეული უნდა!",
"რატომ არ იცინის კატა? – boss-ია!",
"რატომ არ მუშაობს ბანკი? – დახურულია!",
"რატომ არ წერს სკოლა? – არდადეგებია!",
"რატომ არ დადის გზა? – იქ არის!",

"რატომ არ იცინის საათი? – ticking!",
"რატომ არ მუშაობს ბაზარი? – კვირაა!",
"რატომ არ წერს კაცი? – ტელეფონზეა!",
"რატომ არ დადის კუ? – ნელია!",
"რატომ არ ჭამს თევზი? – წყალშია!",
"რატომ არ იცინის ბაღი? – ყვავილობს!",
"რატომ არ მუშაობს საიტი? – down!",
"რატომ არ წერს დრო? – გადის!",
"რატომ არ მიდის ცხოვრება? – მიდის!",
"რატომ არ ჭამს მზე? – ანათებს!",
"რატომ არ იცინის ძაღლი? – serious!",
"რატომ არ მუშაობს სისტემა? – crash!",
"რატომ არ წერს მელანი? – დამთავრდა!",
"რატომ არ დადის ქვა? – მძიმეა!",
"რატომ არ ჭამს ქათამი? – უკვე შეჭამა!",
"რატომ არ იცინის მთვარე? – ანათებს!",
"რატომ არ მუშაობს აპლიკაცია? – bug!",
"რატომ არ წერს ადამიანი? – ფიქრობს!",
"რატომ არ დადის ზღვა? – ტალღებს უშვებს!",
"რატომ არ ჭამს კატა? – ნაჭამია!",
"რატონ...
// სრულად 100 ხუმრობა უნდა ჩასვან
];

const images = [
"https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e",
"https://images.unsplash.com/photo-1502685104226-ee32379fefbe",
"https://images.unsplash.com/photo-1487412720507-e7ab37603c6f",
"https://images.unsplash.com/photo-1517841905240-472988babdf9",
"https://images.unsplash.com/photo-1544005313-94ddf0286df2"
];

let currentIndex=0;
let likes=JSON.parse(localStorage.getItem("likes"))||{};
const jokeBox=document.getElementById("jokeBox");
const likeCount=document.getElementById("likeCount");
const music=document.getElementById("bgMusic");
const musicBtn=document.getElementById("musicBtn");

musicBtn.addEventListener("click",()=>{
    if(music.paused){music.play(); musicBtn.textContent="⏸ მუსიკა";}
    else{music.pause(); musicBtn.textContent="▶ მუსიკა";}
});

function nextJoke(){
    currentIndex=Math.floor(Math.random()*jokes.length);
    jokeBox.textContent=jokes[currentIndex];
    updateLikes();
}

function likeJoke(){
    if(!likes[currentIndex]) likes[currentIndex]=0;
    likes[currentIndex]++;
    localStorage.setItem("likes",JSON.stringify(likes));
    updateLikes();
    triggerFireworks();
}

function updateLikes(){ likeCount.textContent=likes[currentIndex]||0; }

// FIREWORKS
function triggerFireworks(){
    for(let i=0;i<15;i++){
        const f=document.createElement("div");
        f.style.position="absolute"; f.style.width="5px"; f.style.height="5px"; f.style.borderRadius="50%";
        f.style.left=(window.innerWidth/2 + Math.random()*100-50)+"px";
        f.style.top=(window.innerHeight/2 + Math.random()*50-25)+"px";
        f.style.background=`hsl(${Math.random()*360},100%,50%)`;
        f.style.pointerEvents="none";
        document.body.appendChild(f);
        setTimeout(()=>f.remove(),800);
    }
}

// THREE.JS SCENE
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x88cc88);

const camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.set(0,2,5);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;
controls.dampingFactor=0.05;

// Light
const sun=new THREE.DirectionalLight(0xffffff,1);
sun.position.set(5,10,5);
scene.add(sun);
scene.add(new THREE.AmbientLight(0xffffff,0.3));

// Ground
const groundGeo=new THREE.PlaneGeometry(50,50);
const groundMat=new THREE.MeshLambertMaterial({color:0x228B22});
const ground=new THREE.Mesh(groundGeo,groundMat);
ground.rotation.x=-Math.PI/2; scene.add(ground);

// Trees
for(let i=0;i<15;i++){
    const treeGeo=new THREE.ConeGeometry(0.3,1,8);
    const treeMat=new THREE.MeshLambertMaterial({color:0x006400});
    const tree=new THREE.Mesh(treeGeo,treeMat);
    tree.position.set(Math.random()*20-10,0.5,Math.random()*20-10);
    scene.add(tree);
}

// 3D Card
const cardGeo=new THREE.BoxGeometry(1.5,2,0.1);
const cardMat=new THREE.MeshBasicMaterial({color:0xffffff});
const card=new THREE.Mesh(cardGeo,cardMat);
card.position.set(0,1,0);
scene.add(card);
const cardTexture=new THREE.TextureLoader().load(images[0]);
cardMat.map=cardTexture;

// WATERFALL particles
const waterfallCount=200;
const waterfallGeometry=new THREE.BufferGeometry();
const positions=new Float32Array(waterfallCount*3);
for(let i=0;i<waterfallCount;i++){
    positions[i*3]=0;
    positions[i*3+1]=Math.random()*4+1;
    positions[i*3+2]=0;
}
waterfallGeometry.setAttribute('position',new THREE.BufferAttribute(positions,3));
const waterfallMaterial=new THREE.PointsMaterial({color:0x3399ff,size:0.1,transparent:true,opacity:0.7});
const waterfall=new THREE.Points(waterfallGeometry,waterfallMaterial);
scene.add(waterfall);

// Animate
let mouseX=0, mouseY=0;
document.addEventListener('mousemove', e=>{
    mouseX=(e.clientX/window.innerWidth-0.5)*Math.PI;
    mouseY=(e.clientY/window.innerHeight-0.5)*Math.PI;
});

function animate(){
    requestAnimationFrame(animate);
    controls.update();
    card.rotation.y=mouseX;
    card.rotation.x=mouseY;

    // Waterfall animation
    const pos=waterfall.geometry.attributes.position.array;
    for(let i=0;i<waterfallCount;i++){
        pos[i*3+1]-=0.05;
        if(pos[i*3+1]<0) pos[i*3+1]=Math.random()*4+1;
    }
    waterfall.geometry.attributes.position.needsUpdate=true;

    renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
</html>
