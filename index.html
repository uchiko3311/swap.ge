<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 🔍 SEO & Google ძიებისთვის -->
    <title>swap.ge - ნივთების გაცვლის პლატფორმა</title>
    <meta name="description" content="გააკეთე განცხადება უფასოდ, გაცვალე ნივთები მარტივად საქართველოში. SWAP.GE - პირველი გაცვლის პლატფორმა.">
    
    <!-- 🖼️ ლოგო Google ძიებისთვის (Favicon) -->
    <link rel="icon" type="image/png" href="favicon.png">
    
    <!-- სტილები და ბიბლიოთეკები -->
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Fira GO', sans-serif; background-color: #f3f4f6; margin: 0; padding-bottom: 90px; }
        .orange-theme { background-color: #ff4500; }
        .card-shadow { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .bottom-nav { border-top: 1px solid #e5e7eb; background: white; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="orange-theme p-4 sticky top-0 z-50 shadow-lg flex justify-between items-center text-white">
        <div class="flex items-center gap-2 italic font-black text-xl tracking-tighter">
            <span>🤝</span> SWAP.GE
        </div>
        <div id="user-profile">
            <button onclick="login()" class="border border-white px-4 py-1 rounded-xl text-xs font-bold hover:bg-white hover:text-orange-600 transition">შესვლა</button>
        </div>
    </header>

    <!-- Search -->
    <div class="p-4">
        <div class="relative">
            <input type="text" placeholder="ჩაწერე საძიებო სიტყვა" class="w-full p-4 pl-12 bg-white border-2 border-orange-500 rounded-2xl outline-none shadow-sm focus:ring-2 ring-orange-300 transition">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-300"></i>
        </div>
    </div>

    <!-- Banners -->
    <div class="px-4 grid grid-cols-2 gap-3 mb-6 text-white text-center font-bold text-[11px]">
        <div class="bg-gray-800 p-6 rounded-[2rem] flex items-center justify-center shadow-md">ყველა კატეგორია</div>
        <div class="bg-blue-600 p-6 rounded-[2rem] flex items-center justify-center shadow-md">მეორადი განვადებით</div>
    </div>

    <!-- Listings Grid -->
    <main class="px-4 grid grid-cols-2 gap-4" id="main-grid">
        <!-- პოსტები ჩაიტვირთება Firebase-დან -->
    </main>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 w-full flex justify-around p-3 bottom-nav z-50 shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
        <button onclick="location.reload()" class="flex flex-col items-center gap-1 text-orange-600">
            <i class="fas fa-home text-xl"></i><span class="text-[10px] font-bold">მთავარი</span>
        </button>
        <button onclick="toggleModal()" class="flex flex-col items-center gap-1 text-white bg-green-500 p-3 rounded-2xl mt-[-30px] shadow-lg shadow-green-200 hover:scale-110 active:scale-95 transition">
            <i class="fas fa-plus text-xl"></i>
        </button>
        <button id="profile-btn" onclick="showProfile()" class="flex flex-col items-center gap-1 text-gray-400 hidden transition">
            <i class="fas fa-user text-xl"></i><span class="text-[10px] font-bold">პროფილი</span>
        </button>
    </nav>

    <!-- Post Modal -->
    <div id="modal" class="fixed inset-0 bg-black/70 hidden z- flex items-center justify-center p-4 backdrop-blur-sm transition-all">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl animate-in zoom-in duration-200">
            <h3 class="text-xl font-bold mb-6 text-gray-800">ახალი განცხადება</h3>
            <div class="space-y-3">
                <input id="in-name" type="text" placeholder="რა გაქვთ?" class="w-full p-4 bg-gray-100 rounded-2xl outline-none focus:ring-2 ring-orange-500 transition">
                <input id="in-swap" type="text" placeholder="რაში ცვლით?" class="w-full p-4 bg-gray-100 rounded-2xl outline-none focus:ring-2 ring-orange-500 transition">
                <input id="in-phone" type="tel" placeholder="ტელეფონი (მაგ: 599...)" class="w-full p-4 bg-gray-100 rounded-2xl outline-none focus:ring-2 ring-orange-500 transition">
                
                <label class="block p-4 border-2 border-dashed border-orange-200 rounded-2xl text-center cursor-pointer text-orange-600 font-bold hover:bg-orange-50 transition">
                    <input type="file" id="in-file" class="hidden" accept="image/*">
                    <i class="fas fa-image mb-1"></i><br>ფოტოს ატვირთვა
                </label>

                <button id="pub-btn" onclick="publish()" class="w-full bg-orange-600 text-white py-4 rounded-2xl font-bold shadow-xl hover:bg-orange-700 active:scale-95 transition">გამოქვეყნება</button>
                <button onclick="toggleModal()" class="w-full mt-2 text-gray-400 text-sm font-medium">დახურვა</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK & Logic -->
    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, where } from "https://gstatic.com";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://gstatic.com";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://gstatic.com";

        // ⚠️ ჩაწერე შენი Firebase მონაცემები:
        const firebaseConfig = {
            apiKey: "შენი_API_KEY",
            authDomain: "შენი_DOMAIN",
            projectId: "შენი_PROJECT_ID",
            storageBucket: "შენი_STORAGE_BUCKET",
            messagingSenderId: "შენი_SENDER_ID",
            appId: "შენი_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const storage = getStorage(app);
        let user = null;

        window.login = () => signInWithPopup(auth, new GoogleAuthProvider());
        window.toggleModal = () => user ? document.getElementById('modal').classList.toggle('hidden') : alert("ავტორიზაცია აუცილებელია");

        onAuthStateChanged(auth, u => {
            user = u;
            if(u) {
                document.getElementById('user-profile').innerHTML = `<img src="${u.photoURL}" class="w-10 h-10 rounded-full border-2 border-white shadow-md">`;
                document.getElementById('profile-btn').classList.remove('hidden');
            }
            loadAds();
        });

        window.publish = async () => {
            const btn = document.getElementById('pub-btn');
            const file = document.getElementById('in-file').files;
            if(!file) return alert("აირჩიეთ ფოტო");
            
            btn.disabled = true; btn.innerText = "იტვირთება...";

            try {
                const sRef = ref(storage, `swap/${Date.now()}_${file[0].name}`);
                await uploadBytes(sRef, file[0]);
                const url = await getDownloadURL(sRef);

                await addDoc(collection(db, "ads"), {
                    uid: user.uid, 
                    name: document.getElementById('in-name').value,
                    swap: document.getElementById('in-swap').value,
                    phone: document.getElementById('in-phone').value,
                    img: url, 
                    time: new Date()
                });
                location.reload();
            } catch (e) { 
                console.error(e);
                alert("შეცდომა!"); 
                btn.disabled = false; 
                btn.innerText = "გამოქვეყნება"; 
            }
        };

        async function loadAds() {
            const grid = document.getElementById('main-grid');
            const snap = await getDocs(query(collection(db, "ads"), orderBy("time", "desc")));
            grid.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                grid.innerHTML += `
                    <div class="bg-white rounded-[2rem] overflow-hidden card-shadow">
                        <img src="${d.img}" class="h-40 w-full object-cover">
                        <div class="p-4">
                            <h4 class="font-bold text-sm truncate">${d.name}</h4>
                            <p class="text-[10px] text-orange-600 font-bold mb-3 italic">⇄ იცვლება: ${d.swap}</p>
                            <div class="grid grid-cols-2 gap-2">
                                <a href="tel:${d.phone}" class="bg-blue-500 text-white text-center py-2 rounded-xl text-[10px] font-bold shadow-md hover:bg-blue-600 transition">
                                    <i class="fas fa-phone"></i> დარეკვა
                                </a>
                                <a href="https://wa.me{d.phone}" target="_blank" class="bg-green-500 text-white text-center py-2 rounded-xl text-[10px] font-bold shadow-md hover:bg-green-600 transition">
                                    <i class="fab fa-whatsapp"></i> WhatsApp
                                </a>
                            </div>
                        </div>
                    </div>`;
            });
        }
    </script>
</body>
</html>
