<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SWAP.GE</title>
<link rel="icon" href="favicon.png">

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:url("bg.jpg") center/cover no-repeat;
    color:white;
}

header{
    display:flex;
    justify-content:space-between;
    background:black;
    padding:10px;
}

.logo{font-size:22px;color:#00ffcc;}

nav a{
    color:white;
    margin:0 10px;
    text-decoration:none;
}

.container{padding:15px;}

input,textarea{
    width:100%;
    padding:8px;
    margin:5px 0;
    border-radius:8px;
    border:none;
}

button{
    background:#00ffcc;
    border:none;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
}

#ads{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:10px;
}

.ad{
    background:rgba(0,0,0,0.7);
    padding:10px;
    border-radius:10px;
}

.vip{border:2px solid gold;}

.slider img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.hidden{display:none;}

footer{
    background:black;
    padding:20px;
    text-align:center;
}
</style>
</head>

<body>

<header>
<div class="logo">SWAP.GE</div>

<nav>
<a href="#" onclick="show('home')">მთავარი</a>
<a href="#" onclick="show('about')">ჩვენს შესახებ</a>
<a href="#" onclick="show('contact')">კონტაქტი</a>
<a href="#" onclick="show('chat')">ჩატი</a>
<a href="#" onclick="show('cabinet')">კაბინეტი</a>
<a href="#" onclick="show('login')">შესვლა</a>
</nav>
</header>

<!-- HOME -->
<div id="home" class="container">

<input id="search" placeholder="ძიება...">

<div class="slider">
<img src="banner1.jpg">
<img src="banner2.jpg">
<img src="banner3.jpg">
<img src="banner4.jpg">
<img src="banner5.jpg">
</div>

<div id="ads"></div>

<button onclick="show('create')">➕ განცხადების დამატება</button>

</div>

<!-- CREATE -->
<div id="create" class="container hidden">
<h2>განცხადების დამატება</h2>

<input id="title" placeholder="სათაური">
<textarea id="desc" placeholder="აღწერა"></textarea>
<input id="img" placeholder="სურათის ლინკი">

<label>VIP (2 ლარი)</label>
<input type="checkbox" id="vip">

<button onclick="createAd()">დამატება</button>
</div>

<!-- LOGIN -->
<div id="login" class="container hidden">
<h2>შესვლა / რეგისტრაცია</h2>
<input id="user" placeholder="მომხმარებელი">
<input id="pass" placeholder="პაროლი" type="password">
<button onclick="login()">შესვლა</button>
</div>

<!-- CABINET -->
<div id="cabinet" class="container hidden">
<h2>პირადი კაბინეტი</h2>
<div id="myAds"></div>
</div>

<!-- CHAT -->
<div id="chat" class="container hidden">
<h2>ჩატი</h2>
<div id="chatBox" style="height:200px;overflow:auto;background:black;"></div>
<input id="chatInput">
<button onclick="sendMsg()">გაგზავნა</button>
</div>

<!-- ABOUT -->
<div id="about" class="container hidden">
<h2>ჩვენს შესახებ</h2>
<p>swap.ge არის გაცვლის პლატფორმა</p>
</div>

<!-- CONTACT -->
<div id="contact" class="container hidden">
<h2>კონტაქტი</h2>
<p>📞 +995 555 000 000</p>
<p>📧 info@swap.ge</p>
</div>

<footer>
© 2026 swap.ge - ყველა უფლება დაცულია
</footer>

<script>

// USER
let currentUser = null;

// ADS
let ads = JSON.parse(localStorage.getItem("ads")||"[]");

// NAV
function show(id){
    document.querySelectorAll(".container").forEach(d=>d.classList.add("hidden"));
    document.getElementById(id).classList.remove("hidden");
}

// LOGIN
function login(){
    currentUser = document.getElementById("user").value;
    alert("შესული ხარ: "+currentUser);
    show("home");
}

// CREATE AD
function createAd(){

    if(!currentUser){
        alert("გაიარე ავტორიზაცია");
        return;
    }

    const userAds = ads.filter(a=>a.user===currentUser);

    if(userAds.length >=5){
        alert("გადაიხადე VIP (2 ლარი)");
        return;
    }

    const ad = {
        title: title.value,
        desc: desc.value,
        img: img.value,
        vip: vip.checked,
        user: currentUser,
        date: Date.now()
    };

    ads.push(ad);
    localStorage.setItem("ads", JSON.stringify(ads));

    loadAds();
    show("home");
}

// LOAD ADS
function loadAds(){
    const container = document.getElementById("ads");
    container.innerHTML="";

    const filtered = ads.filter(a=>{
        if(a.vip && !currentUser) return false;
        return true;
    });

    filtered.forEach(ad=>{
        container.innerHTML+=`
        <div class="ad ${ad.vip?'vip':''}">
        <img src="${ad.img}">
        <h3>${ad.title}</h3>
        <p>${ad.desc}</p>
        </div>`;
    });
}

// SEARCH
search.oninput = ()=>{
    const val = search.value.toLowerCase();
    const container = document.getElementById("ads");

    container.innerHTML="";

    ads.filter(a=>a.title.toLowerCase().includes(val))
    .forEach(ad=>{
        container.innerHTML+=`
        <div class="ad ${ad.vip?'vip':''}">
        <img src="${ad.img}">
        <h3>${ad.title}</h3>
        </div>`;
    });
}

// CHAT
function sendMsg(){
    const msg = chatInput.value;
    chatBox.innerHTML += `<div>${currentUser||"Guest"}: ${msg}</div>`;
    chatInput.value="";
}

// AUTO DELETE 30 დღე
setInterval(()=>{
    const now = Date.now();
    ads = ads.filter(a=> now - a.date < 2592000000);
    localStorage.setItem("ads", JSON.stringify(ads));
    loadAds();
},10000);

// INIT
loadAds();

</script>

</body>
  </html>
