<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>swap.ge</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f4f4; }
        header { background: #004a99; color: white; padding: 20px; text-align: center; font-size: 24px; font-weight: bold; }
        .handshake { font-size: 30px; }
        .banner-box { background: #ddd; height: 150px; margin: 10px; display: flex; align-items: center; justify-content: center; border-radius: 10px; border: 2px dashed #999; }
        .vip-card { background: linear-gradient(45deg, #f59e0b, #fbbf24); color: white; padding: 20px; margin: 15px; border-radius: 15px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .item { background: white; padding: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .btn { background: #004a99; color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; display: inline-block; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <span class="handshake">🤝</span> swap.ge
    </header>

    <div class="banner-box">
        ავტომატური ბანერი (5 ცალი)
    </div>

    <div class="vip-card">
        <h2>VIP პაკეტი - 2 ლარი</h2>
        <p>5 განცხადება • 14 ფოტო • 30 დღე</p>
        <a href="vip.html" style="background:white; color:#d97706; padding:8px 20px; border-radius:20px; text-decoration:none; font-weight:bold;">ყიდვა</a>
    </div>

    <div style="padding: 10px; font-weight: bold; border-left: 5px solid #004a99; margin-left: 10px;">
        ბოლო განცხადებები
    </div>

    <div class="grid">
        <div class="item">
            <div style="background:#eee; height:100px; border-radius:5px;"></div>
            <p>ნივთი 1</p>
            <b style="color:#004a99;">2₾</b>
        </div>
        <div class="item">
            <div style="background:#eee; height:100px; border-radius:5px;"></div>
            <p>ნივთი 2</p>
            <b style="color:#004a99;">გაცვლა</b>
        </div>
    </div>

    <div style="text-align:center; padding: 20px;">
        <a href="login.html" class="btn">შესვლა / რეგისტრაცია</a>
    </div>

</body>
</html>
