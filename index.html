<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swap.com.ge - გაცვლის პლატფორმა</title>

    <!-- Google AdSense -->
    <script async src="https://googlesyndication.com" crossorigin="anonymous"></script>

    <!-- Tailwind CSS (დიზაინისთვის) -->
    <script src="https://tailwindcss.com"></script>
    
    <!-- FontAwesome (ხატულებისთვის) -->
    <link href="https://cloudflare.com" rel="stylesheet">
    
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Noto Sans Georgian', sans-serif; -webkit-tap-highlight-color: transparent; }
        .banner-track { display: flex; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .banner-step { min-width: 100%; height: 180px; }
        .vip-card { border: 2px solid #fbbf24; box-shadow: 0 4px 20px rgba(251, 191, 36, 0.2); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <!-- ნავიგაცია -->
    <nav class="bg-white shadow-sm p-4 sticky top-0 z-50 border-b border-gray-100">
        <div class="flex justify-between items-center max-w-2xl mx-auto">
            <h1 class="text-2xl font-black text-blue-600 italic uppercase">Swap.ge</h1>
            <button onclick="toggleForm()" class="bg-blue-600 text-white px-6 py-2.5 rounded-full text-xs font-black shadow-lg transition active:scale-95">
                <i class="fas fa-plus mr-1"></i> დამატება
            </button>
        </div>
    </nav>

    <div class="max-w-2xl mx-auto p-4">
        
        <!-- ბანერები -->
        <div class="relative overflow-hidden rounded-[32px] mb-8 bg-white shadow-sm border border-gray-100">
            <div id="bannerTrack" class="banner-track text-center items-center justify-center">
                <div class="banner-step flex items-center justify-center text-gray-300 text-[10px] font-black uppercase tracking-widest italic">
                    <i class="fas fa-ad mr-2"></i> რეკლამა
                </div>
            </div>
            <div id="dots" class="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-2"></div>
        </div>

        <!-- ფორმა -->
        <div id="uploadSection" class="hidden bg-white rounded-[32px] shadow-2xl p-8 mb-10 border border-blue-50">
            <div class="flex justify-between items-center mb-8">
                <h2 class="font-black text-xl italic uppercase text-gray-800 tracking-tighter">ახალი პოსტი</h2>
                <button onclick="toggleForm()" class="text-gray-300"><i class="fas fa-times-circle text-2xl"></i></button>
            </div>
            
            <form id="uploadForm" class="space-y-5">
                <input type="text" id="itemName" required class="w-full border-gray-100 border-2 p-4 rounded-2xl outline-none focus:border-blue-400 bg-gray-50 font-bold transition" placeholder="ნივთის დასახელება">
                <textarea id="itemDesc" rows="4" required class="w-full border-gray-100 border-2 p-4 rounded-2xl outline-none focus:border-blue-400 bg-gray-50 font-medium transition" placeholder="აღწერა და პირობები..."></textarea>
                
                <div class="bg-blue-50 p-8 rounded-[24px] border-2 border-dashed border-blue-100 text-center">
                    <input type="file" id="itemImages" multiple accept="image/*" class="hidden">
                    <button type="button" onclick="document.getElementById('itemImages').click()" class="text-blue-600 font-black text-xs uppercase italic">
                        <i class="fas fa-camera text-3xl mb-3 block"></i> ფოტოების არჩევა
                    </button>
                    <div class="flex justify-center gap-5 mt-4 text-[9px] font-black uppercase tracking-widest text-gray-400">
                        <span id="fileCount">არჩეულია: 0</span>
                        <span id="limitNote" class="text-blue-500 underline">ლიმიტი: 7 ფოტო</span>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-sm uppercase tracking-widest shadow-xl shadow-blue-100 active:scale-95 transition-all">
                    გამოქვეყნება
                </button>
            </form>
        </div>

        <!-- VIP ბლოკი -->
        <div class="bg-gradient-to-br from-amber-400 via-orange-500 to-red-500 rounded-[32px] p-7 mb-10 text-white shadow-xl flex justify-between items-center relative overflow-hidden">
            <div class="relative z-10">
                <h3 class="font-black text-xl italic uppercase mb-1">VIP სტატუსი 👑</h3>
                <p class="text-[10px] font-bold opacity-90 uppercase">14 ფოტო • 5 პოსტი • 30 დღე</p>
            </div>
            <button id="payBtn" class="relative z-10 bg-white text-orange-600 px-6 py-3 rounded-2xl font-black text-sm active:scale-95 transition">2.00 ₾</button>
            <i class="fas fa-bolt absolute -bottom-6 -right-6 text-white/20 text-9xl"></i>
        </div>

        <!-- პოსტები -->
        <div class="mb-8 px-2 flex items-center">
            <span class="w-10 h-[2px] bg-blue-600 mr-3 rounded-full"></span>
            <h3 class="font-black text-gray-800 uppercase text-[11px] tracking-[0.3em]">ბოლო პოსტები</h3>
        </div>

        <div id="postsContainer" class="grid grid-cols-1 gap-8 min-h-[300px]">
            <div id="loader" class="text-center py-20">
                <div class="inline-block w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                <p class="text-[10px] font-black text-gray-300 mt-4 uppercase">იტვირთება...</p>
            </div>
        </div>

    </div>

    <!-- ადმინ მოდალი -->
    <div id="adminModal" class="fixed inset-0 bg-black/95 backdrop-blur-md z-[100] hidden flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[40px] p-10 shadow-2xl">
            <div id="adminLoginForm">
                <h3 class="font-black uppercase italic mb-8 text-gray-800 tracking-widest text-xl">Admin</h3>
                <input type="email" id="adminEmail" class="w-full border-gray-100 border-2 p-5 rounded-2xl mb-4 bg-gray-50 outline-none" placeholder="Email">
                <input type="password" id="adminPass" class="w-full border-gray-100 border-2 p-5 rounded-2xl mb-8 bg-gray-50 outline-none" placeholder="Password">
                <button onclick="loginAdmin()" class="w-full bg-black text-white py-5 rounded-2xl font-black uppercase tracking-widest">შესვლა</button>
            </div>
            <div id="adminControls" class="hidden text-center">
                <h3 class="font-black uppercase italic mb-8 text-blue-600">Admin Panel</h3>
                <input type="file" id="adminBannerFile" accept="image/*" class="mb-6 text-[10px] font-bold block w-full">
                <button onclick="uploadBanner()" id="bannerUploadBtn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase text-xs mb-4">ბანერის ატვირთვა</button>
                <button onclick="closeAdmin()" class="w-full py-2 text-gray-300 font-black text-[10px] uppercase">დახურვა</button>
            </div>
        </div>
    </div>

    <!-- ადმინ ღილაკი -->
    <button onclick="showAdminLogin()" class="fixed bottom-6 right-6 opacity-5 hover:opacity-100 text-[9px] font-black uppercase text-gray-400 z-40 transition-all">Admin</button>

    <script>
        function toggleForm() {
            const section = document.getElementById('uploadSection');
            section.classList.toggle('hidden');
        }
        function showAdminLogin() { document.getElementById('adminModal').classList.remove('hidden'); }
        function closeAdmin() { document.getElementById('adminModal').classList.add('hidden'); }
    </script>
    <script type="module" src="app.js"></script>

</body>
</html>
