<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok Full Clone + Comments</title>
    <style>
        :root {
            --tiktok-red: #fe2c55;
            --tiktok-cyan: #25f4ee;
            --bg-black: #010101;
            --overlay-bg: rgba(0, 0, 0, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

        body { background-color: var(--bg-black); height: 100vh; display: flex; justify-content: center; overflow: hidden; color: white; }

        .app { width: 100%; height: 100vh; max-width: 450px; position: relative; display: flex; flex-direction: column; background: #000; }

        /* Top Nav */
        .top-nav { position: absolute; top: 20px; width: 100%; display: flex; justify-content: center; gap: 20px; z-index: 20; font-weight: 600; opacity: 0.8; }
        .top-nav span.active { border-bottom: 2px solid white; padding-bottom: 5px; opacity: 1; }

        /* Feed */
        .video-feed { flex: 1; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .video-feed::-webkit-scrollbar { display: none; }
        .video-card { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Sidebar Icons */
        .side-bar { position: absolute; right: 12px; bottom: 120px; display: flex; flex-direction: column; align-items: center; gap: 20px; z-index: 10; }
        .side-icon { display: flex; flex-direction: column; align-items: center; font-size: 12px; cursor: pointer; }
        .side-icon i { font-size: 30px; margin-bottom: 4px; }

        /* Profile & Music Animation */
        .profile-img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid white; margin-bottom: 10px; }
        .album-art { width: 40px; height: 40px; border-radius: 50%; border: 8px solid #333; animation: rotate 3s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Video Info */
        .video-details { position: absolute; bottom: 90px; left: 12px; right: 70px; z-index: 10; }
        .video-details h4 { margin-bottom: 5px; }

        /* Bottom Tab Bar */
        .bottom-nav { height: 60px; background: black; border-top: 0.5px solid #333; display: flex; justify-content: space-around; align-items: center; z-index: 20; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #888; }
        .nav-item.active { color: white; }
        .add-btn { width: 40px; height: 25px; background: white; border-radius: 8px; position: relative; color: black; display: flex; justify-content: center; align-items: center; font-weight: bold; }
        .add-btn::before { content: ''; position: absolute; left: -4px; width: 10px; height: 100%; background: var(--tiktok-cyan); border-radius: 8px; z-index: -1; }
        .add-btn::after { content: ''; position: absolute; right: -4px; width: 10px; height: 100%; background: var(--tiktok-red); border-radius: 8px; z-index: -1; }

        /* --- Comments Section (Slide-up) --- */
        .comments-overlay {
            position: absolute; bottom: -100%; left: 0; width: 100%; height: 70%;
            background: white; border-radius: 15px 15px 0 0; z-index: 100;
            color: black; transition: bottom 0.3s ease-out;
            display: flex; flex-direction: column;
        }
        .comments-overlay.open { bottom: 0; }
        .comments-header { padding: 15px; text-align: center; border-bottom: 1px solid #eee; position: relative; font-weight: bold; }
        .close-comments { position: absolute; right: 15px; top: 15px; font-size: 20px; cursor: pointer; }
        .comments-list { flex: 1; overflow-y: auto; padding: 15px; }
        .comment { display: flex; gap: 10px; margin-bottom: 15px; }
        .comment-avatar { width: 35px; height: 35px; background: #ddd; border-radius: 50%; }
        .comment-text h5 { font-size: 13px; color: #666; }
        .comment-text p { font-size: 14px; margin-top: 2px; }
        .comment-input { padding: 10px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        .comment-input input { flex: 1; border: none; background: #f1f1f1; padding: 10px; border-radius: 20px; outline: none; }
    </style>
</head>
<body>

<div class="app">
    <div class="top-nav">
        <span>Following</span>
        <span class="active">For You</span>
    </div>

    <div class="video-feed">
        <!-- Video 1 -->
        <div class="video-card">
            <video loop class="v-player" src="https://w3schools.com"></video>
            <div class="side-bar">
                <img src="https://pravatar.cc" class="profile-img">
                <div class="side-icon" onclick="toggleLike(this)"><i>❤️</i><span>1.2M</span></div>
                <div class="side-icon" onclick="openComments()"><i>💬</i><span>342</span></div>
                <div class="side-icon"><i>🔖</i><span>89K</span></div>
                <div class="side-icon"><i>↪️</i><span>Share</span></div>
                <img class="album-art" src="https://flaticon.com">
            </div>
            <div class="video-details">
                <h4>@georgian_pro</h4>
                <p>TikTok-ის კოდი მზად არის! 🚀 #coding #georgia #web</p>
            </div>
        </div>
    </div>

    <!-- Comments Slide-up -->
    <div class="comments-overlay" id="commentsPanel">
        <div class="comments-header">
            342 კომენტარი
            <span class="close-comments" onclick="closeComments()">✕</span>
        </div>
        <div class="comments-list">
            <div class="comment">
                <div class="comment-avatar"></div>
                <div class="comment-text"><h5>user_123</h5><p>ძალიან მაგარია! 🔥</p></div>
            </div>
            <div class="comment">
                <div class="comment-avatar"></div>
                <div class="comment-text"><h5>dev_master</h5><p>HTML/CSS-ით ასეთი რამე? საღოლ!</p></div>
            </div>
        </div>
        <div class="comment-input">
            <input type="text" placeholder="დაამატე კომენტარი...">
        </div>
    </div>

    <!-- Tab Bar -->
    <div class="bottom-nav">
        <div class="nav-item active"><i>🏠</i><span>Home</span></div>
        <div class="nav-item"><i>🔍</i><span>Discover</span></div>
        <div class="nav-item"><div class="add-btn">+</div></div>
        <div class="nav-item"><i>📥</i><span>Inbox</span></div>
        <div class="nav-item"><i>👤</i><span>Profile</span></div>
    </div>
</div>

<script>
    const videos = document.querySelectorAll('.v-player');
    const panel = document.getElementById('commentsPanel');

    // 1. Auto Play/Pause
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) entry.target.play();
            else entry.target.pause();
        });
    }, { threshold: 0.8 });

    videos.forEach(v => observer.observe(v));

    // 2. Comments Logic
    function openComments() { panel.classList.add('open'); }
    function closeComments() { panel.classList.remove('open'); }

    // 3. Like Toggle
    function toggleLike(el) {
        el.style.color = el.style.color === 'red' ? 'white' : 'red';
    }

    // 4. Double Tap Heart
    document.querySelectorAll('.video-card').forEach(card => {
        card.addEventListener('dblclick', (e) => {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.style.position = 'absolute';
            heart.style.left = e.clientX + 'px';
            heart.style.top = e.clientY + 'px';
            heart.style.fontSize = '80px';
            heart.style.pointerEvents = 'none';
            heart.style.animation = 'fadeUp 0.6s forwards';
            card.appendChild(heart);
            setTimeout(() => heart.remove(), 600);
        });
    });
</script>

<style>
    @keyframes fadeUp {
        0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
        50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        100% { transform: translate(-50%, -100%) scale(1); opacity: 0; }
    }
</style>

</body>
</html>
