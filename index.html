<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWAP.GE - VIP Marketplace</title>
    
    <!-- ფავიკონის გამოსწორებული ბმულები -->
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    
    <!-- Font Awesome ხატულებისთვის (რომ ძიების იკონკა გამოჩნდეს) -->
    <link rel="stylesheet" href="https://cloudflare.com">

    <style>
        :root {
            --main: #27ae60;
            --main-dark: #219150;
            --dark: #2c3e50;
            --vip: #f1c40f;
            --bg: #f4f7f6;
            --white: #ffffff;
            --shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--dark);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: var(--white);
            padding: 15px 8%;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .logo {
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-box {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f9f9f9;
        }

        .logo-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 900;
            color: var(--dark);
            letter-spacing: -1px;
        }

        .logo-text span {
            color: var(--main);
        }

        .search-row {
            display: flex;
            gap: 12px;
        }

        .search-bar {
            flex: 3;
            position: relative;
        }

        .search-bar i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .search-bar input {
            width: 100%;
            padding: 12px 15px 12px 40px;
            border-radius: 12px;
            border: 1px solid #eee;
            background: #f9f9f9;
            outline: none;
            font-size: 15px;
            transition: 0.3s;
        }

        .btn {
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
            font-size: 14px;
        }

        .btn-add { background: var(--main); color: white; flex: 1; }
        .btn-vip { background: var(--vip); color: #000; width: 100%; margin-top: 15px; }

        .container {
            padding: 30px 8%;
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: white;
            padding: 35px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
        }
        
        .modal-content input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<header>
    <div class="nav-top">
        <a href="index.html" class="logo">
            <div class="logo-box">
                <!-- ლოგო ახალი სახელით -->
                <img src="favicon.png" alt="Logo">
            </div>
            <div class="logo-text">SWAP<span>.GE</span></div>
        </a>
        <div id="authArea"></div>
    </div>
    <div class="search-row">
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" id="sInp" placeholder="რას ეძებთ?">
        </div>
        <button class="btn btn-add" onclick="document.getElementById('addM').style.display='flex'">
            <i class="fas fa-plus"></i> განცხადება
        </button>
    </div>
</header>

<div class="container">
    <main>
        <div id="grid" class="grid">
            <!-- აქ გამოჩნდება განცხადებები -->
        </div>
    </main>

    <aside>
        <div style="background:#fff; padding:25px; border-radius:20px; border:1px solid #eee; position: sticky; top: 110px;">
            <h4 style="margin:0; font-size:18px;">🔥 VIP ზონა</h4>
            <button class="btn btn-vip">გახდი VIP (2₾)</button>
        </div>
    </aside>
</div>

<!-- მოდალი -->
<div id="addM" class="modal">
    <div class="modal-content">
        <h3>✨ ახალი განცხადება</h3>
        <input type="text" id="iT" placeholder="რას ყიდით/ცვლით?">
        <input type="number" id="iP" placeholder="ფასი (₾)">
        <input type="file" id="iFile" accept="image/*">
        <button class="btn btn-add" id="saveBtn" onclick="saveItem()">გამოქვეყნება</button>
        <br>
        <button class="btn" style="background:#eee; width: 100%;" onclick="document.getElementById('addM').style.display='none'">დახურვა</button>
    </div>
</div>

<script>
    function saveItem() {
        alert('განცხადება მიღებულია!');
        document.getElementById('addM').style.display = 'none';
    }
</script>

</body>
</html>
