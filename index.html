<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swap.com.ge - გაცვალე ყველაფერი</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --orange: #e67e22; --orange-deep: #d35400; --dark: #2c3e50; --vip: #f1c40f; --bg: #fdf2e9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: var(--bg); color: #333; overflow-x: hidden; }
        
        header { background: var(--orange-deep); padding: 12px 0; border-bottom: 3px solid var(--dark); position: sticky; top: 0; z-index: 1000; }
        .nav-container { max-width: 1100px; margin: auto; display: flex; align-items: center; padding: 0 15px; gap: 10px; }
        .logo { color: white; text-decoration: none; font-weight: bold; font-size: 20px; white-space: nowrap; }
        .search-bar { flex-grow: 1; }
        .search-bar input { width: 100%; padding: 10px; border-radius: 5px; border: none; outline: none; }
        
        .header-btns { display: flex; align-items: center; gap: 8px; }
        .lang-btn, .auth-btn { background: var(--dark); color: white; border: 1px solid white; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; text-decoration: none; font-size: 13px; }
        .vip-btn { background: var(--dark); color: var(--vip); border: 1.5px solid var(--vip); padding: 7px 12px; border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 13px; white-space: nowrap; }
        .user-info { color: white; font-size: 13px; font-weight: bold; margin-right: 10px; display: flex; align-items: center; gap: 5px; }

        .container { max-width: 1100px; margin: auto; padding: 15px; }
        .slider-container { width: 100%; height: 220px; margin-bottom: 25px; position: relative; overflow: hidden; border-radius: 12px; border: 2px solid var(--dark); }
        .slider-track { display: flex; width: 300%; height: 100%; transition: 0.8s ease-in-out; }
        .slide { width: 33.33%; height: 100%; position: relative; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }
        .slide-overlay { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.7); color: white; padding: 12px; text-align: center; }

        .post-box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 5px solid var(--orange); margin-bottom: 35px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, textarea, select { padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; width: 100%; box-sizing: border-box; }
        textarea, .upload-area, .btn-post { grid-column: span 2; }
        .upload-area { border: 2px dashed #bbb; padding: 20px; text-align: center; background: #fafafa; cursor: pointer; border-radius: 8px; }
        .btn-post { background: var(--orange); color: white; border: none; padding: 15px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; }

        [data-en] { display: none; }
        body.en-mode [data-ka] { display: none; }
        body.en-mode [data-en] { display: inline-block; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        .item { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.08); border: 1px solid #eee; position: relative; }
        .item img { width: 100%; height: 180px; object-fit: cover; }
        .item-info { padding: 15px; }
        .vip-badge { position: absolute; top: 10px; left: 10px; background: var(--vip); color: var(--dark); padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 10px; }

        footer { background: var(--dark); color: white; padding: 40px 20px; text-align: center; margin-top: 50px; }
        .footer-links a { color: #bdc3c7; text-decoration: none; margin: 0 10px; font-size: 14px; }
    </style>
</head>
<body id="mainBody" onload="initApp()">

<header>
    <div class="nav-container">
        <a href="index.html" class="logo">🤝 SWAP.GE</a>
        <div class="search-bar">
            <input type="text" id="sInp" placeholder="მოძებნე ნივთი..." onkeyup="filterItems()">
        </div>
        <div class="header-btns" id="headerAuth">
            <!-- აქ გამოჩნდება ან შესვლა, ან მომხმარებლის სახელი -->
            <a href="auth.html" class="auth-btn" id="loginLink">👤 შესვლა</a>
            <button class="lang-btn" onclick="toggleLang()" id="lBtn">EN</button>
            <a href="premium.html" class="vip-btn">👑 VIP (2₾)</a>
        </div>
    </div>
</header>

<div class="container">
    <div class="slider-container">
        <div class="slider-track" id="sliderTrack">
            <div class="slide">
                <img src="https://unsplash.com">
                <div class="slide-overlay"><span data-ka>უფასო: 1 თვე / 7 ფოტო</span><span data-en>Free: 1 Month / 7 Photos</span></div>
            </div>
            <div class="slide">
                <img src="https://unsplash.com">
                <div class="slide-overlay"><span data-ka>Premium: 5 განცხადება / 14 ფოტო</span><span data-en>Premium: 5 Ads / 14 Photos</span></div>
            </div>
        </div>
    </div>

    <section class="post-box">
        <h2><span data-ka>➕ განცხადების დამატება</span><span data-en>➕ Add New Listing</span></h2>
        <form class="form-grid" id="postForm">
            <input type="text" id="title" placeholder="რას ცვლით?" required>
            <select id="cat" required>
                <option value="">კატეგორია</option>
                <option value="Tech">Tech</option>
                <option value="Auto">Auto</option>
                <option value="Home">Home</option>
            </select>
            <textarea id="desc" placeholder="აღწერა..." rows="3" required></textarea>
            <div class="upload-area" onclick="document.getElementById('fInp').click()">
                <p><span data-ka>📸 ფოტოების ატვირთვა</span><span data-en>📸 Upload Photos</span></p>
                <input type="file" id="fInp" multiple hidden accept="image/*" onchange="previewImages(this)">
            </div>
            <div id="preBox" style="display:flex; flex-wrap:wrap; gap:5px; margin-top:10px;"></div>
            <input type="text" id="phone" placeholder="ტელეფონი" required>
            <button type="submit" class="btn-post"><span data-ka>გამოქვეყნება</span><span data-en>Publish</span></button>
        </form>
    </section>

    <h3><span data-ka>🔍 ბოლო განცხადებები</span><span data-en>🔍 Recent Listings</span></h3>
    <div class="grid" id="listGrid"></div>
</div>

<footer>
    <div class="footer-links">
        <a href="privacy-policy.html">კონფიდენციალურობა</a>
        <a href="terms-conditions.html">წესები</a>
    </div>
    <p>&copy; 2026 Swap.com.ge</p>
</footer>

<!-- Firebase SDK -->
<script type="module">
    import { initializeApp } from "https://gstatic.com";
    import { getAuth, onAuthStateChanged, signOut } from "https://gstatic.com";

    const firebaseConfig = {
        apiKey: "AIzaSyCuFjbwcI3up46IoNEJfayWyGnXvABsOfM",
        authDomain: "://firebaseapp.com",
        databaseURL: "https://firebaseio.com",
        projectId: "swap-5d311",
        storageBucket: "swap-5d311.firebasestorage.app",
        messagingSenderId: "444445838698",
        appId: "1:444445838698:web:18ab8580aa018d0236a913",
        measurementId: "G-HS88H5PQ9P"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        const headerAuth = document.getElementById('headerAuth');
        const loginLink = document.getElementById('loginLink');
        
        if (user) {
            if(loginLink) loginLink.remove();
            const userEmail = user.email.split('@')[0];
            headerAuth.insertAdjacentHTML('afterbegin', `
                <div class="user-info" id="userDisplay">
                    <span>👤 ${userEmail}</span>
                    <button onclick="window.fbLogout()" class="lang-btn" style="background:#c0392b; border:none; padding:4px 8px;">X</button>
                </div>
            `);
        }
    });

    window.fbLogout = () => {
        signOut(auth).then(() => location.reload());
    };
</script>

<script>
let currentLang = 'ka';
let listings = JSON.parse(localStorage.getItem('swap_listings')) || [];
let selectedImages = [];

function initApp() {
    render(listings);
}

function toggleLang() {
    document.getElementById('mainBody').classList.toggle('en-mode');
    currentLang = currentLang === 'ka' ? 'en' : 'ka';
    document.getElementById('lBtn').innerText = currentLang === 'ka' ? 'EN' : 'GE';
}

function previewImages(input) {
    const preBox = document.getElementById('preBox');
    preBox.innerHTML = "";
    selectedImages = [];
    const limit = localStorage.getItem('is_premium') === 'true' ? 14 : 7;

    if (input.files.length > limit) {
        alert("ლიმიტი გადაჭარბებულია!");
        input.value = "";
        return;
    }

    Array.from(input.files).forEach(file => {
        const reader = new FileReader();
        reader.onload = (e) => {
            selectedImages.push(e.target.result);
            preBox.innerHTML += `<img src="${e.target.result}" style="width:60px; height:60px; object-fit:cover; border-radius:5px;">`;
        };
        reader.readAsDataURL(file);
    });
}

document.getElementById('postForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const newItem = {
        id: Date.now(),
        createdAt: Date.now(),
        title: document.getElementById('title').value,
        desc: document.getElementById('desc').value,
        cat: document.getElementById('cat').value,
        phone: document.getElementById('phone').value,
        img: selectedImages[0] || 'https://placeholder.com',
        isVIP: localStorage.getItem('is_premium') === 'true'
    };
    listings.unshift(newItem);
    localStorage.setItem('swap_listings', JSON.stringify(listings));
    window.location.href = "success.html";
});

function render(data) {
    const grid = document.getElementById('listGrid');
    grid.innerHTML = data.map(i => `
        <div class="item" style="${i.isVIP ? 'border:2px solid var(--vip)' : ''}">
            ${i.isVIP ? '<div class="vip-badge">👑 VIP</div>' : ''}
            <img src="${i.img}">
            <div class="item-info">
                <h4>${i.title}</h4>
                <p style="font-size:13px; color:#666;">${i.desc}</p>
                <strong>📞 ${i.phone}</strong>
            </div>
        </div>
    `).join('');
}

function filterItems() {
    const val = document.getElementById('sInp').value.toLowerCase();
    render(listings.filter(i => i.title.toLowerCase().includes(val)));
}

let sIdx = 0;
setInterval(() => {
    sIdx = (sIdx + 1) % 2;
    document.getElementById('sliderTrack').style.transform = `translateX(-${sIdx * 33.33}%)`;
}, 5000);
</script>

</body>
</html>
