<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWAP.GE - პროფესიონალური გაცვლა</title>

    <!-- Tailwind სწორად -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+GO:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { 
            background-color: #000000; 
            color: #ffffff; 
            font-family: 'Fira GO', sans-serif;
        }

        .orange-brand { background-color: #FF5F00; }
        .orange-text { color: #FF5F00; }

        .btn-iron {
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .btn-iron:active {
            transform: scale(0.96);
            filter: brightness(0.8);
        }

        .card-iron {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 12px;
        }

        .nav-active { color: #FF5F00 !important; }

        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>

<body class="pb-24">

<header class="sticky top-0 z-50 bg-black border-b border-[#FF5F00]/30 p-4 flex justify-between items-center">
    <div class="flex items-center gap-3">
        <span class="text-3xl">🤝</span>
        <h1 class="text-2xl font-black">SWAP<span class="orange-text">.GE</span></h1>
    </div>
</header>

<!-- HOME -->
<div id="home" class="page active p-4">
    <div class="orange-brand p-6 rounded-xl text-black">
        <h2 class="text-xl font-black mb-2">გაცვალე დღესვე</h2>
        <button class="bg-black text-white px-4 py-2 rounded btn-iron">დაამატე ნივთი</button>
    </div>

    <div class="mt-4 grid grid-cols-2 gap-3">
        <div class="card-iron p-4">📱 ტექნიკა</div>
        <div class="card-iron p-4">🚗 ტრანსპორტი</div>
    </div>
</div>

<!-- CHAT -->
<div id="chat" class="page p-4">
    <h2 class="text-xl font-black mb-4">ჩატი</h2>
    <div class="card-iron p-4">გიორგი: 🤝 თანახმა ვარ</div>
</div>

<!-- PROFILE -->
<div id="profile" class="page p-4 text-center">
    <div class="text-4xl mb-2">👤</div>
    <h2 class="font-black">ნიკოლოზ</h2>
</div>

<!-- NAV -->
<nav class="fixed bottom-0 left-0 right-0 bg-black border-t p-3 flex justify-around">
    <button onclick="changeTab(event,'home')" class="nav-btn nav-active">🏠</button>
    <button onclick="changeTab(event,'chat')" class="nav-btn">💬</button>
    <button onclick="changeTab(event,'profile')" class="nav-btn">👤</button>
</nav>

<script>
function changeTab(e, tabId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');

    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('nav-active'));
    e.currentTarget.classList.add('nav-active');
}
</script>

</body>
</html>
