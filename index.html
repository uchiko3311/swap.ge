<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SWAP.GE - გაცვალე ყველაფერი</title>
    
    <!-- დიზაინის ბიბლიოთეკები -->
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Fira GO', sans-serif; background-color: #f8fafc; margin: 0; padding-bottom: 80px; }
        .safe-area { max-width: 500px; margin: 0 auto; min-height: 100vh; background: #fff; position: relative; }
        .sidebar { transition: 0.3s ease-in-out; transform: translateX(100%); }
        .sidebar.active { transform: translateX(0); }
        input, select, textarea { font-size: 16px !important; } /* მობილურზე Zoom-ის ასაცილებლად */
    </style>
</head>
<body>

    <div class="safe-area shadow-xl">
        
        <!-- ჰედერი -->
        <header class="flex justify-between items-center p-5 border-b bg-white sticky top-0 z-40">
            <h1 class="text-2xl font-black text-blue-600 tracking-tighter">SWAP<span class="text-orange-500">.GE</span></h1>
            <div class="flex items-center gap-4">
                <button onclick="toggleSection('auth-section')" class="text-gray-500 text-sm font-bold">შესვლა</button>
                <button onclick="toggleMenu(true)" class="text-gray-700 text-2xl"><i class="fa fa-bars"></i></button>
            </div>
        </header>

        <!-- გვერდითი მენიუ (Sidebar) -->
        <div id="sidebar" class="sidebar fixed inset-0 z-50 flex justify-end hidden">
            <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="toggleMenu(false)"></div>
            <div class="relative w-72 bg-white h-full p-6 shadow-2xl flex flex-col">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-xl font-bold">მენიუ</h2>
                    <button onclick="toggleMenu(false)" class="text-3xl">&times;</button>
                </div>

                <div class="bg-blue-50 p-4 rounded-2xl mb-6">
                    <p class="text-[10px] text-gray-400 uppercase font-bold">ბალანსი</p>
                    <p class="text-2xl font-bold text-blue-600">0.00 ₾</p>
                </div>

                <nav class="flex-1 space-y-2">
                    <button onclick="toggleSection('add-post-section')" class="w-full text-left p-3 hover:bg-gray-100 rounded-xl flex items-center gap-3"><i class="fa fa-plus-circle text-orange-500"></i> განცხადების დამატება</button>
                    <button class="w-full text-left p-3 hover:bg-gray-100 rounded-xl flex items-center gap-3"><i class="fa fa-list"></i> ჩემი განცხადებები</button>
                    <button class="w-full text-left p-3 hover:bg-gray-100 rounded-xl flex items-center gap-3"><i class="fa fa-heart text-red-400"></i> ფავორიტები</button>
                    <hr class="my-4">
                    <button onclick="toggleSection('about-section')" class="w-full text-left p-3 hover:bg-gray-100 rounded-xl flex items-center gap-3">ჩვენს შესახებ</button>
                    <button onclick="toggleSection('rules-section')" class="w-full text-left p-3 hover:bg-gray-100 rounded-xl flex items-center gap-3 text-sm">წესები</button>
                    <button onclick="toggleSection('contact-section')" class="w-full text-left p-3 hover:bg-gray-100 rounded-xl flex items-center gap-3 font-bold text-blue-600">კონტაქტი</button>
                </nav>
            </div>
        </div>

        <!-- სექციები -->
        <main class="p-4">
            
            <!-- მთავარი გვერდი (განცხადებები) -->
            <section id="home-section" class="space-y-6">
                <div class="bg-blue-600 rounded-3xl p-6 shadow-lg text-center text-white">
                    <h2 class="text-lg font-bold mb-4">გაამარტივე გაცვლა 🔄</h2>
                    <div class="relative text-black">
                        <input type="text" placeholder="რას ეძებ?" class="w-full p-4 rounded-2xl outline-none shadow-inner border-none">
                        <button class="absolute right-2 top-2 bg-orange-500 text-white p-2 rounded-xl h-10 w-10"><i class="fa fa-search"></i></button>
                    </div>
                </div>
                <div id="ads-list" class="grid gap-4">
                    <!-- აქ გამოჩნდება ბაზიდან წამოღებული მონაცემები -->
                    <div class="p-10 text-center text-gray-400 italic">განცხადებები არ არის...</div>
                </div>
            </section>

            <!-- განცხადების დამატება -->
            <section id="add-post-section" class="hidden space-y-4">
                <h2 class="text-xl font-bold mb-4">ახალი განცხადება</h2>
                <input id="ad-title" type="text" placeholder="სათაური" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:border-blue-500">
                <select id="ad-cat" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none">
                    <option value="ბინები">🏠 ბინები</option>
                    <option value="მანქანები">🚗 მანქანები</option>
                    <option value="ტექნიკა">📱 ტექნიკა</option>
                </select>
                <input id="ad-price" type="number" placeholder="ფასი (₾)" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none">
                <textarea id="ad-swap" placeholder="რაში ცვლით?" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none h-28"></textarea>
                <button onclick="handlePostAd()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg">გამოქვეყნება</button>
            </section>

            <!-- ავტორიზაცია -->
            <section id="auth-section" class="hidden space-y-4 pt-10">
                <div class="bg-white p-6 rounded-3xl border shadow-sm">
                    <h2 class="text-2xl font-bold text-center mb-6">ავტორიზაცია</h2>
                    <input id="email" type="email" placeholder="ელ-ფოსტა" class="w-full p-4 bg-gray-50 border rounded-2xl mb-3 outline-none">
                    <input id="pass" type="password" placeholder="პაროლი" class="w-full p-4 bg-gray-50 border rounded-2xl mb-6 outline-none">
                    <button onclick="handleAuth()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold">შესვლა / რეგისტრაცია</button>
                </div>
            </section>

            <!-- კონტაქტი -->
            <section id="contact-section" class="hidden space-y-4">
                <h2 class="text-xl font-bold mb-4">კონტაქტი</h2>
                <div class="bg-gray-50 p-6 rounded-3xl space-y-4 border">
                    <p class="flex items-center gap-3"><i class="fa fa-phone text-blue-500"></i> +995 5XX XX XX XX</p>
                    <p class="flex items-center gap-3"><i class="fa fa-envelope text-orange-500"></i> info@swap.ge</p>
                    <hr>
                    <input type="text" placeholder="თქვენი სახელი" class="w-full p-3 rounded-xl border">
                    <textarea placeholder="შეტყობინება" class="w-full p-3 rounded-xl border h-24"></textarea>
                    <button class="w-full bg-orange-500 text-white py-3 rounded-xl font-bold">გაგზავნა</button>
                </div>
            </section>

        </main>

        <!-- ქვედა მენიუ (Sticky Footer) -->
        <nav class="fixed bottom-0 left-0 right-0 max-w-[500px] mx-auto bg-white/90 backdrop-blur-md border-t flex justify-around p-4 z-40">
            <button onclick="toggleSection('home-section')" class="text-blue-600 text-xl"><i class="fa fa-home"></i></button>
            <button onclick="toggleSection('add-post-section')" class="bg-orange-500 text-white h-12 w-12 rounded-2xl flex items-center justify-center -mt-10 shadow-lg border-4 border-white"><i class="fa fa-plus"></i></button>
            <button onclick="toggleMenu(true)" class="text-gray-400 text-xl"><i class="fa fa-user"></i></button>
        </nav>

    </div>

    <!-- FIREBASE LOGIC -->
    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://gstatic.com";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://gstatic.com";

        const firebaseConfig = {
            apiKey: "AIzaSyAEUjh_mVRLTzUecRJbeG_K6gTp__FVft0",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebaseio.com",
            projectId: "swap-39e13",
            storageBucket: "swap-39e13.firebasestorage.app",
            messagingSenderId: "107187341554",
            appId: "1:107187341554:web:75533a380b58a7a141286b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ნავიგაციის ფუნქცია
        window.toggleSection = function(id) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.getElementById('sidebar').classList.remove('active');
            setTimeout(() => document.getElementById('sidebar').classList.add('hidden'), 300);
            if(id === 'home-section') fetchAds();
        }

        window.toggleMenu = function(show) {
            const sb = document.getElementById('sidebar');
            if(show) { sb.classList.remove('hidden'); setTimeout(() => sb.classList.add('active'), 10); }
            else { sb.classList.remove('active'); setTimeout(() => sb.classList.add('hidden'), 300); }
        }

        // ავტორიზაცია
        window.handleAuth = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                alert("წარმატებით შეხვედით!");
                toggleSection('home-section');
            } catch {
                try {
                    await createUserWithEmailAndPassword(auth, email, pass);
                    alert("რეგისტრაცია წარმატებულია!");
                    toggleSection('home-section');
                } catch (e) { alert("შეცდომა: " + e.message); }
            }
        }

        // განცხადების დადება
        window.handlePostAd = async () => {
            const ad = {
                title: document.getElementById('ad-title').value,
                cat: document.getElementById('ad-cat').value,
                price: document.getElementById('ad-price').value,
                swap: document.getElementById('ad-swap').value,
                date: new Date()
            };
            try {
                await addDoc(collection(db, "ads"), ad);
                alert("განცხადება დაემატა!");
                toggleSection('home-section');
            } catch (e) { alert("შეცდომა: " + e.message); }
        }

        // განცხადებების წამოღება
        async function fetchAds() {
            const q = query(collection(db, "ads"), orderBy("date", "desc"));
            const snap = await getDocs(q);
            const list = document.getElementById('ads-list');
            list.innerHTML = '';
            snap.forEach(doc => {
                const item = doc.data();
                list.innerHTML += `
                    <div class="bg-white p-5 rounded-3xl border shadow-sm relative overflow-hidden">
                        <div class="flex justify-between items-center mb-2">
                            <span class="bg-blue-100 text-blue-600 text-[10px] font-bold px-2 py-1 rounded-full">${item.cat}</span>
                            <span class="text-blue-600 font-bold">${item.price} ₾</span>
                        </div>
                        <h3 class="font-bold text-gray-800">${item.title}</h3>
                        <p class="text-xs text-gray-400 mt-2 italic">🔄 გაცვლა: ${item.swap}</p>
                    </div>
                `;
            });
        }
        fetchAds();
    </script>
</body>
</html>
