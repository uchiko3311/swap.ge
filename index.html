<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swap.ge - გაცვალე ყველაფერი</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        body { background-color: #000000; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .main-orange { background-color: #FF5F00; } /* მკვეთრი ნარინჯისფერი */
        .dark-card { background-color: #1a1a1a; border: 1px solid #333; }
        .btn-shadow { box-shadow: 0 4px 0px #b34300; }
        .btn-shadow:active { transform: translateY(2px); box-shadow: 0 2px 0px #b34300; }
        .bottom-nav { background-color: #111; border-top: 2px solid #FF5F00; }
    </style>
</head>
<body class="pb-24">

    <!-- Header -->
    <header class="p-4 bg-black border-b-2 border-[#FF5F00] sticky top-0 z-50 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="text-3xl animate-bounce">🤝</div> 
            <h1 class="text-2xl font-black italic tracking-tighter text-[#FF5F00]">SWAP.GE</h1>
        </div>
        <div class="flex gap-5 text-xl">
            <span>🔍</span>
            <span>☰</span>
        </div>
    </header>

    <!-- Promo Banner (მყარი სტილი) -->
    <section class="p-4">
        <div class="main-orange rounded-xl p-6 text-black relative overflow-hidden shadow-2xl">
            <div class="relative z-10">
                <h2 class="text-2xl font-black uppercase mb-1">მზად ხარ გაცვლისთვის?</h2>
                <p class="text-sm font-bold opacity-80 mb-4">ატვირთე ნივთი და იპოვე სასურველი დღესვე</p>
                <button class="bg-black text-white px-8 py-3 rounded-lg font-black uppercase text-xs btn-shadow">დაიწყე ახლავე</button>
            </div>
            <div class="absolute right-[-20px] bottom-[-20px] text-8xl opacity-20 rotate-12">🤝</div>
        </div>
    </section>

    <!-- Categories (მკაფიო ჩარჩოებით) -->
    <section class="px-4 py-4">
        <h3 class="font-black uppercase text-xs tracking-widest text-[#FF5F00] mb-4">კატეგორიები</h3>
        <div class="grid grid-cols-2 gap-3">
            <div class="dark-card p-4 rounded-lg flex items-center gap-3 border-l-4 border-l-[#FF5F00]">
                <span class="text-2xl">📱</span>
                <span class="font-bold text-sm uppercase">ტექნიკა</span>
            </div>
            <div class="dark-card p-4 rounded-lg flex items-center gap-3 border-l-4 border-l-[#FF5F00]">
                <span class="text-2xl">🚗</span>
                <span class="font-bold text-sm uppercase">ტრანსპორტი</span>
            </div>
            <div class="dark-card p-4 rounded-lg flex items-center gap-3 border-l-4 border-l-[#FF5F00]">
                <span class="text-2xl">🏠</span>
                <span class="font-bold text-sm uppercase">უძრავი ქონება</span>
            </div>
            <div class="dark-card p-4 rounded-lg flex items-center gap-3 border-l-4 border-l-[#FF5F00]">
                <span class="text-2xl">🎨</span>
                <span class="font-bold text-sm uppercase">ჰობი</span>
            </div>
        </div>
    </section>

    <!-- Listings (მყარი კარტები) -->
    <section class="p-4 space-y-4">
        <h3 class="font-black uppercase text-xs tracking-widest text-[#FF5F00]">ბოლო დამატებული</h3>
        
        <!-- Item Card -->
        <div class="dark-card rounded-xl overflow-hidden border-2 border-[#333]">
            <div class="bg-zinc-800 h-48 w-full flex items-center justify-center text-5xl">📱</div>
            <div class="p-4">
                <div class="flex justify-between items-start mb-2">
                    <h4 class="font-black text-lg uppercase leading-tight">iPhone 15 Pro Max</h4>
                    <span class="bg-[#FF5F00] text-black text-[10px] font-black px-2 py-1 rounded">TOP</span>
                </div>
                <p class="text-xs text-zinc-400 font-bold mb-4 italic">🔄 იცვლება: MacBook Air M2-ში</p>
                <button class="w-full bg-white text-black py-3 rounded-lg font-black uppercase text-sm hover:bg-[#FF5F00] transition-colors">დეტალები</button>
            </div>
        </div>
    </section>

    <!-- Navigation (მყარი და ნარინჯისფერი) -->
    <nav class="fixed bottom-0 left-0 right-0 bottom-nav flex justify-around p-2 shadow-[0_-10px_20px_rgba(0,0,0,0.5)]">
        <div class="flex flex-col items-center p-2 text-[#FF5F00]">
            <span class="text-2xl">🏠</span>
            <span class="text-[9px] font-black uppercase mt-1">მთავარი</span>
        </div>
        <div class="flex flex-col items-center p-2 text-zinc-500">
            <span class="text-2xl">❤️</span>
            <span class="text-[9px] font-black uppercase mt-1">შენახული</span>
        </div>
        <!-- 3D Center Button -->
        <div class="relative -mt-8">
            <div class="main-orange w-16 h-16 rounded-full border-4 border-black flex items-center justify-center text-3xl shadow-2xl btn-shadow">🤝</div>
            <span class="text-[9px] font-black uppercase text-[#FF5F00] block text-center mt-1">SWAP</span>
        </div>
        <div class="flex flex-col items-center p-2 text-zinc-500">
            <span class="text-2xl">💬</span>
            <span class="text-[9px] font-black uppercase mt-1">ჩატი</span>
        </div>
        <div class="flex flex-col items-center p-2 text-zinc-500">
            <span class="text-2xl">👤</span>
            <span class="text-[9px] font-black uppercase mt-1">კაბინეტი</span>
        </div>
    </nav>

</body>
</html>
