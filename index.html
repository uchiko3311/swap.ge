<!-- START OF LAUGH ROOM MODULE -->
<div id="laugh-room">
  <button id="laugh-btn">😂 გაგვეცინოს!</button>
  <div id="laugh-bubbles"></div>
</div>

<style>
  #laugh-room {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 9999;
    text-align: center;
  }

  #laugh-btn {
    padding: 15px 25px;
    font-size: 20px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(45deg, #ff6ec4, #7873f5);
    color: white;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    transition: transform 0.2s;
  }

  #laugh-btn:hover {
    transform: scale(1.1);
  }

  .bubble {
    position: absolute;
    bottom: 50px;
    font-size: 24px;
    animation: floatUp 3s ease-out forwards;
    user-select: none;
  }

  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) rotate(0deg); }
    100% { opacity: 0; transform: translateY(-300px) rotate(360deg); }
  }
</style>

<script>
  const laughBtn = document.getElementById('laugh-btn');
  const bubblesContainer = document.getElementById('laugh-bubbles');

  const laughEmojis = ["😂","🤣","😹","😆","😁","😄","😜"];

  laughBtn.addEventListener('click', () => {
    for (let i = 0; i < 10; i++) {
      const bubble = document.createElement('div');
      bubble.classList.add('bubble');
      bubble.textContent = laughEmojis[Math.floor(Math.random() * laughEmojis.length)];
      bubble.style.left = Math.random() * 100 + '%';
      bubble.style.fontSize = Math.random() * 30 + 20 + 'px';
      bubblesContainer.appendChild(bubble);
      
      setTimeout(() => bubble.remove(), 3000);
    }

    // Optional laugh sound
    const laughSound = new Audio('https://www.myinstants.com/media/sounds/laugh-sound.mp3');
    laughSound.play();
  });
</script>
<!-- END OF LAUGH ROOM MODULE -->
