<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>swap.ge - VIP EXCHANGE</title>
    <script src="https://tailwindcss.com"></script>
    <!-- Google AdSense Script -->
    <script async src="https://googlesyndication.com" crossorigin="anonymous"></script>
    <style>
        .banner-slide { min-width: 100%; transition: 0.7s ease-in-out; }
        .vip-card { border: 2px solid #fbbf24; position: relative; }
        .vip-tag { position: absolute; top: 5px; right: 5px; background: #fbbf24; color: black; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <!-- HEADER -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <!-- Logo -->
            <a href="index.html" class="flex items-center gap-2 text-2xl font-black text-blue-700 tracking-tighter">
                <span class="text-3xl">🤝</span>
                <span>swap<span class="text-orange-500">.ge</span></span>
            </a>

            <!-- AdSense Top (Desktop) -->
            <div class="hidden md:block w-1/2 h-16 bg-gray-50 border border-dashed border-gray-300 flex items-center justify-center text-[10px] text-gray-400 uppercase tracking-widest">
                Google AdSense Banner
            </div>

            <!-- Profile / Login -->
            <div id="authSection">
                <a href="login.html" class="bg-blue-600 text-white px-5 py-2 rounded-full font-bold text-sm hover:bg-blue-700 transition">შესვლა</a>
            </div>
        </div>
    </header>

    <!-- AUTOMATIC BANNER SLIDER -->
    <section class="relative w-full h-44 md:h-72 bg-gray-200 overflow-hidden group">
        <div id="bannerWrapper" class="flex h-full w-full">
            <!-- ბანერები ჩაიტვირთება Firebase-დან ან Placeholder-ები -->
            <div class="banner-slide bg-blue-900 flex items-center justify-center text-white font-bold">ბანერი 1</div>
            <div class="banner-slide bg-orange-500 flex items-center justify-center text-white font-bold">ბანერი 2</div>
            <div class="banner-slide bg-green-600 flex items-center justify-center text-white font-bold">ბანერი 3</div>
            <div class="banner-slide bg-purple-600 flex items-center justify-center text-white font-bold">ბანერი 4</div>
            <div class="banner-slide bg-red-600 flex items-center justify-center text-white font-bold">ბანერი 5</div>
        </div>
    </section>

    <!-- MAIN CONTENT -->
    <main class="container mx-auto px-4 py-6 flex flex-col md:flex-row gap-6">
        
        <!-- FEED: განცხადებები -->
        <div class="flex-grow">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black text-gray-800 uppercase tracking-tight border-l-4 border-blue-600 pl-3">ბოლო განცხადებები</h2>
                <a href="add-item.html" class="bg-green-500 text-white p-2 rounded-lg text-sm font-bold shadow-lg">+ დამატება</a>
            </div>

            <div id="itemsGrid" class="grid grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- პოსტების Loading სტატუსი -->
                <div class="animate-pulse bg-white h-48 rounded-xl"></div>
                <div class="animate-pulse bg-white h-48 rounded-xl"></div>
            </div>
        </div>

        <!-- SIDEBAR -->
        <aside class="w-full md:w-80 space-y-6">
            <!-- VIP Promo -->
            <div class="bg-gradient-to-br from-orange-400 to-orange-600 p-5 rounded-2xl text-white shadow-xl">
                <h3 class="font-black text-lg italic">VIP პაკეტი 👑</h3>
                <p class="text-xs mt-1 opacity-90">მიიღეთ 5 განცხადების უფლება 14 ფოტოთი 30 დღის განმავლობაში.</p>
                <div class="mt-4 flex items-center justify-between">
                    <span class="text-2xl font-bold">2 ₾</span>
                    <a href="vip.html" class="bg-white text-orange-600 px-4 py-1.5 rounded-lg font-black text-sm uppercase">ყიდვა</a>
                </div>
            </div>

            <!-- AdSense Sidebar -->
            <div class="w-full h-80 bg-gray-50 border border-dashed border-gray-300 flex items-center justify-center text-[10px] text-gray-400 uppercase">
                AdSense Sidebar
            </div>
        </aside>
    </main>

    <!-- FOOTER -->
    <footer class="bg-white border-t mt-12 py-8 text-center text-gray-400 text-xs">
        <p>© 2026 swap.ge - ყველა უფლება დაცულია</p>
    </footer>

    <!-- LOGIC -->
    <script type="module">
        import { db, auth } from './js/firebase-config.js';
        import { collection, getDocs, query, orderBy, limit } from "https://gstatic.com";
        import { onAuthStateChanged } from "https://gstatic.com";

        // 1. ბანერების ავტომატური სლაიდერი
        let slideIndex = 0;
        const wrapper = document.getElementById('bannerWrapper');
        function autoSlide() {
            slideIndex = (slideIndex + 1) % 5;
            wrapper.style.transform = `translateX(-${slideIndex * 100}%)`;
        }
        setInterval(autoSlide, 5000);

        // 2. განცხადებების ჩატვირთვა
        async function fetchItems() {
            const grid = document.getElementById('itemsGrid');
            try {
                const q = query(collection(db, "items"), orderBy("createdAt", "desc"), limit(12));
                const querySnapshot = await getDocs(q);
                grid.innerHTML = "";

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    grid.innerHTML += `
                        <div class="bg-white rounded-xl shadow-sm overflow-hidden hover:shadow-md transition group cursor-pointer ${data.isVip ? 'vip-card' : ''}">
                            ${data.isVip ? '<div class="vip-tag">VIP</div>' : ''}
                            <img src="${data.images || 'https://placeholder.com'}" class="w-full h-32 md:h-40 object-cover group-hover:scale-105 transition duration-500">
                            <div class="p-3">
                                <h4 class="font-bold text-sm text-gray-800 truncate">${data.title}</h4>
                                <div class="flex justify-between items-center mt-2">
                                    <span class="text-blue-600 font-black text-sm">${data.price ? data.price + '₾' : 'გაცვლა'}</span>
                                    <span class="text-[10px] text-gray-400">📅 30 დღე</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                grid.innerHTML = "<p class='text-gray-400 text-xs text-center col-span-2'>განცხადებები ჯერ არ არის.</p>";
            }
        }

        // 3. ავტორიზაციის შემოწმება
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('authSection').innerHTML = `
                    <a href="profile.html" class="flex items-center gap-2 font-bold text-blue-600 text-sm">
                        <span>👤 კაბინეტი</span>
                    </a>
                `;
            }
        });

        fetchItems();
    </script>
</body>
</html>
