<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swap.com.ge - გაცვალე ყველაფერი</title>
    <!-- Google AdSense -->
    <script async src="https://googlesyndication.com" crossorigin="anonymous"></script>
    <!-- Icons -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --orange-deep: #d35400; --orange-dark: #e67e22; --dark: #2c3e50; --vip-gold: #f1c40f; --bg: #fdf2e9; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; background: var(--bg); color: #333; }
        
        header { background: var(--orange-deep); color: white; padding: 15px 0; position: sticky; top: 0; z-index: 1000; border-bottom: 3px solid var(--dark); }
        .nav-container { max-width: 1100px; margin: auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; gap: 10px; }
        .logo { font-size: 20px; font-weight: bold; text-decoration: none; color: white; display: flex; align-items: center; gap: 8px; }
        .search-bar { flex-grow: 1; }
        .search-bar input { width: 100%; padding: 10px 15px; border-radius: 5px; border: none; outline: none; }
        .lang-switcher-btn { background: var(--dark); border: 1px solid white; color: white; padding: 8px 12px; cursor: pointer; border-radius: 5px; font-weight: bold; }

        .container { max-width: 1100px; margin: auto; padding: 0 20px; }

        /* VIP Banner - აქ იყო პრობლემა */
        .vip-card-main { background: var(--orange-deep); color: white; padding: 30px; border-radius: 15px; border: 2px solid var(--dark); text-align: center; margin: 25px 0; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .vip-card-main h2 { margin: 0; color: var(--vip-gold); font-size: 28px; }
        .btn-vip-activation { background: var(--dark); color: var(--vip-gold); padding: 12px 25px; border-radius: 5px; text-decoration: none; font-weight: 900; display: inline-block; margin-top: 15px; border: 1px solid var(--vip-gold); }

        .post-box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 40px; border-top: 5px solid var(--orange-deep); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, textarea, select { padding: 12px; border: 1px solid #ddd; border-radius: 5px; width: 100%; font-family: inherit; }
        textarea, .upload-area, .preview-container, .btn-post { grid-column: span 2; }
        
        .upload-area { border: 2px dashed #ddd; padding: 20px; text-align: center; border-radius: 8px; cursor: pointer; background: #fafafa; }
        .preview-img { width: 100px; height: 100px; object-fit: cover; border-radius: 5px; margin-top: 10px; border: 1px solid #ddd; }
        .btn-post { background: var(--orange-dark); color: white; border: none; padding: 15px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 17px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; margin-bottom: 50px; }
        .item { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; transition: 0.3s; }
        .item img { width: 100%; height: 180px; object-fit: cover; background: #eee; }
        
        /* VIP Badge განცხადებებზე */
        .vip-badge { position: absolute; top: 10px; left: 10px; background: var(--vip-gold); color: var(--dark); padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 900; z-index: 1; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .delete-btn { position: absolute; top: 10px; right: 10px; background: var(--danger); color: white; border: none; width: 25px; height: 25px; border-radius: 50%; cursor: pointer; z-index: 2; border: 1px solid white; }

        .info { padding: 15px; }
        .info h3 { margin: 0 0 10px; font-size: 17px; color: var(--dark); }

        footer { background: var(--dark); color: white; padding: 40px 20px; text-align: center; margin-top: 50px; border-top: 4px solid var(--orange-deep); }
        .social-links { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; }
        .social-links a { color: white !important; background: rgba(255,255,255,0.1); width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 50%; text-decoration: none; font-size: 20px; transition: 0.3s; }
        .fb:hover { background: #1877F2 !important; } .ig:hover { background: #E4405F !important; } .yt:hover { background: #FF0000 !important; }

        [data-lang] { display: none; } [data-lang].visible { display: block; }
    </style>
</head>
<body onload="initApp()">

<header>
    <div class="nav-container">
        <a href="index.html" class="logo">🤝 SWAP.GE</a>
        <div class="search-bar"><input type="text" id="searchInput" placeholder="მოძებნე..."></div>
        <button class="lang-switcher-btn" id="langToggleBtn" onclick="toggleLanguage()">GE</button>
    </div>
</header>

<div class="container">
    <!-- VIP SECTION - დაბრუნდა -->
    <div class="vip-card-main">
        <h2 data-lang="ka" class="visible">👑 VIP სტატუსი</h2>
        <h2 data-lang="en">👑 VIP STATUS</h2>
        <p data-lang="ka" class="visible">გააქტიურე VIP და გაცვალე 5-ჯერ სწრაფად!</p>
        <p data-lang="en">Activate VIP and swap 5 times faster!</p>
        <a href="premium.html" class="btn-vip-activation">VIP ACTIVATION</a>
    </div>

    <section class="post-box">
        <h2 data-lang="ka" class="visible">➕ განცხადების დამატება</h2>
        <h2 data-lang="en">➕ Add Listing</h2>
        <form class="form-grid" id="postForm">
            <input type="text" id="inputTitle" placeholder="რას ცვლით?" required>
            <select id="inputCat" required>
                <option value="">აირჩიეთ კატეგორია</option>
                <option value="Tech">ტექნიკა</option>
                <option value="Auto">ავტო</option>
                <option value="Home">სახლი</option>
            </select>
            <textarea id="inputDesc" placeholder="აღწერეთ ნივთი..." rows="3" required></textarea>
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <i class="fas fa-camera fa-2x"></i> <p>დაამატეთ ფოტო გალერეიდან</p>
                <input type="file" id="fileInput" hidden accept="image/*" onchange="handleFiles(this.files)">
            </div>
            <div class="preview-container" id="previewContainer"></div>
            <input type="text" id="inputPhone" placeholder="ტელეფონი" required>
            <button type="submit" class="btn-post">გამოქვეყნება</button>
        </form>
    </section>

    <h2 id="recentTitle">🔍 ბოლო განცხადებები</h2>
    <div class="grid" id="listingGrid"></div>
</div>

<footer>
    <div class="social-links">
        <a href="#" class="fb"><i class="fa-brands fa-facebook-f"></i></a>
        <a href="#" class="ig"><i class="fa-brands fa-instagram"></i></a>
        <a href="#" class="yt"><i class="fa-brands fa-youtube"></i></a>
        <a href="#" class="tt"><i class="fa-brands fa-tiktok"></i></a>
    </div>
    <div class="copyright">© 2024 Swap.com.ge - ყველა უფლება დაცულია</div>
</footer>

<script>
    let currentLang = 'ka';
    let uploadedImage = "";

    function initApp() { renderListings(); applyLanguage('ka'); }

    function handleFiles(files) {
        const reader = new FileReader();
        reader.onload = (e) => {
            uploadedImage = e.target.result;
            document.getElementById('previewContainer').innerHTML = `<img src="${uploadedImage}" class="preview-img">`;
        };
        reader.readAsDataURL(files[0]);
    }

    document.getElementById('postForm').onsubmit = function(e) {
        e.preventDefault();
        const newPost = { id: Date.now(), title: document.getElementById('inputTitle').value, desc: document.getElementById('inputDesc').value, img: uploadedImage || "https://pixabay.com" };
        let posts = JSON.parse(localStorage.getItem('user_posts_v2') || '[]');
        posts.unshift(newPost);
        localStorage.setItem('user_posts_v2', JSON.stringify(posts));
        this.reset(); uploadedImage = ""; document.getElementById('previewContainer').innerHTML = '';
        renderListings();
    };

    function deletePost(id) {
        let posts = JSON.parse(localStorage.getItem('user_posts_v2') || '[]');
        posts = posts.filter(p => p.id !== id);
        localStorage.setItem('user_posts_v2', JSON.stringify(posts));
        renderListings();
    }

    function renderListings() {
        const grid = document.getElementById('listingGrid');
        const userPosts = JSON.parse(localStorage.getItem('user_posts_v2') || '[]');
        const staticPosts = [
            { id: 1, title: "iPhone 13 Pro", img: "https://pixabay.com", desc: "ვიცვლი MacBook-ში.", vip: true },
            { id: 2, title: "BMW E46 M-Pack", img: "https://pixabay.com", desc: "ვიცვლი SUV-ში.", vip: true },
            { id: 3, title: "Nike Air Max", img: "https://pixabay.com", desc: "ვიცვლი JBL-ში.", vip: false }
        ];
        const all = [...userPosts, ...staticPosts];
        grid.innerHTML = all.map(post => `
            <div class="item">
                ${post.vip ? '<div class="vip-badge">👑 VIP</div>' : ''}
                ${post.id > 1000 ? `<button class="delete-btn" onclick="deletePost(${post.id})">×</button>` : ''}
                <img src="${post.img}">
                <div class="info"><h3>${post.title}</h3><p>${post.desc}</p></div>
            </div>
        `).join('');
    }

    function toggleLanguage() { currentLang = currentLang === 'ka' ? 'en' : 'ka'; applyLanguage(currentLang); }
    function applyLanguage(lang) {
        document.getElementById('langToggleBtn').innerText = lang === 'ka' ? 'GE' : 'EN';
        document.querySelectorAll('[data-lang]').forEach(el => el.classList.toggle('visible', el.dataset.lang === lang));
    }
</script>
</body>
</html>
