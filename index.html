<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sneaker Shop | ონლაინ მაღაზია</title>
    <!-- Tailwind CSS დიზაინისთვის -->
    <script src="https://tailwindcss.com"></script>
    <!-- Icon-ები კალათისთვის -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        .product-card:hover { transform: translateY(-8px); transition: 0.4s; }
        .cart-open { transform: translateX(0) !important; }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <!-- ნავიგაცია -->
    <nav class="bg-white shadow-md p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <a href="#" class="text-2xl font-black text-indigo-600 tracking-tighter">SNEAKER HUB</a>
            <div class="relative cursor-pointer transition hover:scale-110" onclick="toggleCart()">
                <i class="fas fa-shopping-bag text-2xl text-gray-700"></i>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-indigo-600 text-white rounded-full text-[10px] w-5 h-5 flex items-center justify-center font-bold shadow-lg">0</span>
            </div>
        </div>
    </nav>

    <!-- მთავარი სექცია -->
    <main class="container mx-auto p-6">
        <div class="flex items-center justify-between mb-10">
            <h2 class="text-3xl font-extrabold text-gray-800">ახალი კოლექცია</h2>
            <div class="h-1 flex-grow mx-6 bg-gray-200 rounded-full hidden md:block"></div>
        </div>
        
        <!-- პროდუქტების სია -->
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <!-- აქ ჩაიტვირთება პროდუქტები JavaScript-ით -->
        </div>
    </main>

    <!-- კალათის გვერდითა პანელი -->
    <div id="cart-sidebar" class="fixed right-0 top-0 h-full w-full md:w-96 bg-white shadow-2xl translate-x-full transition-transform duration-500 z-[100] p-6 flex flex-col">
        <div class="flex justify-between items-center mb-8 border-b pb-4">
            <h3 class="text-2xl font-bold text-gray-800 italic">თქვენი კალათა</h3>
            <button onclick="toggleCart()" class="text-gray-400 hover:text-red-500 text-3xl transition">&times;</button>
        </div>
        
        <div id="cart-items" class="flex-grow space-y-6 overflow-y-auto pr-2">
            <!-- კალათის ნივთები -->
        </div>

        <div class="border-t mt-6 pt-6 bg-white">
            <div class="flex justify-between items-center mb-6">
                <span class="text-gray-500 font-medium text-lg">სულ გადასახდელი:</span>
                <span id="cart-total" class="text-3xl font-black text-indigo-600">0 ₾</span>
            </div>
            <button onclick="checkout()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-indigo-700 shadow-xl shadow-indigo-100 transition-all active:scale-95">
                შეკვეთის გაფორმება
            </button>
        </div>
    </div>

    <script>
        // პროდუქტების ბაზა (შეგიძლია დაამატო მეტი)
        const products = [
            { id: 1, name: "Nike Air Max Pulse", price: 340, img: "https://nike.com" },
            { id: 2, name: "Adidas Forum Low", price: 280, img: "https://adidas.com" },
            { id: 3, name: "Jordan Stay Loyal 2", price: 410, img: "https://nike.com" },
            { id: 4, name: "New Balance 530", price: 295, img: "https://clothes.com" }
        ];

        let cart = [];

        // 1. პროდუქტების გამოჩენა გვერდზე
        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => `
                <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden product-card p-4">
                    <div class="bg-gray-100 rounded-2xl mb-4 overflow-hidden h-64 flex items-center justify-center">
                        <img src="${p.img}" class="w-full h-full object-contain mix-blend-multiply">
                    </div>
                    <div class="px-2">
                        <h3 class="text-lg font-bold text-gray-800 leading-tight h-14">${p.name}</h3>
                        <div class="flex justify-between items-center mt-4">
                            <span class="text-2xl font-black text-indigo-600">${p.price} ₾</span>
                            <button onclick="addToCart(${p.id})" class="bg-gray-900 text-white p-3 rounded-xl hover:bg-indigo-600 transition shadow-lg">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 2. კალათაში დამატება
        function addToCart(id) {
            const item = products.find(p => p.id === id);
            cart.push(item);
            updateCartUI();
            
            // ავტომატურად გავხსნათ კალათა დამატებისას
            document.getElementById('cart-sidebar').classList.add('cart-open');
        }

        // 3. კალათის განახლება
        function updateCartUI() {
            const cartList = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');
            const countEl = document.getElementById('cart-count');
            
            cartList.innerHTML = cart.map((item, index) => `
                <div class="flex items-center gap-4 bg-gray-50 p-3 rounded-2xl animate-fade-in">
                    <img src="${item.img}" class="w-16 h-16 object-contain bg-white rounded-lg border">
                    <div class="flex-grow">
                        <h4 class="font-bold text-gray-800 text-sm">${item.name}</h4>
                        <p class="text-indigo-600 font-black">${item.price} ₾</p>
                    </div>
                    <button onclick="removeFromCart(${index})" class="text-gray-300 hover:text-red-500 transition px-2">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + item.price, 0);
            totalEl.innerText = total + " ₾";
            countEl.innerText = cart.length;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('cart-open');
        }

        function checkout() {
            if(cart.length === 0) return alert("კალათა ცარიელია!");
            alert("შეკვეთა მიღებულია! (ეს არის დემო ვერსია)");
            cart = [];
            updateCartUI();
            toggleCart();
        }

        renderProducts();
    </script>
</body>
</html>
