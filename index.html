<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SWAP.GE</title>

<link rel="stylesheet" href="style.css">
<link rel="icon" href="favicon.png">
</head>

<body>

<header>
  <div class="logo">SWAP.GE</div>

  <nav>
    <a onclick="show('home')">მთავარი</a>
    <a onclick="show('create')">დამატება</a>
    <a onclick="show('cabinet')">კაბინეტი</a>
    <a onclick="show('chat')">ჩატი</a>
    <a onclick="show('login')">შესვლა</a>
  </nav>
</header>

<!-- HOME -->
<div id="home" class="container">
  <input id="search" placeholder="ძიება...">

  <div class="slider">
    <img src="banner1.jpg">
    <img src="banner2.jpg">
    <img src="banner3.jpg">
  </div>

  <div id="ads"></div>
</div>

<!-- CREATE -->
<div id="create" class="container hidden">
  <h2>განცხადება</h2>

  <input id="title" placeholder="სათაური">
  <textarea id="desc" placeholder="აღწერა"></textarea>

  <input id="img" placeholder="სურათები (,) გამოყოფით">

  <label>
    <input type="checkbox" id="vip"> VIP (2 ლარი)
  </label>

  <button onclick="createAd()">დამატება</button>
</div>

<!-- LOGIN -->
<div id="login" class="container hidden">
  <h2>შესვლა</h2>
  <input id="user" placeholder="მომხმარებელი">
  <input id="pass" type="password" placeholder="პაროლი">
  <button onclick="login()">შესვლა</button>
</div>

<!-- CABINET -->
<div id="cabinet" class="container hidden">
  <h2>ჩემი განცხადებები</h2>
  <div id="myAds"></div>
</div>

<!-- CHAT -->
<div id="chat" class="container hidden">
  <h2>ჩატი</h2>

  <div id="chatBox"></div>

  <input id="chatInput" placeholder="მესიჯი">
  <button onclick="sendMsg()">გაგზავნა</button>
</div>

<footer>
© 2026 SWAP.GE
</footer>

<script src="app.js"></script>
</body>
  </html>
