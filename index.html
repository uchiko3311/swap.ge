<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWAP.GE - გაცვალე ყველაფერი</title>
    
    <!-- Tailwind CSS -->
    <script src="https://tailwindcss.com"></script>
    <!-- Font Awesome (ხატულებისთვის) -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <!-- Google Fonts -->
    <link href="https://googleapis.com" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FFF5F0; }
        .banner-slide { display: none; height: 300px; }
        .active-slide { display: flex; animation: fadeIn 0.8s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .card-hover:hover { transform: translateY(-5px); transition: all 0.3s ease; }
    </style>
</head>
<body class="pb-24">

    <!-- 1. ნავიგაცია -->
    <nav class="bg-[#E65100] shadow-xl sticky top-0 z-50 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="text-white text-2xl font-black flex items-center gap-2 tracking-tighter">
                <i class="fas fa-handshake rotate-[-10deg]"></i> SWAP.GE
            </a>
            
            <div id="auth-ui" class="flex items-center gap-3">
                <a href="login.html" class="bg-white text-[#E65100] px-5 py-2 rounded-xl font-bold text-sm hover:bg-orange-50 transition shadow-md">
                    <i class="fas fa-sign-in-alt mr-1"></i> შესვლა
                </a>
            </div>
        </div>
    </nav>

    <!-- 2. სარეკლამო ბანერები (Slider) -->
    <div class="container mx-auto px-4 mt-6">
        <div id="banner-slider" class="relative bg-white rounded-[2rem] overflow-hidden shadow-lg border-4 border-white h-[200px] md:h-[300px]">
            <div class="banner-slide active-slide items-center justify-center bg-gradient-to-br from-orange-400 to-red-500 text-white p-8">
                <div class="text-center">
                    <h2 class="text-3xl md:text-5xl font-black mb-2 uppercase italic">გაცვალე მარტივად!</h2>
                    <p class="font-bold opacity-90">ნივთები, რომლებიც აღარ გჭირდება</p>
                </div>
            </div>
            <div class="banner-slide items-center justify-center bg-gradient-to-br from-indigo-600 to-purple-700 text-white p-8">
                <div class="text-center">
                    <h2 class="text-3xl md:text-5xl font-black mb-2 uppercase italic">VIP სტატუსი</h2>
                    <p class="font-bold opacity-90">გახადე შენი განცხადება ყველაზე ხილვადი</p>
                </div>
            </div>
            <!-- სხვა ბანერები ავტომატურად ჩაიტვირთება -->
        </div>
    </div>

    <main class="container mx-auto px-4 py-8">
        
        <!-- 3. საძიებო ველი -->
        <div class="max-w-3xl mx-auto mb-10">
            <div class="relative group">
                <input type="text" id="search-bar" placeholder="რას ეძებ დღეს?" 
                    class="w-full p-5 pl-7 rounded-2xl border-2 border-transparent shadow-xl focus:border-orange-500 outline-none text-lg transition-all bg-white">
                <button class="absolute right-4 top-4 bg-orange-500 text-white w-12 h-12 rounded-xl hover:bg-orange-600 transition">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </div>

        <!-- 4. კატეგორიები -->
        <div class="flex gap-4 overflow-x-auto pb-6 mb-8 no-scrollbar">
            <button class="flex items-center gap-3 bg-white px-8 py-4 rounded-2xl shadow-sm border-2 border-transparent hover:border-orange-500 font-bold transition whitespace-nowrap">
                <i class="fas fa-laptop text-orange-500 text-xl"></i> ტექნიკა
            </button>
            <button class="flex items-center gap-3 bg-white px-8 py-4 rounded-2xl shadow-sm border-2 border-transparent hover:border-orange-500 font-bold transition whitespace-nowrap">
                <i class="fas fa-car text-orange-500 text-xl"></i> ავტო
            </button>
            <button class="flex items-center gap-3 bg-white px-8 py-4 rounded-2xl shadow-sm border-2 border-transparent hover:border-orange-500 font-bold transition whitespace-nowrap">
                <i class="fas fa-tshirt text-orange-500 text-xl"></i> ტანსაცმელი
            </button>
            <button class="flex items-center gap-3 bg-white px-8 py-4 rounded-2xl shadow-sm border-2 border-transparent hover:border-orange-500 font-bold transition whitespace-nowrap">
                <i class="fas fa-couch text-orange-500 text-xl"></i> სახლი
            </button>
        </div>

        <!-- 5. VIP განცხადებები (მხოლოდ თუ არსებობს) -->
        <section id="vip-section" class="hidden mb-12">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-black text-gray-800 flex items-center gap-2">
                    <i class="fas fa-crown text-yellow-500"></i> VIP შეთავაზებები
                </h3>
            </div>
            <div id="vip-container" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6">
                <!-- VIP ბარათები -->
            </div>
        </section>

        <!-- 6. ბოლო განცხადებები -->
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-2xl font-black text-gray-800">ახალი განცხადებები</h3>
            <select class="bg-transparent font-bold text-orange-600 outline-none cursor-pointer">
                <option>ყველა</option>
                <option>ფასით</option>
                <option>თარიღით</option>
            </select>
        </div>
        
        <div id="items-container" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6">
            <!-- Loading State -->
            <div class="col-span-full text-center py-20">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-t-4 border-orange-500 border-solid"></div>
                <p class="mt-4 text-gray-500 font-medium italic">განცხადებები იტვირთება...</p>
            </div>
        </div>

    </main>

    <!-- 7. დამატების ღილაკი (Floating Button) -->
    <a href="add-item.html" class="fixed bottom-6 right-6 bg-[#E65100] text-white w-16 h-16 rounded-2xl flex items-center justify-center shadow-2xl hover:scale-105 active:scale-95 transition-all z-50 border-4 border-white">
        <i class="fas fa-plus text-2xl"></i>
    </a>

    <!-- 🏗️ FIREBASE & LOGIC -->
    <script type="module">
        // გამოიყენე სრული CDN მისამართები
        import { initializeApp } from "https://gstatic.com";
        import { getAuth, onAuthStateChanged } from "https://gstatic.com";
        import { getFirestore, doc, getDoc, collection, query, orderBy, limit, getDocs } from "https://gstatic.com";

        const firebaseConfig = {
            apiKey: "AIzaSyAEUjh_mVRLTzUecRJbeG_K6gTp__FVft0",
            authDomain: "://firebaseapp.com",
            projectId: "swap-39e13",
            storageBucket: "://appspot.com",
            messagingSenderId: "107187341554",
            appId: "1:107187341554:web:75533a380b58a7a141286b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 8. ავტორიზაციის შემოწმება
        onAuthStateChanged(auth, async (user) => {
            const authUi = document.getElementById('auth-ui');
            if (user) {
                const userSnap = await getDoc(doc(db, "users", user.uid));
                const userData = userSnap.data();
                
                if (userData?.isVIP) document.getElementById('vip-section').classList.remove('hidden');

                authUi.innerHTML = `
                    <div class="flex items-center gap-3">
                        <a href="profile.html" class="bg-white/20 text-white p-2 px-4 rounded-xl font-bold flex items-center gap-2 hover:bg-white/30 transition">
                            <i class="fas fa-user-circle"></i> კაბინეტი
                        </a>
                        <a href="settings.html" class="text-white hover:rotate-90 transition-all duration-300"><i class="fas fa-cog text-xl"></i></a>
                    </div>
                `;
            }
        });

        // 9. ბანერების სლაიდერი
        let slideIndex = 0;
        const slides = document.getElementsByClassName("banner-slide");
        setInterval(() => {
            if(slides.length < 2) return;
            slides[slideIndex].classList.remove("active-slide");
            slideIndex = (slideIndex + 1) % slides.length;
            slides[slideIndex].classList.add("active-slide");
        }, 5000);

        // 10. განცხადებების დინამიური ჩატვირთვა
        async function fetchItems() {
            const container = document.getElementById('items-container');
            try {
                const q = query(collection(db, "items"), orderBy("createdAt", "desc"), limit(12));
                const querySnapshot = await getDocs(q);
                container.innerHTML = '';

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    container.innerHTML += `
                        <div class="bg-white rounded-3xl p-3 shadow-sm hover:shadow-xl transition-all card-hover cursor-pointer border border-gray-100 group">
                            <div class="relative h-40 md:h-52 overflow-hidden rounded-2xl bg-gray-50 mb-3">
                                <img src="${data.image || 'https://placeholder.com'}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                                <div class="absolute top-2 left-2 bg-white/90 backdrop-blur px-2 py-1 rounded-lg text-[10px] font-black uppercase shadow-sm">
                                    ${data.category || 'სხვა'}
                                </div>
                            </div>
                            <h4 class="font-bold text-gray-800 truncate px-1">${data.title}</h4>
                            <div class="flex justify-between items-center mt-2 px-1">
                                <span class="text-[#E65100] font-black">${data.price ? data.price + ' ₾' : 'გაცვლა'}</span>
                                <span class="text-gray-400 text-xs"><i class="far fa-clock"></i> ახალი</span>
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                container.innerHTML = '<p class="col-span-full text-center text-red-500">შეცდომა ჩატვირთვისას.</p>';
            }
        }
        fetchItems();
    </script>

</body>
</html>
