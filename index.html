<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWAP.GE - სრულყოფილი პლატფორმა</title>
    
    <!-- Icons & Firebase -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    
    <!-- AdSense -->
    <script async src="https://googlesyndication.com" crossorigin="anonymous"></script>

    <style>
        :root { --main: #27ae60; --dark: #2c3e50; --vip: #f1c40f; --bg: #f8fafc; --white: #ffffff; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--dark); overflow-x: hidden; }

        /* Header */
        header { background: var(--white); padding: 15px 5%; box-shadow: 0 2px 15px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; }
        .nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .logo { font-size: 26px; font-weight: 900; color: var(--main); text-decoration: none; letter-spacing: -1px; }
        
        .search-bar { position: relative; width: 100%; margin-bottom: 12px; }
        .search-bar input { width: 100%; padding: 12px 45px 12px 20px; border-radius: 15px; border: 1.5px solid #eee; outline: none; font-size: 16px; transition: 0.3s; }
        .search-bar input:focus { border-color: var(--main); }
        .search-bar i { position: absolute; right: 15px; top: 15px; color: #aaa; }

        .action-btns { display: grid; grid-template-columns: 60px 1fr 1fr; gap: 10px; }
        .btn { border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-lang { background: var(--dark); color: white; }
        .btn-add { background: var(--main); color: white; box-shadow: 0 4px 10px rgba(39, 174, 96, 0.2); }

        /* Categories */
        .categories-nav { display: flex; gap: 10px; overflow-x: auto; padding: 12px 5%; background: #fff; border-bottom: 1px solid #eee; scrollbar-width: none; -ms-overflow-style: none; }
        .categories-nav::-webkit-scrollbar { display: none; }
        .cat-item { padding: 10px 20px; background: #f1f5f9; border-radius: 25px; white-space: nowrap; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.3s; border: 1px solid transparent; }
        .cat-item.active { background: var(--main); color: white; border-color: var(--main); }

        /* Content */
        .container { padding: 20px 5%; display: grid; grid-template-columns: 1fr 320px; gap: 30px; }
        @media (max-width: 1000px) { .container { grid-template-columns: 1fr; } }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        .card { background: var(--white); border-radius: 18px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.04); border: 1px solid #f1f5f9; position: relative; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.08); }
        
        .vip-label { position: absolute; top: 12px; right: 12px; background: var(--vip); color: #000; padding: 5px 12px; border-radius: 8px; font-size: 11px; font-weight: 900; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 180px; object-fit: cover; background: #f9f9f9; }
        
        .card-info { padding: 15px; position: relative; }
        .card-info h4 { margin: 0 0 5px 0; font-size: 16px; color: var(--dark); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .price { color: var(--main); font-weight: 800; font-size: 18px; }

        .btn-delete { position: absolute; bottom: 15px; right: 15px; color: var(--danger); background: #fff5f5; border: none; cursor: pointer; width: 35px; height: 35px; border-radius: 50%; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .btn-delete:hover { background: var(--danger); color: white; }

        /* Sidebar */
        .sidebar-box { background: var(--white); padding: 25px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); position: sticky; top: 100px; }
        .btn-vip-promo { background: var(--vip); width: 100%; padding: 16px; border-radius: 15px; font-weight: 900; border: none; cursor: pointer; font-size: 16px; box-shadow: 0 4px 15px rgba(241, 196, 15, 0.3); transition: 0.3s; }
        .btn-vip-promo:active { transform: scale(0.95); }

        .ad-slot { background: #ebf2f7; text-align: center; padding: 15px; margin: 15px 0; border-radius: 15px; border: 1px dashed #cbd5e1; color: #94a3b8; font-size: 11px; }

        /* Modals */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: white; padding: 35px; border-radius: 25px; width: 90%; max-width: 420px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
        input, textarea, select { width: 100%; padding: 14px; margin: 10px 0; border: 1.5px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 15px; outline: none; }
        input:focus { border-color: var(--main); }
    </style>
</head>
<body>

<header>
    <div class="nav-top">
        <a href="#" class="logo">SWAP.GE</a>
        <button class="btn btn-lang" onclick="toggleLanguage()" id="langBtn">KA</button>
    </div>
    
    <div class="search-bar">
        <input type="text" id="searchInput" data-placeholder="search_ph" onkeyup="searchAds()">
        <i class="fas fa-search"></i>
    </div>

    <div class="action-btns">
        <button class="btn" style="background:#f1f5f9" onclick="alert('მალე!')"><i class="fas fa-user"></i></button>
        <button class="btn btn-add" onclick="toggleModal('addModal')"><i class="fas fa-plus"></i> <span data-lang="add_btn">დამატება</span></button>
    </div>
</header>

<div class="categories-nav" id="catNav">
    <div class="cat-item active" onclick="filterByCategory('all')" data-lang="cat_all">ყველა</div>
    <div class="cat-item" onclick="filterByCategory('ავტო')" data-lang="cat_auto">ავტო</div>
    <div class="cat-item" onclick="filterByCategory('უძრავი ქონება')" data-lang="cat_home">ბინები</div>
    <div class="cat-item" onclick="filterByCategory('ტექნიკა')" data-lang="cat_tech">ტექნიკა</div>
    <div class="cat-item" onclick="filterByCategory('სხვა')" data-lang="cat_other">სხვა</div>
</div>

<div class="container">
    <main>
        <div class="ad-slot">GOOGLE ADSENSE - ჰორიზონტალური ბანერი</div>
        <div class="grid" id="itemsGrid">იტვირთება...</div>
    </main>

    <aside>
        <div class="sidebar-box">
            <h4 data-lang="filter_title">ფილტრაცია</h4>
            <button class="cat-item" id="btnVIP" onclick="filterItems(true)" style="width:100%; margin-bottom:10px; border:2px solid var(--vip)" data-lang="only_vip">მხოლოდ VIP</button>
            <button class="cat-item" id="btnAll" onclick="filterItems(false)" style="width:100%;" data-lang="all_ads">ყველა განცხადება</button>
            
            <button class="btn-vip-promo" onclick="activateVIP()">
                <i class="fas fa-crown"></i> VIP სტატუსი (2₾)
            </button>
        </div>
        <div class="ad-slot" style="height: 450px;">GOOGLE ADSENSE - ვერტიკალური რეკლამა</div>
    </aside>
</div>

<!-- Modal: Add -->
<div id="addModal" class="modal"><div class="modal-content">
    <h3 data-lang="add_title">დამატება</h3>
    <select id="cat">
        <option value="ავტო">ავტო</option>
        <option value="უძრავი ქონება">უძრავი ქონება</option>
        <option value="ტექნიკა">ტექნიკა</option>
        <option value="სხვა" selected>სხვა</option>
    </select>
    <input type="text" id="title" data-placeholder="ph_title">
    <input type="text" id="price" data-placeholder="ph_price">
    <input type="text" id="img" data-placeholder="ph_img">
    <button class="btn btn-add" style="width:100%" onclick="saveItem()" data-lang="publish">გამოქვეყნება</button>
    <button onclick="toggleModal('addModal')" style="width:100%; background:none; margin-top:10px; color:#999;" data-lang="close">დახურვა</button>
</div></div>

<script>
    // 1. Firebase - შენი მონაცემები
    const firebaseConfig = { apiKey: "AIzaSyAEUjh_mVRLTzUecRJbeG_K6gTp__FVft0", authDomain: "://firebaseapp.com", databaseURL: "https://firebaseio.com", projectId: "swap-39e13", storageBucket: "swap-39e13.firebasestorage.app", messagingSenderId: "107187341554", appId: "1:107187341554:web:75533a380b58a7a141286b" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const trans = {
        ka: { add_btn: "დამატება", cat_all: "ყველა", cat_auto: "ავტო", cat_home: "ბინები", cat_tech: "ტექნიკა", cat_other: "სხვა", only_vip: "მხოლოდ VIP", all_ads: "ყველა", filter_title: "ფილტრაცია", search_ph: "რას ეძებთ?", add_title: "დამატება", publish: "გამოქვეყნება", close: "დახურვა", ph_title: "სათაური", ph_price: "ფასი", ph_img: "სურათის URL" },
        en: { add_btn: "Add", cat_all: "All", cat_auto: "Auto", cat_home: "Homes", cat_tech: "Tech", cat_other: "Other", only_vip: "Only VIP", all_ads: "All Ads", filter_title: "Filter", search_ph: "Search...", add_title: "Add Ad", publish: "Publish", close: "Close", ph_title: "Title", ph_price: "Price", ph_img: "Image URL" },
        ru: { add_btn: "Добавить", cat_all: "Все", cat_auto: "Авто", cat_home: "Дома", cat_tech: "Техника", cat_other: "Другое", only_vip: "Только VIP", all_ads: "Все", filter_title: "Фильтр", search_ph: "Поиск...", add_title: "Добавить", publish: "Опубликовать", close: "Закрыть", ph_title: "Название", ph_price: "Цена", ph_img: "Ссылка" }
    };

    let curLang = localStorage.getItem('siteLang') || 'ka';
    let allAds = [];

    // 2. ლოგიკა
    function toggleLanguage() {
        const langs = ['ka', 'en', 'ru'];
        curLang = langs[(langs.indexOf(curLang) + 1) % langs.length];
        localStorage.setItem('siteLang', curLang);
        location.reload();
    }

    function toggleModal(id) {
        const m = document.getElementById(id);
        m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
    }

    function saveItem() {
        const t = document.getElementById('title').value;
        const p = document.getElementById('price').value;
        const i = document.getElementById('img').value;
        const c = document.getElementById('cat').value;
        if(!t || !p) return alert("შეავსეთ ველები!");
        
        db.ref('items/').push({ title: t, price: p, img: i, category: c, isVIP: localStorage.getItem('isVIP') === 'true' });
        toggleModal('addModal');
        alert("განცხადება დამატებულია!");
    }

    function deleteItem(id) {
        if(confirm("ნამდვილად გსურთ წაშლა?")) db.ref('items/' + id).remove();
    }

    function loadItems() {
        db.ref('items/').on('value', snap => {
            allAds = [];
            snap.forEach(child => { allAds.push({ ...child.val(), id: child.key }); });
            renderAds(allAds);
        });
    }

    function renderAds(data) {
        const grid = document.getElementById('itemsGrid');
        grid.innerHTML = data.slice().reverse().map(item => `
            <div class="card">
                ${item.isVIP ? '<div class="vip-label">VIP</div>' : ''}
                <img src="${item.img || 'https://placeholder.com'}" onerror="this.src='https://placeholder.com?text=No+Image'">
                <div class="card-info">
                    <h4>${item.title}</h4>
                    <div class="price">${item.price}</div>
                    <button class="btn-delete" onclick="deleteItem('${item.id}')" title="წაშლა"><i class="fas fa-trash-alt"></i></button>
                </div>
            </div>
        `).join('');
    }

    function filterByCategory(cat) {
        document.querySelectorAll('.cat-item').forEach(el => el.classList.remove('active'));
        event.target.classList.add('active');
        renderAds(cat === 'all' ? allAds : allAds.filter(a => a.category === cat));
    }

    function searchAds() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        renderAds(allAds.filter(a => a.title.toLowerCase().includes(term)));
    }

    function filterItems(v) {
        renderAds(v ? allAds.filter(a => a.isVIP) : allAds);
    }

    function activateVIP() {
        localStorage.setItem('isVIP', 'true');
        alert("VIP სტატუსი გააქტიურდა!");
        location.reload();
    }

    // სატესტო მონაცემები (მხოლოდ თუ ბაზა ცარიელია)
    function seed() {
        db.ref('items/').once('value', s => {
            if(!s.exists()) {
                const cats = ["ავტო", "უძრავი ქონება", "ტექნიკა", "სხვა"];
                for(let i=1; i<=20; i++) {
                    db.ref('items/').push({ 
                        title: (i <= 5 ? "VIP ნივთი #" : "ნივთი #") + i, 
                        price: (i * 150) + " ₾", 
                        category: cats[i % 4], 
                        isVIP: i <= 5, 
                        img: "https://picsum.photos" + i 
                    });
                }
            }
        });
    }

    window.onload = () => {
        document.querySelectorAll('[data-lang]').forEach(el => el.innerText = trans[curLang][el.getAttribute('data-lang')]);
        document.querySelectorAll('[data-placeholder]').forEach(el => el.placeholder = trans[curLang][el.getAttribute('data-placeholder')]);
        document.getElementById('langBtn').innerText = curLang.toUpperCase();
        seed(); loadItems();
    };
</script>
</body>
</html>
