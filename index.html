<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok Clone - Final Fix</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #000; height: 100vh; display: flex; justify-content: center; overflow: hidden; }
        
        .app {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            position: relative;
            background: #000;
        }

        .feed {
            height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }
        .feed::-webkit-scrollbar { display: none; }

        .video-card {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .side-bar {
            position: absolute;
            right: 15px;
            bottom: 100px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            color: white;
            z-index: 10;
        }

        .details {
            position: absolute;
            bottom: 30px;
            left: 15px;
            color: white;
            z-index: 10;
        }
    </style>
</head>
<body>

<div class="app">
    <div class="feed" id="feed">
        
        <!-- ვიდეო 1 -->
        <div class="video-card">
            <!-- დამატებულია muted და playsinline ჩატვირთვისთვის -->
            <video class="v-player" loop muted playsinline preload="auto" src="https://mixkit.co"></video>
            <div class="side-bar">
                <span>❤️</span>
                <span>💬</span>
                <span>🔗</span>
            </div>
            <div class="details">
                <h4>@user_one</h4>
                <p>GitHub-ზე მუშაობს! 🚀</p>
            </div>
        </div>

        <!-- ვიდეო 2 -->
        <div class="video-card">
            <video class="v-player" loop muted playsinline preload="auto" src="https://mixkit.co"></video>
            <div class="side-bar">
                <span>❤️</span>
                <span>💬</span>
                <span>🔗</span>
            </div>
            <div class="details">
                <h4>@nature_page</h4>
                <p>შემოდგომის ხედები 🍂</p>
            </div>
        </div>

    </div>
</div>

<script>
    const videos = document.querySelectorAll('.v-player');

    // ვიდეოების მართვა სქროლვისას
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                // ავტომატური Play
                let playPromise = entry.target.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        console.log("ავტომატური ჩართვა დაიბლოკა, საჭიროა კლიკი.");
                    });
                }
            } else {
                entry.target.pause();
            }
        });
    }, { threshold: 0.6 });

    videos.forEach(video => {
        observer.observe(video);
        
        // კლიკზე ხმის ჩართვა და Play/Pause
        video.addEventListener('click', () => {
            video.muted = false; // ხმის გააქტიურება პირველივე კლიკზე
            if (video.paused) {
                video.play();
            } else {
                video.pause();
            }
        });
    });
</script>

</body>
</html>
