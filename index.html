<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swap.com.ge - გაცვალე ყველაფერი</title>
    
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <style>
        :root { --orange-deep: #d35400; --orange-dark: #e67e22; --dark: #2c3e50; --vip-gold: #f1c40f; --bg: #fdf2e9; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; background: var(--bg); color: #333; }
        
        header { background: var(--orange-deep); color: white; padding: 12px 0; position: sticky; top: 0; z-index: 1000; border-bottom: 3px solid var(--dark); }
        .nav-container { max-width: 1100px; margin: auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; gap: 10px; }
        
        .search-bar { flex-grow: 1; margin: 0 15px; }
        .search-bar input { width: 100%; padding: 10px 15px; border-radius: 5px; border: none; outline: none; }

        .header-btns { display: flex; align-items: center; gap: 10px; }
        .lang-btn { background: var(--dark); border: 1px solid white; color: white; padding: 5px 10px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .btn-vip-header { background: var(--dark); color: var(--vip-gold); padding: 8px 12px; border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 13px; border: 1.5px solid var(--vip-gold); }

        .container { max-width: 1100px; margin: auto; padding: 20px; }

        /* ენის მართვა */
        [data-lang-en] { display: none; }
        body.en-mode [data-lang-ka] { display: none; }
        body.en-mode [data-lang-en] { display: inline-block; }
        body.en-mode .grid-en { display: block; }

        .post-box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 30px; border-top: 5px solid var(--orange-deep); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, textarea, select { padding: 12px; border: 1px solid #ddd; border-radius: 5px; width: 100%; box-sizing: border-box; }
        textarea, .upload-area, .btn-post { grid-column: span 2; }
        .upload-area { border: 2px dashed #ddd; padding: 20px; text-align: center; cursor: pointer; background: #fafafa; }
        .btn-post { background: var(--orange-dark); color: white; border: none; padding: 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .item { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: relative; }
        .item img { width: 100%; height: 180px; object-fit: cover; }
        .item-info { padding: 15px; }

        footer { background: var(--dark); color: white; padding: 30px; text-align: center; margin-top: 50px; }
        .footer-links a { color: #bdc3c7; text-decoration: none; margin: 0 10px; font-size: 14px; }
    </style>
</head>
<body id="mainBody">

<header>
    <div class="nav-container">
        <a href="index.html" style="color:white; text-decoration:none; font-weight:bold;">🤝 SWAP.GE</a>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="მოძებნე..." onkeyup="filterListings()">
        </div>
        <div class="header-btns">
            <button class="lang-btn" onclick="toggleLang()" id="lBtn">EN</button>
            <a href="premium.html" class="btn-vip-header">
                <span data-lang-ka>👑 VIP სერვისი</span>
                <span data-lang-en>👑 VIP Service</span>
            </a>
        </div>
    </div>
</header>

<div class="container">
    <section class="post-box">
        <h2>
            <span data-lang-ka>➕ განცხადების დამატება</span>
            <span data-lang-en>➕ Add Listing</span>
        </h2>
        <form class="form-grid" id="postForm">
            <input type="text" id="inputTitle" placeholder="რას ცვლით? / What are you swapping?" required>
            <select id="inputCat" required>
                <option value="" data-lang-ka>აირჩიეთ კატეგორია</option>
                <option value="" data-lang-en>Select Category</option>
                <option value="Tech">Tech</option>
                <option value="Auto">Auto</option>
            </select>
            <textarea id="inputDesc" placeholder="აღწერა / Description" rows="3" required></textarea>
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <p data-lang-ka>📸 ფოტოს დამატება</p>
                <p data-lang-en>📸 Add Photo</p>
                <input type="file" id="fileInput" hidden accept="image/*" onchange="handleFiles(this.files)">
            </div>
            <div id="previewContainer"></div>
            <input type="text" id="inputPhone" placeholder="ტელეფონი / Phone" required>
            <button type="submit" class="btn-post">
                <span data-lang-ka>გამოქვეყნება</span>
                <span data-lang-en>Post Now</span>
            </button>
        </form>
    </section>

    <h2>
        <span data-lang-ka>🔍 ბოლო განცხადებები</span>
        <span data-lang-en>🔍 Recent Listings</span>
    </h2>
    <div class="grid" id="listingGrid"></div>
</div>

<footer>
    <div class="footer-links">
        <a href="privacy-policy.html">
            <span data-lang-ka>კონფიდენციალურობა</span>
            <span data-lang-en>Privacy Policy</span>
        </a>
        <a href="terms-conditions.html">
            <span data-lang-ka>წესები</span>
            <span data-lang-en>Terms</span>
        </a>
    </div>
    <p>&copy; 2024 Swap.ge</p>
</footer>

<script>
let currentLang = 'ka';
let listings = JSON.parse(localStorage.getItem('swap_listings')) || [];

function toggleLang() {
    const body = document.getElementById('mainBody');
    const btn = document.getElementById('lBtn');
    if (currentLang === 'ka') {
        body.classList.add('en-mode');
        btn.innerText = 'GE';
        currentLang = 'en';
        document.getElementById('searchInput').placeholder = "Search...";
    } else {
        body.classList.remove('en-mode');
        btn.innerText = 'EN';
        currentLang = 'ka';
        document.getElementById('searchInput').placeholder = "მოძებნე...";
    }
}

function handleFiles(files) {
    const reader = new FileReader();
    reader.onload = (e) => {
        uploadedImg = e.target.result;
        document.getElementById('previewContainer').innerHTML = `<img src="${uploadedImg}" style="width:100px; border-radius:5px; margin:10px;">`;
    };
    reader.readAsDataURL(files[0]);
}

document.getElementById('postForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const newItem = {
        id: Date.now(),
        title: document.getElementById('inputTitle').value,
        cat: document.getElementById('inputCat').value,
        desc: document.getElementById('inputDesc').value,
        phone: document.getElementById('inputPhone').value,
        img: typeof uploadedImg !== 'undefined' ? uploadedImg : 'https://placeholder.com'
    };
    listings.unshift(newItem);
    localStorage.setItem('swap_listings', JSON.stringify(listings));
    window.location.href = "success.html";
});

function render() {
    const grid = document.getElementById('listingGrid');
    grid.innerHTML = listings.map(item => `
        <div class="item">
            <img src="${item.img}">
            <div class="item-info">
                <h3>${item.title}</h3>
                <p>${item.desc}</p>
                <strong>📞 ${item.phone}</strong>
            </div>
        </div>
    `).join('');
}
render();
</script>
</body>
</html>
