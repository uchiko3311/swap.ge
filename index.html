<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swap.ge</title>
    <link rel="stylesheet" href="src/styles.css">
</head>
<body>

<header class="header">
    <h2>Swap.ge</h2>
    <input type="text" id="search" placeholder="ძიება...">
    <div id="auth-container"></div>
</header>

<section class="upload-section">
    <h3>ვიდეოს გაზიარება</h3>
    <input type="text" id="title" placeholder="ვიდეოს სათაური">
    <input type="text" id="url" placeholder="YouTube ლინკი">
    <div class="file-upload">
        <label for="file">ან აირჩიეთ ფაილი:</label>
        <input type="file" id="file" accept="video/*">
    </div>
    <button id="uploadBtn">ატვირთვა</button>
</section>

<main id="videos"></main>

<script type="module" src="src/app.js"></script>
</body>
</html>
